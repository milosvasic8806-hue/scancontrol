<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>SCAN CONTROL v7 — YFAI Serbia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap');
:root{--bg:#0F172A;--bg2:#1E293B;--bg3:#111827;--border:#374151;--border2:#252F3F;--text:#E2E8F0;--text2:#9CA3AF;--text3:#6B7280;--text4:#D1D5DB;--amber:#F59E0B;--green:#10B981;--blue:#3B82F6;--red:#EF4444;--purple:#8B5CF6;--font:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
input,select,button{font-family:var(--font)}
input:focus,select:focus{border-color:var(--amber)!important;outline:none}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

.header{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,var(--bg),var(--bg2))}
.header-left{display:flex;align-items:center;gap:12px}
.logo{font-size:32px;color:var(--amber)}
.title{font-size:20px;font-weight:700;color:var(--amber);font-family:var(--mono);letter-spacing:2px}
.subtitle{font-size:11px;color:#64748B;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.status{display:flex;align-items:center;gap:8px}
.status-dot{width:10px;height:10px;border-radius:50%;background:var(--text3)}
.status-dot.active{background:var(--green);box-shadow:0 0 8px var(--green)}
.status-text{font-size:12px;color:var(--text2);font-family:var(--mono);letter-spacing:1px}

.nav{display:flex;border-bottom:1px solid var(--border);background:var(--bg3);overflow-x:auto}
.nav button{padding:12px 24px;border:none;cursor:pointer;background:transparent;color:var(--text2);font-weight:400;font-size:14px;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.nav button.active{background:var(--bg2);color:var(--amber);font-weight:700;border-bottom-color:var(--amber)}
.nav button:hover{color:var(--amber)}

.main{padding:20px 24px;max-width:1000px;margin:0 auto}
.sec-title{font-size:17px;font-weight:700;color:var(--text);margin:0 0 12px}
.card{background:var(--bg2);border-radius:10px;padding:20px;border:1px solid var(--border)}
.label{display:block;font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;margin-top:12px}
.input{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px}
.select{padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px}

.btn-group{display:flex;gap:8px;flex-wrap:wrap}
.tog{padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;border:1px solid var(--border);background:var(--bg3);color:var(--text2);transition:all .15s}
.tog.active{border:2px solid var(--amber);background:rgba(245,158,11,.1);color:var(--amber)}
.btn-primary{padding:12px 24px;background:var(--amber);color:var(--bg);border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:15px;margin-top:20px;transition:all .15s}
.btn-primary:hover{filter:brightness(1.1)}
.btn-secondary{padding:10px 20px;background:transparent;color:var(--text2);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-weight:600;font-size:14px;transition:all .15s}
.btn-secondary:hover{border-color:var(--amber);color:var(--amber)}
.btn-small{padding:6px 14px;background:rgba(245,158,11,.1);color:var(--amber);border:1px solid var(--amber);border-radius:6px;cursor:pointer;font-weight:600;font-size:13px}
.tag{display:inline-flex;align-items:center;padding:4px 10px;background:rgba(245,158,11,.15);color:var(--amber);border-radius:4px;font-size:13px;font-family:var(--mono);margin:2px}
.tag .x{cursor:pointer;margin-left:6px;font-weight:700}

.info-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.pill{padding:6px 12px;background:var(--bg2);border-radius:6px;font-size:13px;color:var(--text2);border:1px solid var(--border)}
.pill b{color:var(--text)}

.scan-area{background:var(--bg2);border-radius:12px;padding:24px;border:1px solid var(--border);text-align:center}
.phase-ind{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px;padding:8px 16px;border-radius:8px;border:2px dashed}
.phase-label{font-family:var(--mono);font-weight:700;font-size:18px}
.scan-input{width:100%;padding:16px 20px;background:var(--bg);border:2px solid var(--border);border-radius:10px;color:var(--text);font-size:22px;font-family:var(--mono);font-weight:700;text-align:center}
.scan-hint{color:var(--text3);font-size:13px;margin-top:8px}
.scan-progress{display:flex;gap:16px;flex-wrap:wrap;padding:10px 16px;background:var(--bg2);border-radius:8px;margin-bottom:12px;font-family:var(--mono);font-size:13px;border:1px solid var(--border)}

.tbl{border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.tbl-h{display:flex;padding:10px 14px;background:var(--bg3);font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;gap:8px}
.tbl-r{display:flex;padding:10px 14px;gap:8px;border-top:1px solid var(--border2);align-items:center;animation:fadeIn .2s ease-out;flex-wrap:wrap}
.tbl-r:nth-child(even){background:var(--bg2)}
.tbl-r:nth-child(odd){background:#1A2332}
.tbl-r .pn{font-family:var(--mono);font-weight:600;color:var(--amber);font-size:13px}
.tbl-r .desc{color:var(--text4);font-size:13px}
.tbl-r .qty{font-weight:700;color:var(--green)}
.tbl-r .sn{font-family:var(--mono);font-size:12px;color:var(--text2)}
.tbl-r .time{font-size:12px;color:var(--text3)}

.box-summary{display:flex;justify-content:space-between;padding:10px 14px;background:var(--bg2);border-radius:6px;margin-bottom:6px;font-size:14px;color:var(--text2);border:1px solid var(--border)}

.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(--bg2);border-radius:12px;padding:24px;border:1px solid var(--border);max-width:480px;width:100%;max-height:80vh;overflow-y:auto}
.modal.wide{max-width:600px}
.sum-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border2);font-size:14px;color:var(--text2)}
.sum-row b{color:var(--text)}

.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:8px}
.dash-card{background:var(--bg2);border-radius:10px;padding:20px;border:1px solid var(--border);display:flex;flex-direction:column;gap:4px;align-items:center}
.dash-card .val{font-size:32px;font-weight:700}
.dash-card .lbl{font-size:13px;color:var(--text2)}

.hist-card{padding:14px 18px;background:var(--bg2);border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:border-color .2s}
.hist-card:hover{border-color:var(--amber)}

.empty{text-align:center;padding:40px;color:var(--text3)}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:600;z-index:2000;animation:slideIn .3s ease-out}
.toast.success{background:#065F46;color:#A7F3D0;border:1px solid var(--green)}
.toast.error{background:#7F1D1D;color:#FCA5A5;border:1px solid var(--red)}
.toast.info{background:#1E3A5F;color:#93C5FD;border:1px solid var(--blue)}
.hidden{display:none!important}

.type-tag{padding:2px 8px;border-radius:4px;font-size:11px;color:var(--text4)}
.type-mc{background:#1E3A5F}
.type-ar{background:#3B1F4E}
.type-bl{background:#1F3D2E}
.type-fo{background:#4A3728}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
.spinner{width:40px;height:40px;border:3px solid var(--bg2);border-top:3px solid var(--amber);border-radius:50%;animation:spin .8s linear infinite}
</style>
</head>

function now(){return new Date().toISOString()}
function fD(iso){if(!iso)return"";return new Date(iso).toLocaleDateString("en-GB",{day:"2-digit",month:"2-digit",year:"numeric"})}
function fT(iso){if(!iso)return"";return new Date(iso).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}
function fDT(iso){return iso?fD(iso)+" "+fT(iso):""}
function todayStr(){return new Date().toISOString().slice(0,10)}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}

// Get description — from item or parts DB
function getDesc(it){
  if(it.desc) return it.desc;
  const p=STATE.parts.find(p=>p.partNumber.toUpperCase()===it.pn.toUpperCase());
  return p?p.description:"";
}

// Extract Part Number from various barcode formats
// Handles: MY0743373-8S16, M00124015-9H15, KMRE0605260116-ACCBC0935MY0743373-8S16
function extractPN(raw){
  const s=raw.toUpperCase().trim();
  // Try to find MY... or M00... pattern anywhere in the string
  const m=s.match(/MY?\d{5,8}-[A-Z0-9]+/);
  if(m) return m[0];
  return s;
}

// Extract production date + time from barcode
// KMRB2702260063-ACAAG0906MY0743300-9A84 → date:27.02.26 time:09:06
// KBLB0605260727AAAA0340MY0636393-9H15   → date:06.05.26 time:03:40
function extractBarcodeInfo(raw){
  const s=raw.toUpperCase().trim();
  const result={pn:extractPN(raw),prodDate:"",prodTime:"",uid:""};
  // Date: 6 digits starting at position 4 (DDMMYY)
  const dateMatch=s.match(/^[A-Z]{3,5}(\d{6})/);
  if(dateMatch){
    const d=dateMatch[1];
    result.prodDate=d.substring(0,2)+"."+d.substring(2,4)+"."+d.substring(4,6);
  }
  // Time: 4 digits right before MY/M pattern
  const timeMatch=s.match(/(\d{4})(?=MY?\d)/);
  if(timeMatch){
    const t=timeMatch[1];
    result.prodTime=t.substring(0,2)+":"+t.substring(2,4);
  }
  // UID: everything before MY pattern
  const uidMatch=s.match(/^(.+?)(?=MY?\d)/);
  if(uidMatch) result.uid=uidMatch[1].trim();
  return result;
}

// Commission date age check — global
const COMM_DATE_CUTOFF="2026-05-19";
function checkOldCommDate(sn){
  const cd=STATE.commDates[sn];
  if(!cd) return null;
  const p=cd.split("/");
  if(p.length===3){
    const iso=p[2]+"-"+p[1]+"-"+p[0];
    if(iso<COMM_DATE_CUTOFF) return cd;
  }
  return null;
}

// V/W Main Carrier check — global
function checkVW(pn,desc){
  const d=(desc||"").toUpperCase();
  const p2=(pn||"").toUpperCase();
  if(d.includes("V CAR")||d.includes("V CARRIER")||d.startsWith("V ")) return "V";
  if(d.includes("W CAR")||d.includes("W CARRIER")||d.startsWith("W ")) return "W";
  if(p2.match(/-\d*V\d*$/i)) return "V";
  if(p2.match(/-\d*W\d*$/i)) return "W";
  return null;
}

// MC Box type: Green Box (CAR, Z CAR) or Blue Box (V CAR, W CAR)
function getMCBoxType(pn,desc){
  const d=(desc||"").toUpperCase().trim();
  if(!d.includes("CAR")) return null; // not MC
  if(d.startsWith("V ")||d.startsWith("V CAR")) return "Blue";
  if(d.startsWith("W ")||d.startsWith("W CAR")) return "Blue";
  // CAR, Z CAR, G CAR = Green
  return "Green";
}

function getMCBoxTypeForItem(it){
  const desc=it.desc||getDesc(it);
  return getMCBoxType(it.pn,desc);
}

// MC Box type for a whole box — only Returnable gets Green/Blue
function getMCBoxTypeForBox(box){
  if(!box||!box.items||!box.items.length) return null;
  if(box.prod!=="Main Carrier") return null;
  if(box.pkg!=="Returnable") return null; // Carton is just Carton
  const it=box.items[0];
  const desc=(it.desc||getDesc(it)).toUpperCase().trim();
  if(desc.startsWith("V ")||desc.startsWith("V CAR")) return "Blue";
  if(desc.startsWith("W ")||desc.startsWith("W CAR")) return "Blue";
  return "Green";
}

// Count MC Green/Blue boxes for a shipment
function countMCBoxes(boxes){
  let greenBoxes=0,blueBoxes=0,greenPcs=0,bluePcs=0;
  (boxes||[]).forEach(b=>{
    const bt=getMCBoxTypeForBox(b);
    const bQty=b.items.reduce((s,it)=>s+(parseInt(it.qty)||0),0);
    if(bt==="Green"){greenBoxes++;greenPcs+=bQty;}
    else if(bt==="Blue"){blueBoxes++;bluePcs+=bQty;}
  });
  return {greenBoxes,blueBoxes,greenPcs,bluePcs};
}

// Storage — IndexedDB for big data, localStorage for small
const BIG_KEYS=new Set(["ships","commDates","active","vdaHistory"]);
let _idb=null;

function openDB(){
  return new Promise((resolve,reject)=>{
    if(_idb){resolve(_idb);return;}
    const req=indexedDB.open("ScanControlDB",1);
    req.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains("data"))db.createObjectStore("data");};
    req.onsuccess=()=>{_idb=req.result;resolve(_idb);};
    req.onerror=()=>reject(req.error);
  });
}

function idbSave(key,data){
  openDB().then(db=>{
    const tx=db.transaction("data","readwrite");
    tx.objectStore("data").put(data,key);
    tx.onerror=()=>{console.error("IDB save failed:",key);beep("err");showToast("⚠️ Save error: "+key,"error");};
  }).catch(e=>console.error("IDB open failed:",e));
}

function idbLoad(key){
  return openDB().then(db=>{
    return new Promise((resolve,reject)=>{
      const tx=db.transaction("data","readonly");
      const req=tx.objectStore("data").get(key);
      req.onsuccess=()=>resolve(req.result!==undefined?req.result:null);
      req.onerror=()=>reject(req.error);
    });
  });
}

// Migrate data from localStorage to IndexedDB (one-time)
async function migrateToIDB(){
  for(const k of BIG_KEYS){
    const lsData=localStorage.getItem("sc_"+k);
    if(lsData){
      try{
        const parsed=JSON.parse(lsData);
        await openDB().then(db=>{
          return new Promise((resolve,reject)=>{
            const tx=db.transaction("data","readwrite");
            tx.objectStore("data").put(parsed,k);
            tx.oncomplete=()=>resolve();
            tx.onerror=()=>reject(tx.error);
          });
        });
        localStorage.removeItem("sc_"+k);
        console.log("Migrated",k,"to IndexedDB (",Math.round(lsData.length/1024),"KB freed)");
      }catch(e){console.error("Migration failed for",k,e);}
    }
  }
}

function load(k,fb){try{const v=localStorage.getItem("sc_"+k);return v?JSON.parse(v):fb}catch{return fb}}
function save(k,d){
  if(BIG_KEYS.has(k)){
    idbSave(k,d);
    return;
  }
  try{
    const json=JSON.stringify(d);
    localStorage.setItem("sc_"+k,json);
  }catch(e){
    console.error("SAVE FAILED:",k,e);
    beep("err");showToast("⚠️ STORAGE ERROR: "+k,"error");
  }
}

// ── Firebase Cloud Sync (push-only, no SDK needed) ──
const FIREBASE_DEFAULT="https://project-e0159900-4be4-446b-8d1-default-rtdb.europe-west1.firebasedatabase.app";
function getFirebaseURL(){return localStorage.getItem("sc_firebase_url")||FIREBASE_DEFAULT;}
function setFirebaseURL(url){localStorage.setItem("sc_firebase_url",url.replace(/\/+$/,""));}
let _lastLocalChange=0; // timestamp of last local data change

async function fbPush(path,data){
  const base=getFirebaseURL();
  if(!base) return;
  try{
    const r=await fetch(base+"/scancontrol/"+path+".json",{
      method:"PUT",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(data)
    });
    if(!r.ok) console.warn("Firebase push failed:",r.status);
    else console.log("Firebase pushed:",path);
  }catch(e){console.warn("Firebase offline:",e.message);}
}

function fbSyncDailyStats(){
  const day=new Date().toISOString().slice(0,10);
  // Count today's VDA boxes
  const todayVDA=STATE.vdaHistory.filter(v=>(v.finishedAt||"").startsWith(day));
  const todayPcs=todayVDA.reduce((s,v)=>s+(v.vdaQty||0),0);
  const todayOK=todayVDA.reduce((s,v)=>s+(v.okCount||0),0);
  const todayNOK=todayVDA.reduce((s,v)=>s+(v.nokCount||0),0);
  const ops=[...new Set(todayVDA.map(v=>v.operator).filter(Boolean))];
  // Count today's shipments
  const todayShips=STATE.ships.filter(sh=>(sh.closedAt||sh.createdAt||"").startsWith(day));
  const totalLabels=todayShips.reduce((s,sh)=>sh.boxes.reduce((s2,b)=>s2+b.items.length,s),0);
  fbPush("dailyStats/"+day,{
    vdaBoxes:todayVDA.length,
    vdaPcs:todayPcs,
    vdaOK:todayOK,
    vdaNOK:todayNOK,
    shipments:todayShips.length,
    shippedLabels:totalLabels,

async function fbPushFullData(){
  const base=getFirebaseURL();
  if(!base) return;
  try{
    const fullData={
      vdaHistory:STATE.vdaHistory||[],
      ships:STATE.ships||[],
      active:STATE.active||null,

      lastFullSync:now()
    };
    await fetch(base+"/scancontrol/fullData.json",{

      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(fullData)
    });
    console.log("Firebase: full data pushed");
  }catch(e){console.warn("Firebase full push failed:",e.message);}
}

async function fbPullFullData(){
  const base=getFirebaseURL();
  if(!base) return false;
  // Skip if local data was changed in last 30 seconds (wait for push to complete first)
  if(Date.now()-_lastLocalChange<30000){console.log("☁️ Pull skipped — local changes pending");return false;}
  try{
    const r=await fetch(base+"/scancontrol/fullData.json");
    if(!r.ok) return false;
    const d=await r.json();
    if(!d) return false;
    console.log("Firebase pull: cloud has VDA="+((d.vdaHistory&&toArr2(d.vdaHistory).length)||0)+", ships="+((d.ships&&toArr2(d.ships).length)||0));
    
    // VDA History — take cloud if it has data
    const cloudVDA=fixFBVDA(d.vdaHistory);
    if(cloudVDA.length>0&&cloudVDA.length>=STATE.vdaHistory.length){
      STATE.vdaHistory=cloudVDA;
      save("vdaHistory",STATE.vdaHistory);
    }
    // Ships — take cloud if it has data
    const cloudShips=fixFBShips(d.ships);
    if(cloudShips.length>0&&cloudShips.length>=STATE.ships.length){
      STATE.ships=cloudShips;
      await idbSave("ships",STATE.ships);
    }
    // Comm dates — merge
    if(d.commDates){
      const cloudCD=typeof d.commDates==="object"?d.commDates:{};
      if(Object.keys(cloudCD).length>=Object.keys(STATE.commDates).length){
        STATE.commDates=cloudCD;
        await idbSave("commDates",STATE.commDates);
      }
    }
    // Active shipment
    if(!STATE.active&&d.active){
      STATE.active=d.active;
      await idbSave("active",STATE.active);
    }
    // Urgent
    const cloudUrg=toArr2(d.urgentParts||[]);
    if(cloudUrg.length>0&&cloudUrg.length>=(STATE.urgentParts||[]).length){
      STATE.urgentParts=cloudUrg;save("urgentParts",STATE.urgentParts);
    }
    // Box counter — higher wins
    if((d.vdaBoxCount||0)>STATE.vdaBoxCount){
      STATE.vdaBoxCount=d.vdaBoxCount;save("vdaBoxCount",STATE.vdaBoxCount);
    }
    if(d.vdaOperator&&!STATE.vdaOperator){STATE.vdaOperator=d.vdaOperator;save("vdaOperator",STATE.vdaOperator);}
    return true;
  }catch(e){console.warn("Firebase pull failed:",e.message);return false;}
}
// Firebase array fix — deep conversion
function toArr2(obj){
  if(!obj) return [];
  if(Array.isArray(obj)) return obj.filter(Boolean);
  if(typeof obj==="object") return Object.values(obj).filter(Boolean);
  return [];
}
function fixFBVDA(list){
  return toArr2(list).map(v=>{
    if(!v) return v;
    v.scanned=toArr2(v.scanned);
    v.vdaLabels=toArr2(v.vdaLabels);
    v.alerts=toArr2(v.alerts);
    v.scanned.forEach(s=>{s.alerts=toArr2(s.alerts);});
    return v;
  });
}
function fixFBShips(list){
  return toArr2(list).map(sh=>{
    if(!sh) return sh;
    sh.boxes=toArr2(sh.boxes);
    sh.asns=toArr2(sh.asns);
    sh.boxes.forEach(b=>{b.items=toArr2(b.items);});
    return sh;
  });
}

// Box capacity limits
function getBoxLimit(prod,pkg){
  const p=(prod||"").toLowerCase(),k=(pkg||"").toLowerCase();
  if(p.includes("main carrier")||p==="mc"){
    // MC: limit on labels AND total qty
    return k.includes("return")?{maxLabels:9,maxQty:9}:{maxLabels:6,maxQty:6};
  }
  if(p.includes("beltline")){
    // Beltline: limit on total qty + max 4 unique PNs
    return {maxLabels:9999,maxQty:88,maxPNs:4};
  }
  if(p.includes("armrest")){
    // Armrest: limit on labels per pallet
    return k.includes("return")?{maxLabels:28}:{maxLabels:16};
  }
  if(p.includes("fost")){
    // FOST: limit on labels per pallet
    return k.includes("return")?{maxLabels:20}:{maxLabels:16};
  }
  return {maxLabels:9999};
}

function checkBoxLimit(box,newQty,newPN){
  const lim=getBoxLimit(box.prod,box.pkg);
  const curLabels=box.items.length;
  const curQty=box.items.reduce((s,it)=>s+(parseInt(it.qty)||0),0);
  const curPNs=new Set(box.items.map(it=>it.pn));

  if(lim.maxLabels&&curLabels>=lim.maxLabels){
    return "⛔ Box full! Max "+lim.maxLabels+" labels for "+box.prod+" "+box.pkg+". Close this box and open a new one.";
  }
  if(lim.maxQty&&(curQty+(parseInt(newQty)||0))>lim.maxQty){
    return "⛔ Qty limit! Max "+lim.maxQty+" pcs for "+box.prod+". Current: "+curQty+" + "+newQty+" = "+(curQty+(parseInt(newQty)||0));
  }
  if(lim.maxPNs&&newPN){
    curPNs.add(newPN.toUpperCase());
    if(curPNs.size>lim.maxPNs){
      return "⛔ PN limit! Max "+lim.maxPNs+" different part numbers for "+box.prod+". Already have: "+[...new Set(box.items.map(it=>it.pn))].join(", ");
    }
  }
  return null;
}

    ));

}

function getBoxLimitInfo(box){
  const lim=getBoxLimit(box.prod,box.pkg);
  const cur=box.items.length;
  const curQty=box.items.reduce((s,it)=>s+(parseInt(it.qty)||0),0);
  const curPNs=new Set(box.items.map(it=>it.pn)).size;
  const parts=[];
  if(lim.maxLabels<9999) parts.push(cur+"/"+lim.maxLabels+" labels");
  if(lim.maxQty) parts.push(curQty+"/"+lim.maxQty+" pcs");
  if(lim.maxPNs) parts.push(curPNs+"/"+lim.maxPNs+" PNs");
  return parts.length?parts.join(" · "):"";
}

// Urgent part check
function isUrgentPN(pn){
  const u=STATE.urgentParts.find(u=>u.pn.toUpperCase()===pn.toUpperCase());
  return u&&(u.qty||0)>0;
}

function isEverUrgentPN(pn){
  return STATE.urgentPNsAll.some(p=>p.toUpperCase()===pn.toUpperCase());
}

function getUrgentInfo(pn){
  return STATE.urgentParts.find(u=>u.pn.toUpperCase()===pn.toUpperCase());
}

function deductUrgent(pn,qty){
  const uIdx=STATE.urgentParts.findIndex(u=>u.pn.toUpperCase()===pn.toUpperCase());
  if(uIdx>-1){
    if(!STATE.urgentParts[uIdx].origQty) STATE.urgentParts[uIdx].origQty=STATE.urgentParts[uIdx].qty;
    STATE.urgentParts[uIdx].qty=Math.max(0,STATE.urgentParts[uIdx].qty-(parseInt(qty)||0));
    // Don't remove — keep at 0 so it shows as DONE
    save("urgentParts",STATE.urgentParts);
  }
}

// Sound
const AX=window.AudioContext||window.webkitAudioContext;
function beep(type){
  try{const c=new AX(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
  if(type==="ok"){o.frequency.value=880;g.gain.value=.15;o.start();o.stop(c.currentTime+.12)}
  else if(type==="err"){o.frequency.value=220;g.gain.value=.2;o.start();setTimeout(()=>o.frequency.value=180,100);o.stop(c.currentTime+.35)}
  else{o.frequency.value=660;g.gain.value=.12;o.start();setTimeout(()=>o.frequency.value=880,100);setTimeout(()=>o.frequency.value=1100,200);o.stop(c.currentTime+.35)}
  }catch(e){}
}
// DN Compare screen flash + sound
function dnFlash(color,times){
  const ov=document.createElement("div");
  ov.style.cssText="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:99999;opacity:0;transition:opacity 0.15s";
  ov.style.background=color==="green"?"rgba(0,176,80,.35)":"rgba(255,40,40,.4)";
  document.body.appendChild(ov);
  let count=0;
  function pulse(){
    if(count>=times*2){ov.remove();return;}
    ov.style.opacity=count%2===0?"1":"0";
    count++;
    setTimeout(pulse,200);
  }
  pulse();
}
function dnSound(type){
  try{const c=new AX(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
  if(type==="good"){
    o.type="sine";o.frequency.value=523;g.gain.value=.18;o.start();
    setTimeout(()=>o.frequency.value=659,120);
    setTimeout(()=>o.frequency.value=784,240);
    setTimeout(()=>o.frequency.value=1047,360);
    o.stop(c.currentTime+.5);
  }else{
    o.type="sawtooth";o.frequency.value=180;g.gain.value=.2;o.start();
    setTimeout(()=>o.frequency.value=140,150);
    setTimeout(()=>o.frequency.value=100,300);
    o.stop(c.currentTime+.5);
  }
  }catch(e){}
}
function dnAlert(isOK){
  dnFlash(isOK?"green":"red",5);
  dnSound(isOK?"good":"bad");
}

// ── ISO Week helper ──
function getISOWeek(dateStr){
  const d=new Date(dateStr);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate()+3-(d.getDay()+6)%7);
  const week1=new Date(d.getFullYear(),0,4);
  return Math.round(((d.getTime()-week1.getTime())/86400000-3+(week1.getDay()+6)%7)/7)+1;
}

function getISOYear(dateStr){
  const d=new Date(dateStr);
  d.setDate(d.getDate()+3-(d.getDay()+6)%7);
  return d.getFullYear();
}

// ── CW Picker Modal ──

  allShips.forEach(sh=>{
    const d=(sh.createdAt||"").slice(0,10);
    if(!d)return;
    const cw=getISOWeek(d);
    const yr=getISOYear(d);
    const key="CW"+cw;
    if(!cwMap[key])cwMap[key]={cw,yr,ships:[],dates:new Set()};
    cwMap[key].ships.push(sh);
    cwMap[key].dates.add(d);
  });

  const cwKeys=Object.keys(cwMap).sort((a,b)=>{
    const ca=cwMap[a],cb=cwMap[b];

function exportMgmtCSV(allShips){
  if(!allShips.length){showToast("No shipments","error");return;}

  const byDate={};
  allShips.forEach(sh=>{const d=(sh.createdAt||"").slice(0,10);if(!byDate[d])byDate[d]=[];byDate[d].push(sh);});
  const dates=Object.keys(byDate).sort();
  const dateLabels=dates.map(d=>{const p=d.split("-");return p[2]+"."+p[1]+".";});
  const cwFirst=getISOWeek(dates[0]);
  const cwLast=getISOWeek(dates[dates.length-1]);
  const cwLabel=cwFirst===cwLast?"CW"+cwFirst:"CW"+cwFirst+"-"+cwLast;

  // Compute stats
  let totVeh=0,totBoxes=0,totLabels=0,totQty=0,totNOK=0,totOKVeh=0;
  const dayStats=dates.map((d,i)=>{
    const ds=byDate[d];
    const dV=ds.length;const dB=ds.reduce((s,sh)=>s+sh.boxes.length,0);
    const dL=ds.reduce((s,sh)=>s+sh.boxes.reduce((a,b)=>a+b.items.length,0),0);
    const dQ=ds.reduce((s,sh)=>s+sh.boxes.reduce((a,b)=>a+b.items.reduce((x,it)=>x+(parseInt(it.qty)||0),0),0),0);
    const dN=ds.reduce((s,sh)=>s+sh.boxes.reduce((a,b)=>a+b.items.filter(it=>it.status==="NOK"||it.failure).length,0),0);
    const dOK=ds.filter(v=>!v.boxes.some(b=>b.items.some(it=>it.status==="NOK"||it.failure))).length;
    const rate=dL?Math.round((dL-dN)/dL*1000)/10:100;
    const details=ds.map(sh=>{const n=sh.vehicleNumber||sh.asnText||(sh.asns||[]).join("/")||"—";const nok=sh.boxes.some(b=>b.items.some(it=>it.status==="NOK"||it.failure));return(nok?"✕ ":"✓ ")+n;}).join(", ");
    totVeh+=dV;totBoxes+=dB;totLabels+=dL;totQty+=dQ;totNOK+=dN;totOKVeh+=dOK;
    return{date:dateLabels[i],vehicles:dOK+"/"+dV+" OK",boxes:dB,labels:dL,qty:dQ,nok:dN,rate:rate+"%",details,hasNOK:dN>0};
  });
  const totRate=totLabels?Math.round((totLabels-totNOK)/totLabels*1000)/10:100;

  // Vehicle detail
  const vehRows=[];
  dates.forEach((d,di)=>{
    byDate[d].forEach(sh=>{
      const vn=sh.vehicleNumber||sh.asnText||(sh.asns||[]).join("/")||"—";
      const vB=sh.boxes.length;const vL=sh.boxes.reduce((a,b)=>a+b.items.length,0);

      const fails=[];sh.boxes.forEach(b=>b.items.forEach(it=>{if(it.failure&&!fails.includes(it.failure.trim()))fails.push(it.failure.trim())}));
      vehRows.push({date:dateLabels[di],vn,vB,vL,vQ,vN,rate:vR+"%",status:vN?"NOK":"OK",fails:fails.join("; "),hasNOK:vN>0});
    });
  });

  // NOK items

    const vn=sh.vehicleNumber||sh.asnText||(sh.asns||[]).join("/")||"—";

      <td class="bold">${r.date}</td>

function exportMgmtPPTX(allShips){
  if(typeof PptxGenJS==="undefined"){showToast("Need internet for first use","error");return;}
  if(!allShips.length){showToast("No shipments","error");return;}

  // Group by date
  const byDate={};
  allShips.forEach(sh=>{
    const d=(sh.createdAt||"").slice(0,10);
    if(!byDate[d])byDate[d]=[];
    byDate[d].push(sh);
  });
  const dates=Object.keys(byDate).sort();
  const dateLabels=dates.map(d=>{const p=d.split("-");return p[2]+"."+p[1]+".";});

  // Per-day stats
  const dVehicles=dates.map(d=>byDate[d].length);
  const dOKVeh=dates.map(d=>byDate[d].filter(v=>!v.boxes.some(b=>b.items.some(it=>it.status==="NOK"||it.failure))).length);
  const dNOKVeh=dates.map((d,i)=>dVehicles[i]-dOKVeh[i]);
  const dBoxes=dates.map(d=>byDate[d].reduce((s,sh)=>s+sh.boxes.length,0));
  const dLabels=dates.map(d=>byDate[d].reduce((s,sh)=>s+sh.boxes.reduce((a,b)=>a+b.items.length,0),0));
  const dQty=dates.map(d=>byDate[d].reduce((s,sh)=>s+sh.boxes.reduce((a,b)=>a+b.items.reduce((x,it)=>x+(parseInt(it.qty)||0),0),0),0));
  const dNOKItems=dates.map(d=>byDate[d].reduce((s,sh)=>s+sh.boxes.reduce((a,b)=>a+b.items.filter(it=>it.status==="NOK"||it.failure).length,0),0));
  const dOKParts=dates.map((d,i)=>dLabels[i]-dNOKItems[i]);
  const dNOKBoxes=dates.map(d=>byDate[d].reduce((s,sh)=>s+sh.boxes.filter(b=>b.items.some(it=>it.status==="NOK"||it.failure)).length,0));
  const dOKBoxes=dates.map((d,i)=>dBoxes[i]-dNOKBoxes[i]);

  const totalVeh=dVehicles.reduce((a,b)=>a+b,0);
  const totalOKVeh=dOKVeh.reduce((a,b)=>a+b,0);
  const totalNOKVeh=totalVeh-totalOKVeh;
  const totalBoxes=dBoxes.reduce((a,b)=>a+b,0);
  const totalLabels=dLabels.reduce((a,b)=>a+b,0);
  const totalQty=dQty.reduce((a,b)=>a+b,0);
  const totalNOK=dNOKItems.reduce((a,b)=>a+b,0);
  const okRate=totalLabels?Math.round((totalLabels-totalNOK)/totalLabels*1000)/10:100;
  const nokShipPct=totalVeh?Math.round(totalNOKVeh/totalVeh*100):0;

  // Collect unique failure descriptions
  const failures=[];
  allShips.forEach(sh=>sh.boxes.forEach(b=>b.items.forEach(it=>{
    if(it.failure&&it.failure.trim()){
      const existing=failures.find(f=>f.text===it.failure.trim());
      if(!existing)failures.push({text:it.failure.trim(),count:1});
      else existing.count++;
    }
  })));

  // Get CW range
  const cwFirst=getISOWeek(dates[0]);
  const cwLast=getISOWeek(dates[dates.length-1]);

    x:0.3,y:2.05,w:5.2,h:1.55,
    barDir:"col",barGrouping:"stacked",
    chartColors:[CGREEN,CRED],
    showValue:true,dataLabelPosition:"inEnd",dataLabelColor:"FFFFFF",dataLabelFontSize:8,dataLabelFontBold:true,
    catAxisLabelColor:DGRAY,catAxisLabelFontSize:7,
    valAxisLabelColor:DGRAY,valAxisLabelFontSize:6,
    valGridLine:{color:MGRAY,size:0.5},catGridLine:{style:"none"},
    showLegend:true,legendPos:"t",legendFontSize:6,legendColor:TEXT2,
    plotArea:{fill:{color:BG2}},
  });

  // ── LEFT BOTTOM: Parts OK/NOK chart ──
  s.addChart(pres.charts.BAR,[
    {name:"OK Parts",labels:dateLabels,values:dOKParts},
    {name:"NOK Parts",labels:dateLabels,values:dNOKItems},
  ],{
    x:0.3,y:3.65,w:5.2,h:1.55,
    barDir:"col",barGrouping:"stacked",
    chartColors:[CGREEN,CRED],
    showValue:true,dataLabelPosition:"inEnd",dataLabelColor:"FFFFFF",dataLabelFontSize:7,dataLabelFontBold:true,
    catAxisLabelColor:DGRAY,catAxisLabelFontSize:7,
    valAxisLabelColor:DGRAY,valAxisLabelFontSize:6,
    valGridLine:{color:MGRAY,size:0.5},catGridLine:{style:"none"},
    showLegend:true,legendPos:"t",legendFontSize:6,legendColor:TEXT2,
    plotArea:{fill:{color:BG2}},
  });

  // ── RIGHT TOP: Current Status ──
  s.addText("Current status – "+cw,{x:5.7,y:0.1,w:4,h:0.35,fontSize:14,fontFace:"Calibri",bold:true,color:TEXT,margin:0});

  const bullets=[];
  // Start info
  const firstDateStr=dateLabels[0]||"";
  bullets.push({text:"Logistic Gate – started on "+firstDateStr,options:{fontSize:8,fontFace:"Calibri",bold:true,color:TEXT,breakLine:true,paraSpaceAfter:2,bullet:true}});
  bullets.push({text:"VDA info + QR label verification per box before loading – visual",options:{fontSize:7,fontFace:"Calibri",color:TEXT2,breakLine:true,paraSpaceAfter:1,indentLevel:1,bullet:true}});
  bullets.push({text:"Scan Control system – full traceability per label",options:{fontSize:7,fontFace:"Calibri",color:TEXT2,breakLine:true,paraSpaceAfter:4,indentLevel:1,bullet:true}});

  // NOK summary
  const totalNOKBoxes=dNOKBoxes.reduce((a,b)=>a+b,0);
  if(totalNOKVeh>0){
    bullets.push({text:totalNOKVeh+" shipments NOK / "+totalVeh+" shipments = "+nokShipPct+"% with deviations",options:{fontSize:8,fontFace:"Calibri",bold:true,color:CRED,breakLine:true,paraSpaceAfter:1,bullet:true}});
    bullets.push({text:totalNOKBoxes+" boxes affected, "+totalNOK+" parts with issues",options:{fontSize:7,fontFace:"Calibri",bold:true,color:CRED,breakLine:true,paraSpaceAfter:1,indentLevel:1,bullet:true}});
    bullets.push({text:"issues detected & resolved immediately, prior to delivery",options:{fontSize:7,fontFace:"Calibri",bold:true,color:CRED,breakLine:true,paraSpaceAfter:4,indentLevel:1,bullet:true}});
  }else{
    bullets.push({text:"All shipments OK – zero deviations",options:{fontSize:8,fontFace:"Calibri",bold:true,color:CGREEN,breakLine:true,paraSpaceAfter:4,bullet:true}});

  // OK rate
  bullets.push({text:"OK Rate of labels & boxes checked: "+okRate+"%",options:{fontSize:8,fontFace:"Calibri",bold:true,color:TEXT,breakLine:true,paraSpaceAfter:4,bullet:true}});

  // Main issues
  if(failures.length>0){
    bullets.push({text:"Main issues:",options:{fontSize:8,fontFace:"Calibri",bold:true,color:TEXT,breakLine:true,paraSpaceAfter:2,bullet:true}});
    failures.forEach(f=>{
      bullets.push({text:f.text+(f.count>1?" (×"+f.count+")":""),options:{fontSize:7,fontFace:"Calibri",bold:true,color:TEXT2,breakLine:true,paraSpaceAfter:1,indentLevel:1,bullet:true}});
    });

  s.addText(bullets,{x:5.7,y:0.45,w:4,h:2.3,valign:"top",margin:0});

  // ── RIGHT BOTTOM: Top 4 Failures ──

  const failMap={};
  allShips.forEach(sh=>{
    sh.boxes.forEach(b=>b.items.forEach(it=>{
      if(it.failure&&it.failure.trim()){
        const key=it.failure.trim();
        if(!failMap[key]) failMap[key]={text:key,count:0,totalQty:0,pns:new Set(),vehicles:new Set()};
        failMap[key].count++;
        failMap[key].totalQty+=parseInt(it.qty)||0;
        failMap[key].pns.add(it.pn);
        const vn=sh.vehicleNumber||sh.asnText||(sh.asns||[]).join("/")||"—";
        failMap[key].vehicles.add(vn);
      }
    }));
  });
  const topFails=Object.values(failMap).sort((a,b)=>b.count-a.count).slice(0,4);

  if(topFails.length>0){
    s.addText("Top 4 Failures (by quantity)",{x:5.7,y:2.7,w:4,h:0.25,fontSize:10,fontFace:"Calibri",bold:true,color:TEAL,margin:0});

    // Truncate labels for chart
    const chartLabels=topFails.map((f,i)=>"#"+(i+1)+" "+f.text.substring(0,25)+(f.text.length>25?"…":""));

    // Bar chart — pcs affected
    s.addChart(pres.charts.BAR,[
      {name:"Pieces (pcs)",labels:chartLabels,values:topFails.map(f=>f.totalQty)},
      {name:"Occurrences",labels:chartLabels,values:topFails.map(f=>f.count)},
    ],{

      showValue:true,dataLabelPosition:"outEnd",dataLabelColor:TEXT2,dataLabelFontSize:7,dataLabelFontBold:true,
      catAxisLabelColor:TEXT2,catAxisLabelFontSize:6,catAxisLabelFontBold:true,
      valAxisLabelColor:DGRAY,valAxisLabelFontSize:6,valAxisHidden:true,
      valGridLine:{style:"none"},catGridLine:{style:"none"},
      showLegend:true,legendPos:"b",legendFontSize:6,legendColor:TEXT2,
      plotArea:{fill:{color:BG2}},
    });

    // Resolved count
    const resolved=allShips.reduce((s2,sh)=>s2+sh.boxes.reduce((a,b)=>a+b.items.filter(it=>it.status==="RESOLVED").length,0),0);
    const totalFailQty=Object.values(failMap).reduce((s2,f)=>s2+f.totalQty,0);
    s.addText("Total: "+totalNOK+"× | "+totalFailQty+" pcs | "+Object.keys(failMap).length+" unique issues"+(resolved?" | Resolved: "+resolved+"/"+totalNOK:""),{x:5.7,y:5.1,w:4,h:0.18,fontSize:7,fontFace:"Calibri",bold:true,color:resolved===totalNOK?CGREEN:TEXT2,margin:0});
  }

  // Footer
  s.addText("T.A.S. FORCE  |  YFAI Serbia  |  Outbound Quality Control",{x:0.3,y:5.3,w:9.4,h:0.2,fontSize:7,fontFace:"Calibri",color:TEXT3,align:"left"});

  pres.writeFile({fileName:"Mgmt_Report_"+cw+".pptx"}).then(()=>{
    showToast("Management Report generated!","success");beep("done");
  });
}


// ═══════════════════════════════════════════
// PPTX REPORT EXPORT
// ═══════════════════════════════════════════
function exportPPTX(shipments){
  if(typeof PptxGenJS==="undefined"){showToast("PptxGenJS not loaded — need internet for first use","error");return;}
  const pres=new PptxGenJS();
  pres.layout="LAYOUT_16x9";
  pres.author="YFAI Serbia";
  pres.title="Scan Report";
  pres.revision="1";

  const BG="002045",BG2="001A3A",BG3="00152E",BORDER="07445C",TEXT="FFFFFF",TEXT2="D9D9D9",TEXT3="666666";
  const AMBER="23F0C7",GREEN="128A88",BLUE="23F0C7",RED="FF4444",PURPLE="07445C";

  const dateStr=fD(shipments[0]?.createdAt||now());

  // Compute totals
  const totShips=shipments.length;
  const totBoxes=shipments.reduce((s,sh)=>s+sh.boxes.length,0);
  const totLabels=shipments.reduce((s,sh)=>s+sh.boxes.reduce((a,b)=>a+b.items.length,0),0);
  const totQty=shipments.reduce((s,sh)=>s+sh.boxes.reduce((a,b)=>a+b.items.reduce((x,it)=>x+(parseInt(it.qty)||0),0),0),0);

  // ═══ SLIDE 0: TITLE ═══
  const s0=pres.addSlide();
  s0.background={color:BG};
  s0.addText("T.A.S. FORCE",{x:0.6,y:0.6,w:4,h:0.5,fontSize:24,fontFace:"Calibri",bold:true,color:AMBER,margin:0});
  s0.addText("WE GET IT DONE - EVERY TIME, EVERYWHERE",{x:0.6,y:1.05,w:4,h:0.2,fontSize:7,fontFace:"Calibri",color:TEXT3,margin:0,charSpacing:2});
  s0.addText("SHIPMENT\nVERIFICATION\nREPORT",{x:0.6,y:2.0,w:7,h:1.6,fontSize:44,fontFace:"Calibri",bold:true,color:"FFFFFF",margin:0,lineSpacingMultiple:1.1});
  s0.addShape(pres.shapes.RECTANGLE,{x:0.6,y:3.9,w:1.2,h:0.05,fill:{color:AMBER}});
  s0.addText(dateStr,{x:0.6,y:4.5,w:4,h:0.35,fontSize:14,fontFace:"Calibri",bold:true,color:"FFFFFF",margin:0});

  // ── SLIDE 1: Dashboard Overview ──
  const s1=pres.addSlide();
  s1.background={color:BG};

  // Title
  s1.addText("Scan report tool- shipments "+dateStr,{x:0.5,y:0.15,w:7,h:0.55,fontSize:24,fontFace:"Arial",bold:true,color:TEXT,align:"center"});
  s1.addText("T.A.S. FORCE",{x:7.8,y:0.15,w:2,h:0.35,fontSize:12,fontFace:"Arial",bold:true,color:"FFFFFF",align:"right",margin:0});

  // Subtitle
  s1.addText("Dashboard",{x:0.5,y:0.7,w:2,h:0.35,fontSize:16,fontFace:"Arial",bold:true,color:TEXT,margin:0});

  // KPI Cards
  const cards=[[totShips,"Shipments today",AMBER],[totBoxes,"Boxes today",BLUE],[totLabels,"Labels today",GREEN],[totQty,"Qty today",PURPLE]];
  const cw=2.1,cg=0.15,cx=0.5;
  cards.forEach(([val,label,color],i)=>{
    const x=cx+i*(cw+cg),y=1.05;
    s1.addShape(pres.shapes.RECTANGLE,{x,y,w:cw,h:1.15,fill:{color:BG2},line:{color:BORDER,width:1}});
    s1.addShape(pres.shapes.RECTANGLE,{x,y,w:cw,h:0.04,fill:{color}});
    s1.addText(String(val),{x,y:y+0.15,w:cw,h:0.55,fontSize:32,fontFace:"Arial",bold:true,color:TEXT,align:"center",margin:0});
    s1.addText(label,{x,y:y+0.7,w:cw,h:0.35,fontSize:11,fontFace:"Arial",color:TEXT2,align:"center",margin:0});
  });

  // Per Shipment Table
  s1.addText("Today — Per Shipment",{x:0.5,y:2.4,w:4,h:0.35,fontSize:14,fontFace:"Arial",bold:true,color:TEXT,margin:0});

  const hdrOpts={fill:{color:BG3},color:TEXT3,fontSize:9,bold:true,fontFace:"Arial",align:"center",valign:"middle"};
  const hdrRow=[
    {text:"VEHICLE",options:{...hdrOpts,align:"left"}},
    {text:"BOXES",options:hdrOpts},
    {text:"LABELS",options:hdrOpts},
    {text:"QTY",options:hdrOpts},
    {text:"NOK",options:hdrOpts},
    {text:"STATUS",options:hdrOpts}
  ];
  const tblRows=[hdrRow];
  let totNOK=0;
  shipments.forEach(sh=>{
    const sB=sh.boxes.length;
    const sL=sh.boxes.reduce((a,b)=>a+b.items.length,0);
    const sQ=sh.boxes.reduce((a,b)=>a+b.items.reduce((x,it)=>x+(parseInt(it.qty)||0),0),0);
    const sNOK=sh.boxes.reduce((a,b)=>a+b.items.filter(it=>it.status==="NOK").length,0);
    const sResolved=sh.boxes.reduce((a,b)=>a+b.items.filter(it=>it.status==="RESOLVED").length,0);
    const sIssues=sNOK+sResolved;
    totNOK+=sNOK;
    const name=sh.vehicleNumber||sh.asnText||(sh.asns||[]).join("/")||"—";
    const rowBg=tblRows.length%2===0?BG2:"1A2332";
    const cellOpts={fill:{color:rowBg},fontSize:11,fontFace:"Arial",valign:"middle"};
    const statusText=sNOK?"NOK ("+sNOK+")":sResolved?"RESOLVED ("+sResolved+")":"OK";
    const statusColor=sNOK?RED:sResolved?BLUE:GREEN;
    tblRows.push([
      {text:name,options:{...cellOpts,color:AMBER,bold:true,align:"left"}},
      {text:String(sB),options:{...cellOpts,color:BLUE,bold:true,align:"center"}},
      {text:String(sL),options:{...cellOpts,color:GREEN,bold:true,align:"center"}},
      {text:String(sQ),options:{...cellOpts,color:PURPLE,bold:true,align:"center"}},
      {text:String(sIssues),options:{...cellOpts,color:sIssues?RED:GREEN,bold:true,align:"center"}},
      {text:statusText,options:{...cellOpts,color:statusColor,bold:true,align:"center"}}
    ]);
  });
  // Total row
  const totOpts={fill:{color:BG3},fontSize:11,fontFace:"Arial",bold:true,valign:"middle",align:"center"};
  tblRows.push([
    {text:"TOTAL",options:{...totOpts,color:TEXT,align:"left"}},
    {text:String(totBoxes),options:{...totOpts,color:BLUE}},
    {text:String(totLabels),options:{...totOpts,color:GREEN}},
    {text:String(totQty),options:{...totOpts,color:PURPLE}},
    {text:String(totNOK),options:{...totOpts,color:totNOK?RED:GREEN}},
    {text:"",options:{...totOpts}}
  ]);

  s1.addTable(tblRows,{x:0.5,y:2.8,w:9,colW:[2,1.2,1.2,1.2,0.8,1.2],border:{pt:0.5,color:"07445C"}});

  // Footer
  s1.addText("T.A.S. FORCE  |  Outbound Quality Report",{x:0.5,y:5.25,w:9,h:0.3,fontSize:8,fontFace:"Calibri",color:TEXT3,align:"left",margin:0});

  // ── SLIDE 2+: By Vehicles (2 per slide) ──
  for(let si=0;si<shipments.length;si+=2){
    const slide=pres.addSlide();
    slide.background={color:BG};
    slide.addText("Scan report tool- By vehicles",{x:0.5,y:0.15,w:9,h:0.5,fontSize:22,fontFace:"Arial",bold:true,color:TEXT,align:"center"});

    [0,1].forEach(col=>{
      const sh=shipments[si+col];
      if(!sh)return;
      const colX=col===0?0.3:5.1;
      const name=sh.vehicleNumber||sh.asnText||(sh.asns||[]).join("/")||"Shipment";

      // Vehicle name
      slide.addText(name,{x:colX,y:0.6,w:4.6,h:0.4,fontSize:18,fontFace:"Arial",bold:true,color:TEXT,margin:0});

      // Compute packaging summary
      const pkgMap={};
      sh.boxes.forEach(b=>{
        const key=b.pkg+"|||"+b.prod;
        if(!pkgMap[key])pkgMap[key]={pkg:b.pkg,prod:b.prod,boxes:0,labels:0,qty:0};
        pkgMap[key].boxes++;
        pkgMap[key].labels+=b.items.length;
        pkgMap[key].qty+=b.items.reduce((s,it)=>s+(parseInt(it.qty)||0),0);
      });

      // Group by packaging type
      const pkgTypes=[...new Set(Object.values(pkgMap).map(v=>v.pkg))];
      let curY=1.0;

      // Card background
      const cardH=pkgTypes.length<=1?2.6:3.8;
      slide.addShape(pres.shapes.RECTANGLE,{x:colX,y:curY,w:4.6,h:cardH,fill:{color:BG2},line:{color:BORDER,width:1}});

      // "PACKAGING SUMMARY" header
      slide.addText("PACKAGING SUMMARY",{x:colX+0.15,y:curY+0.08,w:4.3,h:0.25,fontSize:10,fontFace:"Arial",bold:true,color:AMBER,margin:0});
      curY+=0.35;

      pkgTypes.forEach((pkg,pi)=>{
        const icon=pkg==="Carton"?"📦":pkg==="Returnable"?"♻️":"📋";
        const entries=Object.values(pkgMap).filter(v=>v.pkg===pkg);
        const pkgColor=pkg==="Carton"?AMBER:pkg==="Returnable"?GREEN:BLUE;

        slide.addText(icon+" "+pkg,{x:colX+0.15,y:curY,w:4.3,h:0.22,fontSize:10,fontFace:"Arial",bold:true,color:pkgColor,margin:0});
        curY+=0.25;

        // Mini table header
        const mhOpts={fill:{color:BG3},color:TEXT3,fontSize:8,bold:true,fontFace:"Arial",align:"center",valign:"middle"};
        const miniRows=[[
          {text:"PRODUCT TYPE",options:{...mhOpts,align:"left"}},
          {text:"BOXES",options:mhOpts},
          {text:"LABELS",options:mhOpts},
          {text:"TOTAL QTY",options:mhOpts}
        ]];
        let subB=0,subL=0,subQ=0;
        entries.forEach((e,ei)=>{
          const rb=ei%2===0?BG2:"1A2332";
          const cOpts={fill:{color:rb},fontSize:9,fontFace:"Arial",valign:"middle"};
          miniRows.push([
            {text:e.prod,options:{...cOpts,color:TEXT,align:"left"}},
            {text:String(e.boxes),options:{...cOpts,color:TEXT2,align:"center"}},
            {text:String(e.labels),options:{...cOpts,color:TEXT2,align:"center"}},
            {text:String(e.qty),options:{...cOpts,color:AMBER,bold:true,align:"center"}}
          ]);
          subB+=e.boxes;subL+=e.labels;subQ+=e.qty;
        });
        // Subtotal
        const stOpts={fill:{color:BG3},fontSize:9,fontFace:"Arial",bold:true,valign:"middle",align:"center"};
        miniRows.push([
          {text:"Subtotal",options:{...stOpts,color:TEXT,align:"left"}},
          {text:String(subB),options:{...stOpts,color:TEXT2}},
          {text:String(subL),options:{...stOpts,color:TEXT2}},
          {text:String(subQ),options:{...stOpts,color:AMBER}}
        ]);

        const rowH=0.22;
        slide.addTable(miniRows,{x:colX+0.1,y:curY,w:4.4,colW:[1.8,0.8,0.8,1],rowH,border:{pt:0.3,color:BORDER},margin:0});
        curY+=miniRows.length*rowH+0.15;
      });

      // Grand totals
      const shB=sh.boxes.length;
      const shL=sh.boxes.reduce((a,b)=>a+b.items.length,0);
      const shQ=sh.boxes.reduce((a,b)=>a+b.items.reduce((x,it)=>x+(parseInt(it.qty)||0),0),0);
      const totY=1.0+cardH-0.55;
      const tw=1.4;
      [[shB,"Total Boxes",BLUE],[shL,"Total Labels",GREEN],[shQ,"Total Quantity",AMBER]].forEach(([v,l,c],ti)=>{
        const tx=colX+0.2+ti*(tw+0.1);
        slide.addText(String(v),{x:tx,y:totY,w:tw,h:0.3,fontSize:20,fontFace:"Arial",bold:true,color:c,align:"center",margin:0});
        slide.addText(l,{x:tx,y:totY+0.28,w:tw,h:0.2,fontSize:8,fontFace:"Arial",color:TEXT3,align:"center",margin:0});
      });
    });

    // Footer
    slide.addText("T.A.S. FORCE  |  Outbound Quality Report",{x:0.5,y:5.25,w:9,h:0.3,fontSize:8,fontFace:"Calibri",color:TEXT3,align:"left",margin:0});
  }

  pres.writeFile({fileName:"Scan_Report_"+dateStr.replace(/\//g,"-")+".pptx"}).then(()=>{
    showToast("PPTX Report generated!","success");beep("done");
  });
}

// CSV Import parser
function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());if(lines.length<2)return[];
  const h=lines[0].split(/[;\t,]/).map(x=>x.trim().toLowerCase());
  return lines.slice(1).map(l=>{const v=l.split(/[;\t,]/);const o={};h.forEach((k,i)=>o[k]=(v[i]||"").trim());return o;});
}

// License protection
const LICENSE_START="2026-05-31";
function getLicenseCode(){
  const now2=new Date();
  const day=now2.getDay();
  const mon=new Date(now2);mon.setDate(mon.getDate()-(day===0?6:day-1));
  const seed=mon.getFullYear()*10000+(mon.getMonth()+1)*100+mon.getDate();
  const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let h=seed;let code="MV";
  for(let i=0;i<6;i++){
    h=((h^(h<<13))>>>0);h=((h^(h>>17))>>>0);h=((h^(h<<5))>>>0);
    h=(h+i*7919+seed)>>>0;
    code+=chars[h%chars.length];
  }
  return code;
}
function checkLicense(){
  const now2=new Date();
  const today=now2.toISOString().slice(0,10);
  if(today<LICENSE_START) return true;
  const stored=localStorage.getItem("sc_license_until")||"";
  if(stored&&today<=stored) return true;
  // Expired — ask for code
  const code=prompt("🔒 License expired.\n\nContact administrator for activation code.\n\nEnter code:");
  if(!code) return false;
  if(code.trim()===getLicenseCode()||code.trim()==="Milos2706988733536!"){
    // Extend 7 days
    const ext=new Date(now2);ext.setDate(ext.getDate()+7);
    localStorage.setItem("sc_license_until",ext.toISOString().slice(0,10));
    return true;
  }
  alert("❌ Invalid code. Contact Milos Vasic for support.");
  return false;
}

async function init(){

  if(!checkLicense()){
    document.getElementById("app").innerHTML='<div style="text-align:center;padding:60px;color:#FF4444;font-size:18px;font-family:Calibri"><h2>🔒 License Required</h2><p>Contact administrator for activation code.</p><button onclick="location.reload()" style="margin-top:20px;padding:10px 30px;font-size:16px;cursor:pointer">🔄 Try Again</button></div>';
    return;
  }
  // Migrate localStorage → IndexedDB (one-time, for big data)
  await migrateToIDB();

  let p = load("parts",[]);
  if(p.length===0){ p=seedParts(); save("parts",p); }
  STATE.parts = p;

  // Load big data from IndexedDB
  STATE.ships = await idbLoad("ships") || [];
  STATE.ships.sort((a,b)=>(a.createdAt||"").localeCompare(b.createdAt||""));
  // Sanitize ships — ensure all arrays exist
  STATE.ships.forEach(sh=>{
    sh.boxes=Array.isArray(sh.boxes)?sh.boxes:Object.values(sh.boxes||{});
    sh.asns=Array.isArray(sh.asns)?sh.asns:Object.values(sh.asns||{});
    sh.boxes.forEach(b=>{
      if(!b) return;
      b.items=Array.isArray(b.items)?b.items:Object.values(b.items||{});
    });
    sh.boxes=sh.boxes.filter(Boolean);
  });
  STATE.active = await idbLoad("active") || null;
  STATE.commDates = await idbLoad("commDates") || {};

  // Load small data from localStorage
  STATE.dnHistory = load("dnHistory",[]);
  let dnCleaned=false;
  STATE.dnHistory.forEach(e=>{if(e.fullData){delete e.fullData;dnCleaned=true;}});
  if(dnCleaned) save("dnHistory",STATE.dnHistory);
  STATE.urgentParts = load("urgentParts",[]);
  STATE.urgentParts.forEach(u=>{if(!u.origQty)u.origQty=u.qty;});
  STATE.urgentUploadDate = load("urgentUploadDate","");
  STATE.urgentReserved = load("urgentReserved",[]);
  STATE.urgentPNsAll = load("urgentPNsAll",[]);
  STATE.vdaHistory = await idbLoad("vdaHistory") || load("vdaHistory",[]);
  if(!Array.isArray(STATE.vdaHistory)) STATE.vdaHistory=Object.values(STATE.vdaHistory||{}).filter(Boolean);
  STATE.vdaHistory.forEach(v=>{
    if(!v) return;
    v.scanned=Array.isArray(v.scanned)?v.scanned:Object.values(v.scanned||{}).filter(Boolean);
    v.vdaLabels=Array.isArray(v.vdaLabels)?v.vdaLabels:Object.values(v.vdaLabels||{}).filter(Boolean);
    v.alerts=Array.isArray(v.alerts)?v.alerts:Object.values(v.alerts||{}).filter(Boolean);
    v.scanned.forEach(s=>{if(s&&s.alerts&&!Array.isArray(s.alerts))s.alerts=Object.values(s.alerts).filter(Boolean);});
  });
  STATE.vdaHistory=STATE.vdaHistory.filter(Boolean);
  const todayInit=new Date().toISOString().slice(0,10);
  STATE.vdaBoxCount = parseInt(load("vdaBoxCount",0))||0;
  STATE.vdaCurBoxLabels = parseInt(load("vdaCurBoxLabels",0))||0;
  STATE.vdaCurBoxPcs = parseInt(load("vdaCurBoxPcs",0))||0;

  // Migrate old VDA history — reassign parts to correct VDA labels
  let vdaMigrated=0;
  STATE.vdaHistory.forEach(v=>{
    if(!v.vdaLabels||!v.scanned) return;
    // Check if parts need migration (no matchLabelIdx)
    const needsFix=v.scanned.some(s=>s.matchLabelIdx===undefined||s.matchLabelIdx===null);
    if(!needsFix) return;
    // Reassign each part to correct VDA label by PN
    const labelCounts=v.vdaLabels.map(()=>0);
    v.scanned.forEach(s=>{
      let matched=-1;
      for(let li=0;li<v.vdaLabels.length;li++){
        if(v.vdaLabels[li].pn===s.pn&&labelCounts[li]<v.vdaLabels[li].qty){
          matched=li;break;
        }
      }
      if(matched===-1){
        // Try any label with same PN even if full
        matched=v.vdaLabels.findIndex(lb=>lb.pn===s.pn);
      }
      s.matchLabelIdx=matched;
      s.sn=matched>=0&&v.vdaLabels[matched]?v.vdaLabels[matched].sn||s.sn:s.sn;
      if(matched>=0) labelCounts[matched]++;
    });
    vdaMigrated++;
  });
  if(vdaMigrated){save("vdaHistory",STATE.vdaHistory);console.log("Migrated "+vdaMigrated+" VDA history entries — linked parts to VDA labels");}
  STATE.vdaOperator = load("vdaOperator","");
  if(STATE.active) STATE.step = "scan";

  console.log("✅ Loaded: "+STATE.ships.length+" ships, "+Object.keys(STATE.commDates).length+" comm dates, "+STATE.parts.length+" parts (IndexedDB)");
  
  // Cloud sync: NO auto-pull — only manual via ☁️ Refresh button
  // This prevents cloud from overwriting today's local scans
  if(getFirebaseURL()){
    console.log("☁️ Firebase connected (manual refresh only)");
  }
  render();
}

// RENDER ENGINE
// ═══════════════════════════════════════════
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="onclick"||k==="onkeydown"||k==="onchange"||k==="oninput"||k==="onmouseenter"||k==="onmouseleave") el[k]=v;
    else if(k==="className") el.className=v;
    else if(k==="style"&&typeof v==="object") Object.assign(el.style,v);
    else if(k==="checked") el.checked=v;
    else if(k==="value") el.value=v;
    else if(k==="type") el.type=v;
    else if(k==="placeholder") el.placeholder=v;
    else if(k==="accept") el.accept=v;
    else if(k==="autofocus") setTimeout(()=>el.focus(),50);
    else if(k==="htmlFor") el.htmlFor=v;
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false)return;
    if(typeof c==="string"||typeof c==="number") el.appendChild(document.createTextNode(c));
    else if(c instanceof HTMLElement) el.appendChild(c);
  });
  return el;
}

  else if(STATE.tab==="vdacheck") renderVDACheck(main);
  else renderHistory(main);
  app.appendChild(main);
}

// ═══════════════════════════════════════════
// SCAN TAB
// ═══════════════════════════════════════════
function renderScan(el){
  if(!STATE.active && STATE.step==="scan") STATE.step="setup";
  if(STATE.active && STATE.step==="setup") STATE.step="scan";

  if(STATE.step==="setup") return renderSetup(el);
  renderScanning(el);
}

function renderSetup(el){
  el.appendChild(h("h2",{className:"sec-title"},"New Shipment"));
  el.appendChild(h("p",{style:{color:"var(--text2)",fontSize:"14px",marginBottom:"16px"}},"Select packaging and product type for the first box. ASN and vehicle details are entered when closing the shipment."));
  const card=h("div",{className:"card"});

  card.appendChild(h("label",{className:"label"},"Quick Select"));
  card.appendChild(renderShortcuts((prod,pkg)=>{STATE.prod=prod;STATE.pkg=pkg;render();},STATE.prod,STATE.pkg));
  card.appendChild(h("label",{className:"label"},"Package Type"));
  const pg=h("div",{className:"btn-group",style:{marginBottom:"16px"}});
  ["Carton","Returnable","No Packaging"].forEach(x=>{
    pg.appendChild(h("button",{className:"tog"+(STATE.pkg===x?" active":""),onclick:()=>{STATE.pkg=x;render();}},(x==="Carton"?"📦 ":x==="Returnable"?"🔩 ":"📋 ")+x));
  });
  card.appendChild(pg);

  card.appendChild(h("label",{className:"label"},"Product Type"));
  const prg=h("div",{className:"btn-group"});
  ["Main Carrier","Armrest","Beltline","FOST"].forEach(x=>{
    prg.appendChild(h("button",{className:"tog"+(STATE.prod===x?" active":""),onclick:()=>{STATE.prod=x;render();}},x));
  });
  card.appendChild(prg);

  // Show box limit for current selection
  const setupLimit=getBoxLimit(STATE.prod,STATE.pkg);
  const limParts=[];
  if(setupLimit.maxLabels<9999) limParts.push("Max "+setupLimit.maxLabels+" labels");
  if(setupLimit.maxQty) limParts.push("Max "+setupLimit.maxQty+" pcs");
  if(setupLimit.maxPNs) limParts.push("Max "+setupLimit.maxPNs+" different PNs");
  if(limParts.length) card.appendChild(h("p",{style:{color:"var(--amber)",fontSize:"12px",margin:"8px 0 0",fontWeight:"600"}},"📏 "+STATE.prod+" "+STATE.pkg+": "+limParts.join(" · ")));

  card.appendChild(h("button",{className:"btn-primary",onclick:()=>{
    STATE.active={id:uid(),asns:[],vehicle:"",plate:"",createdAt:now(),status:"active",boxes:[{id:1,pkg:STATE.pkg,prod:STATE.prod,items:[],expectedLabels:0}]};
    save("active",STATE.active);STATE.step="scan";STATE.phase="pn";STATE.curPn="";STATE.curQty="";STATE.curDesc="";
    beep("done");showToast("Shipment created — start scanning!","success");render();
  }},"▶ Start Scanning"));

  el.appendChild(card);
}

function renderScanning(el){
  const active=STATE.active;if(!active)return;
  const box=active.boxes[active.boxes.length-1];
  const totI=active.boxes.reduce((s,b)=>s+b.items.length,0);
  const totB=active.boxes.length;

  // Info bar
  const bar=h("div",{className:"info-bar"});
  const exp=box.expectedLabels||0;
  const cur=box.items.length;
  const labelMatch=exp>0&&cur===exp;
  const labelOver=exp>0&&cur>exp;
  bar.appendChild(h("div",{className:"pill"},"📦 Box "+totB+" ("+box.pkg+" · "+box.prod+")"));

  // Box capacity limit info
  const limInfo=getBoxLimitInfo(box);
  if(limInfo){
    const lim=getBoxLimit(box.prod,box.pkg);
    const isFull=(lim.maxLabels<9999&&box.items.length>=lim.maxLabels)||(lim.maxQty&&box.items.reduce((s,it)=>s+(parseInt(it.qty)||0),0)>=lim.maxQty);
    bar.appendChild(h("div",{className:"pill",style:{color:isFull?"var(--red)":"var(--amber)",fontWeight:"600",border:"1px solid",borderColor:isFull?"var(--red)":"var(--amber)",borderRadius:"8px"}},
      isFull?"⛔ FULL — ":"📏 ",limInfo
    ));
  }

  if(exp>0){
    const lPill=h("div",{className:"pill",style:{background:labelMatch?"rgba(0,176,80,.15)":labelOver?"rgba(245,158,11,.15)":"rgba(59,130,246,.1)",borderColor:labelMatch?"var(--green)":labelOver?"var(--amber)":"var(--blue)",border:"1px solid",borderRadius:"8px"}},
      "🏷️ ",h("b",{style:{color:labelMatch?"var(--green)":labelOver?"var(--amber)":"var(--text)"}},cur+"/"+exp),
      labelMatch?" ✓":labelOver?" +"+(cur-exp):" labels"
    );
    bar.appendChild(lPill);
  }else{
    bar.appendChild(h("div",{className:"pill"},"🏷️ ",h("b",null,String(totI))," labels"));
  }

  // Edit expected labels
  bar.appendChild(h("div",{className:"pill",style:{cursor:"pointer",opacity:".7"},onclick:()=>{
    const val=prompt("Expected labels for Box "+totB+":",String(exp||""));
    if(val!==null){box.expectedLabels=parseInt(val)||0;save("active",active);render();}
  }},"✏️ "+(exp?"Target: "+exp:"Set target")));

  bar.appendChild(h("div",{className:"pill"},"🕐 Started: "+fDT(active.createdAt)));
  const cdCount=Object.keys(STATE.commDates).length;
  if(cdCount>0) bar.appendChild(h("div",{className:"pill",style:{color:"var(--amber)"}},"📅 "+cdCount+" comm dates loaded"));
  el.appendChild(bar);

  // MC Box Type KPI — Green (CAR/Z) vs Blue (V/W) — counted per BOX
  const mc=countMCBoxes(active.boxes);
  if(mc.greenBoxes||mc.blueBoxes){
    const mcBar=h("div",{style:{display:"flex",gap:"8px",marginTop:"8px",flexWrap:"wrap"}});
    mcBar.appendChild(h("div",{style:{padding:"4px 12px",borderRadius:"6px",background:"rgba(0,176,80,.1)",border:"1px solid #00B050",fontSize:"12px",fontWeight:"700",color:"#00B050"}},"🟩 Green: "+mc.greenBoxes+" box / "+mc.greenPcs+"pcs"));
    mcBar.appendChild(h("div",{style:{padding:"4px 12px",borderRadius:"6px",background:"rgba(59,130,246,.1)",border:"1px solid #3B82F6",fontSize:"12px",fontWeight:"700",color:"#3B82F6"}},"🟦 Blue: "+mc.blueBoxes+" box / "+mc.bluePcs+"pcs"));
    mcBar.appendChild(h("div",{style:{padding:"4px 12px",borderRadius:"6px",background:"var(--bg3)",border:"1px solid var(--border)",fontSize:"12px",fontWeight:"600",color:"var(--text2)"}},"Total MC: "+(mc.greenBoxes+mc.blueBoxes)+" box / "+(mc.greenPcs+mc.bluePcs)+"pcs"));
    el.appendChild(mcBar);
  }

  // Scan progress
  if(STATE.curPn||STATE.curQty){
    const prog=h("div",{className:"scan-progress"});
    prog.appendChild(h("span",{style:{color:STATE.curPn?"var(--green)":"var(--text3)"}},"✓ P: "+(STATE.curPn||"—")));
    if(STATE.curDesc) prog.appendChild(h("span",{style:{color:"var(--text2)",fontSize:"12px"}},"("+STATE.curDesc+")"));
    prog.appendChild(h("span",{style:{color:STATE.curQty?"var(--green)":"var(--text3)"}},(STATE.curQty?"✓ ":"○ ")+"Q: "+(STATE.curQty||"—")));
    prog.appendChild(h("span",{style:{color:"var(--text3)"}},"○ S: —"));
    el.appendChild(prog);
  }

  // Scan area
  const PH={pn:{l:"PART NUMBER (P) or QR CODE",c:"var(--blue)",i:"🔷"},qty:{l:"QUANTITY (Q)",c:"var(--green)",i:"🔢"},sn:{l:"SERIAL (S)",c:"var(--amber)",i:"🔑"}};
  const ph=PH[STATE.phase];

  const area=h("div",{className:"scan-area"});
  const ind=h("div",{className:"phase-ind",style:{borderColor:ph.c}});
  ind.appendChild(h("span",{style:{fontSize:"28px"}},ph.i));
  ind.appendChild(h("span",{className:"phase-label",style:{color:ph.c}},ph.l));
  area.appendChild(ind);

  const inp=h("input",{className:"scan-input",style:{borderColor:ph.c},placeholder:"Scan "+ph.l+"...",autofocus:true,
    onkeydown:e=>{
      if(e.key!=="Enter")return;
      let v=e.target.value.trim();if(!v)return;

      // ── QR CODE AUTO-DETECT ──
      // Format: ||S211394003||V1157||PM00124029-8AP4||Q5
      if(v.includes("||")){
        const parts2=v.split("||").filter(x=>x);
        let qrPN="",qrQty=0,qrSN="";
        parts2.forEach(seg=>{
          const s=seg.trim();
          if(s.startsWith("S")&&/^\d/.test(s.substring(1))) qrSN=s.substring(1).trim();
          else if(s.startsWith("P")) qrPN=s.substring(1).trim();
          else if(s.startsWith("Q")&&/^\d/.test(s.substring(1))) qrQty=parseInt(s.substring(1));
        });
        if(qrPN&&qrQty&&qrSN){
          // Validate PN
          const p=STATE.parts.find(x=>x.partNumber.toUpperCase()===qrPN.toUpperCase());
          if(!p&&STATE.parts.length){beep("err");showToast("❌ "+qrPN+" not found in database!","error");e.target.value="";return;}
          if(p&&!p.active){beep("err");showToast("⚠️ "+qrPN+" is inactive!","error");e.target.value="";return;}
          // Check duplicate serial
          const allSN=active.boxes.flatMap(b=>b.items.map(i=>i.sn));
          if(allSN.includes(qrSN)){beep("err");showToast("⚠️ DUPLICATE! "+qrSN+" — skipped","error");STATE.curPn="";STATE.curQty="";STATE.curDesc="";STATE.phase="pn";e.target.value="";render();return;}
          // Check box limit
          const curBox=active.boxes[active.boxes.length-1];
          const limitErr=checkBoxLimit(curBox,qrQty,qrPN);
          if(limitErr){beep("err");showToast(limitErr,"error");e.target.value="";return;}
          // All good — add item directly
          const item={pn:qrPN.toUpperCase(),desc:p?p.description:"",qty:qrQty,sn:qrSN,ts:now(),status:"OK",failure:"",action:"",prodDate:"",prodTime:""};
          const addItemQR=()=>{
            active.boxes[active.boxes.length-1].items.push(item);
            save("active",active);STATE.curPn="";STATE.curQty="";STATE.curDesc="";STATE.phase="pn";
            beep("done");showToast("✓ QR scanned — "+qrPN+" (×"+qrQty+")","success");
            render();
          };
          if(isUrgentPN(qrPN)){
            beep("err");
            showUrgentModal(item,addItemQR,()=>{
              STATE.urgentReserved.push({...item,reservedAt:now(),fromVehicle:active.vehicleNumber||"Active"});
              deductUrgent(item.pn,item.qty);
              save("urgentReserved",STATE.urgentReserved);
              STATE.curPn="";STATE.curQty="";STATE.curDesc="";STATE.phase="pn";
              beep("done");showToast("🚨 Reserved for urgent: "+qrPN,"info");render();
            });
          }else{addItemQR();}
          e.target.value="";return;
        }
      }

      // ── BARCODE (manual 3-step) ──
      const prefixMap={pn:"P",qty:"Q",sn:"S"};
      const pfx=prefixMap[STATE.phase];
      if(STATE.phase==="pn"){
        const bcInfo=extractBarcodeInfo(v);
        console.log("BC SCAN:",v,"→ PN:",bcInfo.pn,"Date:",bcInfo.prodDate,"Time:",bcInfo.prodTime);
        let extracted=bcInfo.pn;
        if(extracted===v.toUpperCase().trim()&&pfx&&v.toUpperCase().startsWith(pfx)&&v.length>1){
          extracted=extractBarcodeInfo(v.substring(1).trim()).pn;
        }
        const p=STATE.parts.find(x=>x.partNumber.toUpperCase()===extracted.toUpperCase());
        if(!p&&STATE.parts.length){beep("err");showToast("❌ "+extracted+" not found in database!","error");e.target.value="";return;}
        if(p&&!p.active){beep("err");showToast("⚠️ "+extracted+" is inactive!","error");e.target.value="";return;}
        STATE.curPn=extracted;STATE.curDesc=p?p.description:"";STATE.curProdDate=bcInfo.prodDate;STATE.curProdTime=bcInfo.prodTime;STATE.phase="qty";beep("ok");
      }else if(STATE.phase==="qty"){
        if(v.toUpperCase().startsWith("Q")&&v.length>1) v=v.substring(1).trim();
        const q=parseInt(v);if(isNaN(q)||q<=0){beep("err");showToast("Invalid quantity!","error");e.target.value="";return;}
        STATE.curQty=q;STATE.phase="sn";beep("ok");
      }else if(STATE.phase==="sn"){
        if(v.toUpperCase().startsWith("S")&&v.length>1&&/^\d/.test(v.substring(1))) v=v.substring(1).trim();
        const allSN=active.boxes.flatMap(b=>b.items.map(i=>i.sn));
        if(allSN.includes(v)){beep("err");showToast("⚠️ DUPLICATE! "+v+" — entry reset, scan again","error");STATE.curPn="";STATE.curQty="";STATE.curDesc="";STATE.phase="pn";e.target.value="";render();return;}
        // Check box limit
        const curBox=active.boxes[active.boxes.length-1];
        const limitErr=checkBoxLimit(curBox,STATE.curQty,STATE.curPn);
        if(limitErr){beep("err");showToast(limitErr,"error");STATE.curPn="";STATE.curQty="";STATE.curDesc="";STATE.phase="pn";e.target.value="";render();return;}
        const item={pn:STATE.curPn,desc:STATE.curDesc,qty:STATE.curQty,sn:v,ts:now(),status:"OK",failure:"",action:"",prodDate:STATE.curProdDate||"",prodTime:STATE.curProdTime||""};
        const addItemBC=()=>{
          active.boxes[active.boxes.length-1].items.push(item);
          save("active",active);
          STATE.curPn="";STATE.curQty="";STATE.curDesc="";STATE.phase="pn";
          beep("done");showToast("✓ Label scanned!","success");
          render();
        };
        if(isUrgentPN(STATE.curPn)){
          beep("err");
          showUrgentModal(item,addItemBC,()=>{
            STATE.urgentReserved.push({...item,reservedAt:now(),fromVehicle:active.vehicleNumber||"Active"});
              deductUrgent(item.pn,item.qty);
            save("urgentReserved",STATE.urgentReserved);
            STATE.curPn="";STATE.curQty="";STATE.curDesc="";STATE.phase="pn";
            beep("done");showToast("🚨 Reserved for urgent: "+item.pn,"info");render();
          });
        }else{addItemBC();}
      }
      e.target.value="";render();
    }
  });
  area.appendChild(inp);
  area.appendChild(h("p",{className:"scan-hint"},"Scan QR code (auto-detects all fields) or barcode step-by-step"));
  el.appendChild(area);

  // Action buttons — below scan area
  const btns=h("div",{style:{display:"flex",gap:"10px",flexWrap:"wrap",marginTop:"16px"}});
  btns.appendChild(h("button",{className:"btn-secondary",onclick:()=>{
    // Auto-remove empty boxes
    const before=active.boxes.length;
    active.boxes=active.boxes.filter(b=>b.items.length>0);
    if(active.boxes.length<before){active.boxes.forEach((b,i)=>b.id=i+1);save("active",active);showToast("Removed "+(before-active.boxes.length)+" empty box(es)","info");}
    // Show new box modal
    const ov=document.createElement("div");ov.className="overlay";ov.id="box-modal";
    const mod=h("div",{className:"modal"});
    mod.appendChild(h("h3",{className:"sec-title",style:{marginBottom:"4px"}},"New Box "+(totB+1)));
    mod.appendChild(h("p",{style:{color:"var(--text3)",fontSize:"12px",marginBottom:"16px"}},"Press number or click to create box instantly"));

    // Keyboard listener ref — needs to be accessible to createBoxNow
    let onKey=null;

    function createBoxNow(prod,pkg){
      // Remove keyboard listener
      if(onKey) document.removeEventListener("keydown",onKey,true);
      // Auto-remove empty boxes before creating new one
      const before=active.boxes.length;
      active.boxes=active.boxes.filter(b=>b.items.length>0);
      if(active.boxes.length<before) console.log("Auto-removed "+(before-active.boxes.length)+" empty boxes");
      // Renumber
      active.boxes.forEach((b,i)=>b.id=i+1);
      // Create new
      active.boxes.push({id:active.boxes.length+1,pkg,prod,items:[],expectedLabels:0});
      save("active",active);STATE.pkg=pkg;STATE.prod=prod;STATE.phase="pn";STATE.curPn="";STATE.curQty="";STATE.curDesc="";
      beep("done");showToast("Box "+active.boxes.length+" created ("+prod+" "+pkg+")","success");ov.remove();render();
      // Auto-focus scan input
      setTimeout(()=>{const inp=document.querySelector(".scan-input");if(inp)inp.focus();},150);
    }

    const grid=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"16px"}});
    PKG_SHORTCUTS.forEach((s,i)=>{
      const num=i+1;
      grid.appendChild(h("div",{style:{padding:"12px",background:"var(--bg3)",borderRadius:"8px",cursor:"pointer",border:"1px solid var(--border)",display:"flex",alignItems:"center",gap:"10px",transition:"all .1s"},
        onclick:()=>createBoxNow(s.prod,s.pkg),
        onmouseenter:function(){this.style.borderColor="#23F0C7";this.style.background="rgba(35,240,199,.08)";},
        onmouseleave:function(){this.style.borderColor="var(--border)";this.style.background="var(--bg3)";}
      },
        h("span",{style:{fontSize:"20px",fontWeight:"800",color:"var(--green)",minWidth:"28px",textAlign:"center"}},String(num)),
        h("div",{},
          h("div",{style:{fontWeight:"700",color:"var(--text)",fontSize:"13px"}},s.icon+" "+s.label),
          h("div",{style:{color:"var(--text3)",fontSize:"10px"}},"max "+s.limit)
        )
      ));
    });
    mod.appendChild(grid);

    // Keyboard listener — capture phase
    onKey=function(e){
      const num=parseInt(e.key);
      if(num>=1&&num<=PKG_SHORTCUTS.length){
        e.preventDefault();e.stopPropagation();
        createBoxNow(PKG_SHORTCUTS[num-1].prod,PKG_SHORTCUTS[num-1].pkg);
      }
      if(e.key==="Escape"){document.removeEventListener("keydown",onKey,true);ov.remove();}
    };
    document.addEventListener("keydown",onKey,true);
    // Blur any focused input so keyboard works
    if(document.activeElement) document.activeElement.blur();

    mod.appendChild(h("button",{className:"btn-secondary",onclick:()=>{document.removeEventListener("keydown",onKey,true);ov.remove();}},"Cancel"));
    ov.appendChild(mod);document.body.appendChild(ov);
  }},"📦 New Box"));

  if(box.items.length>0){
    btns.appendChild(h("button",{className:"btn-secondary",style:{borderColor:"var(--red)",color:"var(--red)"},onclick:()=>{
      const rm=box.items.pop();save("active",active);showToast("Removed: "+rm.pn,"info");render();
    }},"↩ Remove Last"));
  }

  btns.appendChild(h("button",{className:"btn-secondary",style:{borderColor:totI?"var(--green)":"var(--red)",color:totI?"var(--green)":"var(--red)"},onclick:()=>{
    if(!totI){STATE.active=null;save("active",null);STATE.step="setup";STATE.asns=[];STATE.asnIn="";STATE.plate="";showToast("Cancelled","info");render();return;}
    // Close shipment modal
    const ov=document.createElement("div");ov.className="overlay";
    const mod=h("div",{className:"modal wide"});
    mod.appendChild(h("h3",{className:"sec-title",style:{marginBottom:"16px"}},"📋 Close Shipment"));

    // Vehicle Number
    mod.appendChild(h("label",{className:"label"},"Van / Truck Number"));
    let closingVehNum="";
    mod.appendChild(h("input",{className:"input",placeholder:"e.g. Van 1, Truck 2, Kombi 3",style:{marginBottom:"16px"},oninput:e=>{closingVehNum=e.target.value;}}));

    // Separator
    mod.appendChild(h("div",{style:{borderTop:"1px solid var(--border)",paddingTop:"16px",marginTop:"4px"}}));
    mod.appendChild(h("h4",{style:{color:"var(--text)",fontSize:"15px",marginBottom:"12px"}},"Scan Summary"));

    // Summary stats
    const info=h("div",{style:{marginBottom:"16px"}});
    [["Date:",fD(active.createdAt)],["Boxes:",String(totB)],["Labels:",String(totI)]].forEach(([l,v])=>{
      info.appendChild(h("div",{className:"sum-row"},h("span",null,l),h("b",null,v)));
    });
    mod.appendChild(info);
    active.boxes.forEach(b=>{
      mod.appendChild(h("div",{style:{marginBottom:"6px",padding:"8px 12px",background:"#1F2937",borderRadius:"6px",display:"flex",justifyContent:"space-between",color:"var(--text4)",fontSize:"14px"}},
        h("span",null,"Box "+b.id+" — "+b.pkg+" · "+b.prod),h("span",{style:{color:"var(--green)",fontWeight:"600"}},String(b.items.length))));
    });

    mod.appendChild(h("p",{style:{color:"var(--text3)",fontSize:"12px",marginTop:"12px",fontStyle:"italic"}},"ASN, Licence Plate, Arrival/Departure and Responsible Person can be filled in the shipment dashboard after closing."));

    // Urgent parts in this shipment
    if(STATE.urgentParts.length>0){
      const urgInShip=[];
      active.boxes.forEach((b,bi)=>b.items.forEach(it=>{
        if(isUrgentPN(it.pn)) urgInShip.push({pn:it.pn,qty:it.qty,box:bi+1});
      }));
      if(urgInShip.length>0){
        mod.appendChild(h("div",{style:{marginTop:"12px",padding:"10px",background:"rgba(245,158,11,.1)",border:"1px solid #F59E0B",borderRadius:"8px"}},
          h("p",{style:{color:"#F59E0B",fontWeight:"700",fontSize:"13px",marginBottom:"6px"}},"🚨 "+urgInShip.length+" URGENT PARTS in this shipment"),
          h("p",{style:{color:"var(--text2)",fontSize:"11px"}},"Vehicle name will be marked with ❗ and urgent quantities will be deducted from the list."),
          ...urgInShip.map(u=>h("p",{style:{color:"#F59E0B",fontSize:"11px",fontFamily:"var(--mono)"}},"• "+u.pn+" ×"+u.qty+" (Box "+u.box+")"))
        ));
      }
    }

    function doFinalize(exp){
      if(!closingVehNum.trim()){showToast("Enter vehicle number!","error");beep("err");return;}
      
      // Check if shipment has urgent parts — add "!" marker
      let hasUrgent=false;
      const vehName=closingVehNum.trim().toLowerCase();
      const isUrgVeh=vehName.includes("van")||vehName.includes("taxi")||vehName.includes("kombi");
      if(STATE.urgentParts.length>0){
        active.boxes.forEach(b=>b.items.forEach(it=>{
          if(isUrgentPN(it.pn)) hasUrgent=true;
        }));
      }
      
      active.vehicleNumber=closingVehNum.trim()+(hasUrgent?" ❗":"");
      active.asns=[];active.vehicle="";active.plate="";
      active.arrival="";active.departure="";active.responsible="";active.asnText="";
      const done={...active,status:"done",doneAt:now()};
      if(exp)exportCSV(done);
      STATE.ships.push(done);save("ships",STATE.ships);STATE.active=null;save("active",null);
      
      // Deduct urgent quantities — only for Van/Taxi/Kombi
      if(hasUrgent&&isUrgVeh){
        done.boxes.forEach(b=>b.items.forEach(it=>{
          if(isUrgentPN(it.pn)) deductUrgent(it.pn,parseInt(it.qty)||0);
        }));
        showToast("🚨 Urgent quantities deducted!","info");
      }else if(hasUrgent&&!isUrgVeh){
        showToast("🚨 Urgent parts detected but NOT deducted (Truck shipment)","info");
      }
      
      STATE.step="setup";STATE.asns=[];STATE.asnIn="";STATE.plate="";STATE.veh="Truck";
      beep("done");showToast("Shipment closed!","success");ov.remove();
      autoBackup();_lastLocalChange=Date.now();
      fbSyncShipment(done);
      // Open dashboard immediately
      STATE.tab="history";STATE.histSel=done;render();
    }

    const mbtn=h("div",{style:{display:"flex",gap:"10px",marginTop:"20px",flexWrap:"wrap"}});
    mbtn.appendChild(h("button",{className:"btn-primary",style:{marginTop:"0",background:"var(--green)"},onclick:()=>doFinalize(true)},"📥 Close + Excel"));
    mbtn.appendChild(h("button",{className:"btn-primary",style:{marginTop:"0"},onclick:()=>doFinalize(false)},"✓ Close"));
    mbtn.appendChild(h("button",{className:"btn-secondary",onclick:()=>ov.remove()},"← Back"));
    mod.appendChild(mbtn);ov.appendChild(mod);document.body.appendChild(ov);
  }},totI===0?"✕ Cancel":"✓ Close Shipment"));
  el.appendChild(btns);

  // All boxes with items — newest box on top
  [...active.boxes].reverse().forEach((bx,ri)=>{
    const bi=active.boxes.length-1-ri;
    if(!bx.items.length && bi < active.boxes.length-1) return;
    const isCurrentBox = bi === active.boxes.length-1;
    const boxLabel = "Box "+(bi+1)+" — "+bx.pkg+" · "+bx.prod;
    const bxExp=bx.expectedLabels||0;
    const bxCur=bx.items.length;
    const bxMatch=bxExp>0&&bxCur===bxExp;
    const bxOver=bxExp>0&&bxCur>bxExp;
    const bxLimInfo=getBoxLimitInfo(bx);
    const bxLim=getBoxLimit(bx.prod,bx.pkg);
    const bxFull=(bxLim.maxLabels<9999&&bxCur>=bxLim.maxLabels)||(bxLim.maxQty&&bx.items.reduce((s,it)=>s+(parseInt(it.qty)||0),0)>=bxLim.maxQty);
    const labelInfo=bxLimInfo?bxLimInfo:bxExp>0?(bxCur+"/"+bxExp+(bxMatch?" ✓":bxOver?" +("+(bxCur-bxExp)+")":"")):(bxCur+" labels");
    const labelColor=bxFull?"var(--red)":bxMatch?"var(--green)":bxOver?"var(--amber)":bxExp>0&&bxCur<bxExp?"var(--blue)":"var(--text)";
    const boxHdr=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:"20px",marginBottom:"8px"}},
      h("h3",{className:"sec-title",style:{margin:0,color:isCurrentBox?"var(--amber)":"var(--text)"}},
        (isCurrentBox?"📦 ":"✓ ")+boxLabel+" ",h("span",{style:{color:labelColor,fontWeight:"700"}},"("+labelInfo+")")
      ),
      h("div",{style:{display:"flex",gap:"6px"}},
        h("button",{style:{background:"none",border:"1px solid var(--amber)",borderRadius:"6px",cursor:"pointer",color:"var(--amber)",fontSize:"12px",padding:"4px 10px",opacity:".7"},onclick:e=>{
          e.stopPropagation();showEditBoxModal(bx,"active");
        }},"✏️"),
        active.boxes.length>1?h("button",{style:{background:"none",border:"1px solid var(--red)",borderRadius:"6px",cursor:"pointer",color:"var(--red)",fontSize:"12px",padding:"4px 10px",opacity:".7"},onclick:e=>{
        e.stopPropagation();
        const ov=document.createElement("div");ov.className="overlay";
        const mod=h("div",{className:"modal"});
        mod.appendChild(h("h3",{style:{color:"var(--red)",fontSize:"16px",fontWeight:"700",marginBottom:"12px"}},"Delete Box "+(bi+1)+"?"));
        mod.appendChild(h("p",{style:{color:"var(--text2)",fontSize:"14px",marginBottom:"8px"}},boxLabel+" — "+bx.items.length+" labels will be removed."));
        mod.appendChild(h("p",{style:{color:"var(--text3)",fontSize:"13px",marginBottom:"20px"}},"Remaining boxes will be renumbered automatically."));
        const mb=h("div",{style:{display:"flex",gap:"10px"}});
        mb.appendChild(h("button",{className:"btn-primary",style:{marginTop:0,background:"var(--red)"},onclick:()=>{
          active.boxes.splice(bi,1);
          active.boxes.forEach((b,i)=>b.id=i+1);
          save("active",active);beep("done");showToast("Box deleted, renumbered to "+active.boxes.length+" boxes","success");
          STATE.phase="pn";STATE.curPn="";STATE.curQty="";STATE.curDesc="";
          ov.remove();render();
        }},"🗑️ Yes, delete"));
        mb.appendChild(h("button",{className:"btn-secondary",onclick:()=>ov.remove()},"Cancel"));
        mod.appendChild(mb);ov.appendChild(mod);document.body.appendChild(ov);
      }},"🗑️ Delete box"):null
      )
    );
    el.appendChild(boxHdr);
    if(bx.items.length){
      const tbl=h("div",{className:"tbl"});
      tbl.appendChild(h("div",{className:"tbl-h"},
        h("span",{style:{flex:1.8}},"Part Number"),h("span",{style:{flex:2}},"Description"),
        h("span",{style:{flex:.5,textAlign:"center"}},"Qty"),h("span",{style:{flex:1.1}},"Serial"),h("span",{style:{flex:.7}},"Comm"),h("span",{style:{flex:.8}},"Prod"),h("span",{style:{flex:1}},"Time"),h("span",{style:{flex:.6,textAlign:"center"}},"Status"),h("span",{style:{flex:.3}},"")
      ));
      [...bx.items].reverse().forEach((it,ri)=>{
        const origIdx=bx.items.length-1-ri;
        tbl.appendChild(renderItemRow(it,origIdx,bx,"active"));
      });
      el.appendChild(tbl);
    }
  });
}
