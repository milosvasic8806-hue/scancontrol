// PARTS TAB
// ═══════════════════════════════════════════
function renderParts(el){
  const parts=STATE.parts;

  const top=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"10px",marginBottom:"16px"}});
  top.appendChild(h("h2",{className:"sec-title",style:{margin:0}},"Parts Database ("+parts.length+")"));
  const btns=h("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap"}});
  btns.appendChild(h("button",{className:"btn-small",onclick:()=>{
    const ov=document.createElement("div");ov.className="overlay";
    const mod=h("div",{className:"modal"});
    mod.appendChild(h("h3",{className:"sec-title",style:{marginBottom:"16px"}},"New Part"));
    let npn="",ndesc="",npt="Main Carrier";
    mod.appendChild(h("label",{className:"label"},"Part Number *"));
    const i1=h("input",{className:"input",placeholder:"MY0743355-9A84",oninput:e=>npn=e.target.value});mod.appendChild(i1);
    mod.appendChild(h("label",{className:"label"},"Description"));
    const i2=h("input",{className:"input",placeholder:"Part description",oninput:e=>ndesc=e.target.value});mod.appendChild(i2);
    mod.appendChild(h("label",{className:"label"},"Type"));
    const tg=h("div",{className:"btn-group",style:{marginBottom:"16px"}});
    ["Main Carrier","Armrest","Beltline","FOST"].forEach(x=>{
      tg.appendChild(h("button",{className:"tog"+(npt===x?" active":""),onclick:function(){npt=x;tg.querySelectorAll("button").forEach(b=>b.className="tog");this.className="tog active";}},x));
    });
    mod.appendChild(tg);
    const mb=h("div",{style:{display:"flex",gap:"10px"}});
    mb.appendChild(h("button",{className:"btn-primary",style:{marginTop:0},onclick:()=>{
      if(!npn.trim()){showToast("PN required!","error");return;}
      if(parts.find(p=>p.partNumber.toUpperCase()===npn.trim().toUpperCase())){showToast("Already exists!","error");return;}
      parts.push({partNumber:npn.trim(),description:ndesc.trim(),productType:npt,active:true});
      save("parts",parts);beep("ok");showToast("Added!","success");ov.remove();render();
    }},"✓ Save"));
    mb.appendChild(h("button",{className:"btn-secondary",onclick:()=>ov.remove()},"Cancel"));
    mod.appendChild(mb);ov.appendChild(mod);document.body.appendChild(ov);
  }},"+ Add"));

  const fileInp=h("input",{type:"file",accept:".csv,.txt,.tsv",style:{display:"none"},onchange:e=>{
    const f=e.target.files?.[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>{
      const rows=parseCSV(ev.target.result);let c=0;
      rows.forEach(row=>{
        const pn=row["partnumber"]||row["part_number"]||row["item number"]||Object.values(row)[0]||"";
        const desc=row["description"]||row["desc"]||Object.values(row)[1]||"";
        const pt=row["producttype"]||row["type"]||"Main Carrier";
        if(pn&&!parts.find(p=>p.partNumber.toUpperCase()===pn.toUpperCase())){parts.push({partNumber:pn.trim(),description:desc.trim(),productType:pt.trim(),active:true});c++;}
      });
      save("parts",parts);showToast("Imported: "+c+" new","success");beep("done");render();
    };r.readAsText(f);
  }});
  btns.appendChild(fileInp);
  btns.appendChild(h("button",{className:"btn-small",onclick:()=>fileInp.click()},"📥 Import CSV"));
  btns.appendChild(h("button",{className:"btn-small",style:{borderColor:"var(--red)",color:"var(--red)"},onclick:()=>{
    STATE.parts=seedParts();save("parts",STATE.parts);showToast("Reset: "+SEED.length+" parts","success");render();
  }},"↻ Reset"));
  top.appendChild(btns);
  el.appendChild(top);

  // Search + filter
  const sf=h("div",{style:{display:"flex",gap:"8px",marginBottom:"16px",flexWrap:"wrap"}});
  sf.appendChild(h("input",{className:"input",style:{flex:"1",minWidth:"200px"},value:STATE.partsSearch,placeholder:"🔍 Search by PN or description...",oninput:e=>{STATE.partsSearch=e.target.value;render();}}));
  const sel=h("select",{className:"select",value:STATE.partsFilter,onchange:e=>{STATE.partsFilter=e.target.value;render();}});
  [["all","All ("+parts.length+")"],["active","Active"],["inactive","Inactive"],["Main Carrier","Main Carrier"],["Armrest","Armrest"],["Beltline","Beltline"],["FOST","FOST"]].forEach(([v,l])=>{
    const opt=h("option",{value:v},l);if(v===STATE.partsFilter)opt.selected=true;sel.appendChild(opt);
  });
  sf.appendChild(sel);
  el.appendChild(sf);

  // Filter
  const q=STATE.partsSearch.toLowerCase();
  const filtered=parts.filter(p=>{
    const ms=p.partNumber.toLowerCase().includes(q)||p.description.toLowerCase().includes(q);
    const mf=STATE.partsFilter==="all"||(STATE.partsFilter==="active"&&p.active)||(STATE.partsFilter==="inactive"&&!p.active)||p.productType===STATE.partsFilter;
    return ms&&mf;
  });

  el.appendChild(h("p",{style:{color:"var(--text3)",fontSize:"13px",marginBottom:"12px"}},"Showing: "+Math.min(filtered.length,100)+" of "+filtered.length));

  if(filtered.length){
    const tbl=h("div",{className:"tbl"});
    tbl.appendChild(h("div",{className:"tbl-h"},
      h("span",{style:{flex:2}},"Part Number"),h("span",{style:{flex:3}},"Description"),
      h("span",{style:{flex:1.5}},"Type"),h("span",{style:{flex:.7}},"⚡")
    ));
    filtered.slice(0,100).forEach((p,i)=>{
      const tc=p.productType==="Main Carrier"?"type-mc":p.productType==="Armrest"?"type-ar":p.productType==="Beltline"?"type-bl":"type-fo";
      const row=h("div",{className:"tbl-r",style:{opacity:p.active?"1":".45"}},
        h("span",{className:"pn",style:{flex:2}},p.partNumber),
        h("span",{className:"desc",style:{flex:3}},p.description),
        h("span",{style:{flex:1.5}},h("span",{className:"type-tag "+tc},p.productType)),
        h("span",{style:{flex:.7}},h("button",{style:{background:"none",border:"none",cursor:"pointer",fontSize:"14px"},onclick:()=>{
          const ri=parts.indexOf(p);parts[ri]={...parts[ri],active:!parts[ri].active};save("parts",parts);render();
        }},p.active?"🟢":"🔴"))
      );
      tbl.appendChild(row);
    });
    el.appendChild(tbl);
  }
}

// ═══════════════════════════════════════════
// HISTORY TAB
// ═══════════════════════════════════════════
function renderHistory(el){
  if(STATE.histSel) return renderShipDetail(el,STATE.histSel);

  const ships=STATE.ships;
  const tday=todayStr();
  const tdS=ships.filter(s=>s.createdAt?.startsWith(tday));
  const tdI=tdS.reduce((s,sh)=>s+sh.boxes.reduce((a,b)=>a+b.items.length,0),0);
  const tdB=tdS.reduce((s,sh)=>s+sh.boxes.length,0);
  const tdQ=tdS.reduce((s,sh)=>s+sh.boxes.reduce((a,b)=>a+b.items.reduce((x,it)=>x+(parseInt(it.qty)||0),0),0),0);

  el.appendChild(h("h2",{className:"sec-title"},"Dashboard"));
  const dg=h("div",{className:"dash-grid"});
  const tdNOKtotal=tdS.reduce((s,sh)=>s+sh.boxes.reduce((a,b)=>a+b.items.filter(it=>it.status==="NOK").length,0),0);
  [[tdS.length,"Shipments today","var(--amber)"],[tdB,"Boxes today","var(--blue)"],[tdI,"Labels today","var(--green)"],[tdQ,"Qty today","var(--purple)"],[tdNOKtotal,"NOK today","var(--red)"],[ships.length,"Total Shipments","var(--text2)"]].forEach(([v,l,c])=>{
    dg.appendChild(h("div",{className:"dash-card",style:{borderTop:"3px solid "+c}},h("span",{className:"val"},String(v)),h("span",{className:"lbl"},l)));
  });
  el.appendChild(dg);

  // Per-shipment summary table (today)
  if(tdS.length>0){
    el.appendChild(h("h3",{className:"sec-title",style:{marginTop:"20px"}},"Today — Per Shipment"));
    const tbl=h("div",{className:"tbl"});
    tbl.appendChild(h("div",{className:"tbl-h"},
      h("span",{style:{flex:2}},"Vehicle"),
      h("span",{style:{flex:1,textAlign:"center"}},"Boxes"),
      h("span",{style:{flex:1,textAlign:"center"}},"Labels"),
      h("span",{style:{flex:1,textAlign:"center"}},"Qty"),
      h("span",{style:{flex:.7,textAlign:"center"}},"NOK"),
      h("span",{style:{flex:1.5}},"Time")
    ));
    let tdNOK=0;
    let tdGreen=0,tdBlue=0;
    tdS.forEach((sh,i)=>{
      const sLabels=sh.boxes.reduce((a,b)=>a+b.items.length,0);
      const sBoxes=sh.boxes.length;
      const sQty=sh.boxes.reduce((a,b)=>a+b.items.reduce((x,it)=>x+(parseInt(it.qty)||0),0),0);
      const sNOK=sh.boxes.reduce((a,b)=>a+b.items.filter(it=>it.status==="NOK").length,0);
      const sMC=countMCBoxes(sh.boxes);
      tdNOK+=sNOK;tdGreen+=sMC.greenBoxes;tdBlue+=sMC.blueBoxes;
      const name=sh.vehicleNumber||sh.asnText||(sh.asns||[]).join("/")||"Shipment "+(i+1);
      const hasUrgent=STATE.urgentPNsAll.length>0&&sh.boxes.some(b=>b.items.some(it=>isEverUrgentPN(it.pn)));
      const mcInfo=(sMC.greenBoxes||sMC.blueBoxes)?h("span",{style:{fontSize:"10px",marginLeft:"4px"}},(sMC.greenBoxes?"🟩"+sMC.greenBoxes+" ":"")+(sMC.blueBoxes?"🟦"+sMC.blueBoxes:"")):"";
      tbl.appendChild(h("div",{className:"tbl-r",style:{cursor:"pointer",borderLeft:hasUrgent?"3px solid #F59E0B":"none"},onclick:()=>{STATE.histSel=sh;STATE.histOpenScanner=-1;render();}},
        h("span",{style:{flex:2,fontWeight:"600",color:"var(--amber)"}},hasUrgent?"🚨 ":"",name),
        h("span",{style:{flex:1,textAlign:"center",color:"var(--blue)",fontWeight:"700"}},String(sBoxes)),
        h("span",{style:{flex:1,textAlign:"center",color:"var(--green)",fontWeight:"700"}},String(sLabels)),
        h("span",{style:{flex:1,textAlign:"center",color:"var(--purple)",fontWeight:"700"}},String(sQty),mcInfo),
        h("span",{style:{flex:.7,textAlign:"center",fontWeight:"700",color:sNOK?"var(--red)":"var(--green)"}},sNOK?String(sNOK):"✓"),
        h("span",{style:{flex:1.5,fontSize:"12px",color:"var(--text3)"}},fDT(sh.createdAt))
      ));
    });
    // Total row
    tbl.appendChild(h("div",{className:"tbl-r",style:{background:"var(--bg3)"}},
      h("span",{style:{flex:2,fontWeight:"700",color:"var(--text)"}},"TOTAL"),
      h("span",{style:{flex:1,textAlign:"center",fontWeight:"700",color:"var(--blue)"}},String(tdB)),
      h("span",{style:{flex:1,textAlign:"center",fontWeight:"700",color:"var(--green)"}},String(tdI)),
      h("span",{style:{flex:1,textAlign:"center",fontWeight:"700",color:"var(--purple)"}},String(tdQ),
        (tdGreen||tdBlue)?h("span",{style:{fontSize:"10px",display:"block",marginTop:"2px"}},(tdGreen?"🟩"+tdGreen+" ":"")+(tdBlue?"🟦"+tdBlue:"")):""
      ),
      h("span",{style:{flex:.7,textAlign:"center",fontWeight:"700",color:tdNOK?"var(--red)":"var(--green)"}},tdNOK?String(tdNOK):"✓"),
      h("span",{style:{flex:1.5}})
    ));
    el.appendChild(tbl);
  }

  // Backup / Restore
  const bkRow=h("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap",marginTop:"16px",marginBottom:"24px",padding:"16px",background:"var(--bg2)",borderRadius:"10px",border:"1px solid var(--border)",alignItems:"center"}});
  bkRow.appendChild(h("span",{style:{color:"var(--text2)",fontSize:"13px",marginRight:"8px"}},"💾 Backup:"));
  bkRow.appendChild(h("button",{className:"btn-small",onclick:()=>{
    const backup={version:2,date:now(),ships:STATE.ships,parts:STATE.parts,commDates:STATE.commDates,urgentParts:STATE.urgentParts,urgentReserved:STATE.urgentReserved,urgentPNsAll:STATE.urgentPNsAll,vdaHistory:STATE.vdaHistory};
    const blob=new Blob([JSON.stringify(backup)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download="ScanControl_Backup_"+fD(now()).replace(/\./g,"-")+".json";
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    showToast("Full backup saved! ("+ships.length+" ships, "+Object.keys(STATE.commDates).length+" comm, "+STATE.vdaHistory.length+" VDA)","success");
  }},"📥 Export Backup"));

  const restoreInp=h("input",{type:"file",accept:".json",style:{display:"none"},onchange:e=>{
    const f=e.target.files?.[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.ships||!Array.isArray(data.ships)){showToast("Invalid backup file!","error");return;}
        // Merge: add shipments that don't already exist (by id)
        const existIds=new Set(STATE.ships.map(s=>s.id));
        let added=0;
        data.ships.forEach(s=>{if(!existIds.has(s.id)){STATE.ships.push(s);added++;}});
        STATE.ships.sort((a,b)=>(a.createdAt||"").localeCompare(b.createdAt||""));
        save("ships",STATE.ships);
        // Restore parts if present
        let addedP=0;
        if(data.parts&&Array.isArray(data.parts)){
          const existPNs=new Set(STATE.parts.map(p=>p.partNumber.toUpperCase()));
          data.parts.forEach(p=>{if(!existPNs.has(p.partNumber.toUpperCase())){STATE.parts.push(p);addedP++;}});
          if(addedP)save("parts",STATE.parts);
        }
        // Restore commDates if present
        let addedC=0;
        if(data.commDates&&typeof data.commDates==="object"){
          Object.entries(data.commDates).forEach(([sn,cd])=>{if(!STATE.commDates[sn]){STATE.commDates[sn]=cd;addedC++;}});
          if(addedC)save("commDates",STATE.commDates);
        }
        // Restore vdaHistory if present
        let addedV=0;
        if(data.vdaHistory&&Array.isArray(data.vdaHistory)){
          const existIds=new Set(STATE.vdaHistory.map(v=>v.startedAt));
          data.vdaHistory.forEach(v=>{if(!existIds.has(v.startedAt)){STATE.vdaHistory.push(v);addedV++;}});
          if(addedV){STATE.vdaHistory.sort((a,b)=>(b.finishedAt||"").localeCompare(a.finishedAt||""));save("vdaHistory",STATE.vdaHistory);}
        }
        // Restore urgentParts if present
        if(data.urgentParts&&Array.isArray(data.urgentParts)&&!STATE.urgentParts.length){
          STATE.urgentParts=data.urgentParts;save("urgentParts",STATE.urgentParts);
        }
        // Restore urgentReserved if present
        if(data.urgentReserved&&Array.isArray(data.urgentReserved)){
          const existUR=new Set(STATE.urgentReserved.map(r=>r.sn));
          let addedUR=0;
          data.urgentReserved.forEach(r=>{if(!existUR.has(r.sn)){STATE.urgentReserved.push(r);addedUR++;}});
          if(addedUR) save("urgentReserved",STATE.urgentReserved);
        }
        // Restore urgentPNsAll if present
        if(data.urgentPNsAll&&Array.isArray(data.urgentPNsAll)){
          data.urgentPNsAll.forEach(p=>{if(!STATE.urgentPNsAll.includes(p))STATE.urgentPNsAll.push(p);});
          save("urgentPNsAll",STATE.urgentPNsAll);
        }
        const summary=["Restored:"];
        if(added) summary.push("+"+added+" ships");
        if(addedP) summary.push("+"+addedP+" parts");
        if(addedC) summary.push("+"+addedC+" comm dates");
        if(addedV) summary.push("+"+addedV+" VDA checks");
        if(summary.length===1) summary.push("no new data (already up to date)");
        showToast(summary.join(" "),"success");
        beep("done");STATE.ships.sort((a,b)=>(a.createdAt||"").localeCompare(b.createdAt||""));render();
      }catch(err){showToast("Error reading file!","error");}
    };r.readAsText(f);e.target.value="";
  }});
  bkRow.appendChild(restoreInp);
  bkRow.appendChild(h("button",{className:"btn-small",onclick:()=>restoreInp.click()},"📤 Load Backup"));
  bkRow.appendChild(h("span",{style:{color:"var(--text3)",fontSize:"12px",marginLeft:"8px"}},"Full backup: ships, parts, comm dates, VDA, urgent"));
  // Storage usage
  const usedKB=getStorageUsage();
  const idbKB2=Math.round((JSON.stringify(STATE.ships||[]).length+JSON.stringify(STATE.commDates||{}).length)/1024);
  bkRow.appendChild(h("span",{style:{color:"var(--green)",fontSize:"11px",marginLeft:"auto",fontWeight:"600",cursor:"pointer"},onclick:showStorageManager},"💿 IDB:"+idbKB2+"KB LS:"+usedKB+"KB ⚙️"));
  el.appendChild(bkRow);

  // Firebase Cloud Sync settings
  const fbRow=h("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"16px",padding:"16px",background:"var(--bg2)",borderRadius:"10px",border:"1px solid "+(getFirebaseURL()?"var(--green)":"var(--border)"),alignItems:"center"}});
  fbRow.appendChild(h("span",{style:{color:getFirebaseURL()?"var(--green)":"var(--text2)",fontSize:"13px",fontWeight:"600",marginRight:"8px"}},getFirebaseURL()?"☁️ Cloud: Connected":"☁️ Cloud: Not connected"));
  const fbInp=document.createElement("input");
  fbInp.type="text";fbInp.placeholder="Paste Firebase URL here...";
  fbInp.value=getFirebaseURL();
  fbInp.style.cssText="flex:1;min-width:200px;padding:6px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;font-family:var(--mono)";
  fbRow.appendChild(fbInp);
  fbRow.appendChild(h("button",{className:"btn-small",style:{background:getFirebaseURL()?"rgba(0,176,80,.1)":"",color:getFirebaseURL()?"var(--green)":""},onclick:()=>{
    const url=fbInp.value.trim();
    if(url&&!url.includes("firebasedatabase.app")&&!url.includes("firebaseio.com")){showToast("Invalid Firebase URL!","error");return;}
    setFirebaseURL(url);
    if(url){fbSyncDailyStats();showToast("☁️ Firebase connected! Data syncing...","success");}
    else showToast("☁️ Firebase disconnected","info");
    render();
  }},getFirebaseURL()?"✓ Connected":"💾 Connect"));
  if(getFirebaseURL()){
    fbRow.appendChild(h("button",{className:"btn-small",style:{color:"var(--blue)",borderColor:"var(--blue)"},onclick:()=>{fbSyncDailyStats();showToast("☁️ Pushed to cloud!","success");}},"⬆ Push"));
    fbRow.appendChild(h("button",{className:"btn-small",style:{color:"var(--accent)",borderColor:"var(--accent)"},onclick:async()=>{
      const ok=await fbPullFullData();
      if(ok){showToast("☁️ Loaded data from cloud!","success");render();}
      else showToast("No cloud data or already up to date","info");
    }},"⬇ Pull"));
    fbRow.appendChild(h("button",{className:"btn-small",style:{opacity:".5"},onclick:()=>{
      if(confirm("Disconnect Firebase?")){setFirebaseURL("");render();}
    }},"✕"));
  }

    ppRow.appendChild(h("button",{className:"btn-small",onclick:()=>showCWPicker(ships,"csv")},"📥 Shipment Excel (by week)"));

    ppRow.appendChild(h("button",{className:"btn-small",style:{background:"rgba(245,158,11,.1)",color:"#F59E0B",borderColor:"#F59E0B"},onclick:()=>showCWPicker(ships,"quality")},"📥 Quality Excel"));

    mod.appendChild(h("p",{style:{color:"var(--text2)",fontSize:"13px",marginBottom:"20px"}},"We recommend making a backup first."));
    const mb=h("div",{style:{display:"flex",gap:"10px"}});
    mb.appendChild(h("button",{className:"btn-primary",style:{marginTop:"0",background:"var(--red)"},onclick:()=>{
      STATE.ships=[];save("ships",[]);beep("done");showToast("History deleted!","success");ov.remove();render();
    }},"🗑️ Yes, delete all"));
    mb.appendChild(h("button",{className:"btn-secondary",onclick:()=>ov.remove()},"Cancel"));
    mod.appendChild(mb);ov.appendChild(mod);document.body.appendChild(ov);
  }},"🗑️ Delete All"));
  el.appendChild(delRow);

  const hdr=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:"24px",marginBottom:"12px",gap:"10px"}});
  hdr.appendChild(h("h2",{className:"sec-title",style:{margin:0}},"History"));
  hdr.appendChild(h("input",{type:"date",className:"select",value:STATE.histDate,onchange:e=>{STATE.histDate=e.target.value;render();}}));
  el.appendChild(hdr);

  const filtered=ships.filter(s=>!STATE.histDate||s.createdAt?.startsWith(STATE.histDate));
  filtered.sort((a,b)=>(b.createdAt||"").localeCompare(a.createdAt||""));
  if(!filtered.length){el.appendChild(h("div",{className:"empty"},h("p",{style:{fontSize:"40px"}},"📋"),h("p",null,"No shipments")));return;}

  const list=h("div",{style:{display:"flex",flexDirection:"column",gap:"8px"}});

    const tl=sh.boxes.reduce((a,b)=>a+b.items.length,0);

      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
        h("div",{style:{cursor:"pointer",flex:1},onclick:()=>{STATE.histSel=sh;STATE.histOpenScanner=-1;render();}},

          h("span",{style:{fontFamily:"var(--mono)",fontWeight:"700",color:"var(--amber)"}},sh.vehicleNumber||fD(sh.createdAt)),
          h("span",{style:{color:"var(--text3)",margin:"0 8px"}},"|"),
          h("span",{style:{color:"var(--text4)"}},sh.asnText?"ASN: "+sh.asnText:"ASN: —")
        ),
        h("div",{style:{display:"flex",alignItems:"center",gap:"10px"}},
          h("span",{style:{color:"var(--text3)",fontSize:"13px"}},fD(sh.createdAt)),

function renderShipDetail(el,sh){
  const idx=STATE.ships.indexOf(sh);
  const totalLabels=sh.boxes.reduce((a,b)=>a+b.items.length,0);
  const totalQty=sh.boxes.reduce((a,b)=>a+b.items.reduce((s,it)=>s+(parseInt(it.qty)||0),0),0);

  // Compute summary by package type and product type
  const summary={};// key: "Carton|Main Carrier" => {labels:N, qty:N}
  sh.boxes.forEach(b=>{
    const key=b.pkg+"|"+b.prod;
    if(!summary[key]) summary[key]={pkg:b.pkg,prod:b.prod,boxes:0,labels:0,qty:0};
    summary[key].boxes++;
    summary[key].labels+=b.items.length;
    summary[key].qty+=b.items.reduce((s,it)=>s+(parseInt(it.qty)||0),0);
  });

  // Group by package type
  const byPkg={};
  Object.values(summary).forEach(s=>{
    if(!byPkg[s.pkg]) byPkg[s.pkg]=[];
    byPkg[s.pkg].push(s);
  });

  // Helper: lockable field
  function lockField(label,fieldKey,placeholder){
    const val=sh[fieldKey]||"";
    const locked=sh[fieldKey+"_locked"]||false;
    const row=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px"}});
    row.appendChild(h("span",{style:{width:"160px",fontSize:"13px",color:"var(--text2)",fontWeight:"600"}},label));
    if(locked){
      row.appendChild(h("span",{style:{flex:1,padding:"8px 12px",background:"var(--bg3)",borderRadius:"6px",color:"var(--text)",fontSize:"14px",border:"1px solid var(--border)"}},val||"—"));
      row.appendChild(h("button",{style:{background:"none",border:"1px solid var(--border)",borderRadius:"6px",padding:"6px 10px",cursor:"pointer",color:"var(--amber)",fontSize:"13px"},onclick:()=>{
        sh[fieldKey+"_locked"]=false;
        STATE.ships[idx]=sh;save("ships",STATE.ships);render();
      }},"🔓"));
    } else {
      const inp=h("input",{className:"input",style:{flex:1},value:val,placeholder:placeholder,oninput:e=>{
        sh[fieldKey]=e.target.value;
        STATE.ships[idx]=sh;save("ships",STATE.ships);
      }});
      row.appendChild(inp);
      row.appendChild(h("button",{style:{background:"none",border:"1px solid var(--green)",borderRadius:"6px",padding:"6px 10px",cursor:"pointer",color:"var(--green)",fontSize:"13px"},onclick:()=>{
        sh[fieldKey+"_locked"]=true;
        STATE.ships[idx]=sh;save("ships",STATE.ships);render();
      }},"🔒"));
    }
    return row;
  }

  el.appendChild(h("button",{className:"btn-small",style:{marginBottom:"16px"},onclick:()=>{STATE.histSel=null;STATE.histOpenScanner=-1;render();}},"← Back"));
  el.appendChild(h("h2",{className:"sec-title"},"📋 Shipment Dashboard"+(sh.vehicleNumber?" — "+sh.vehicleNumber:"")));

  // ── Section 1: Shipment Info ──
  const infoCard=h("div",{className:"card",style:{marginBottom:"16px"}});
  infoCard.appendChild(h("h3",{style:{fontSize:"14px",fontWeight:"700",color:"var(--amber)",marginBottom:"12px",textTransform:"uppercase",letterSpacing:"1px"}},"Shipment Information"));

  // Date (auto)
  const dateRow=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px"}});
  dateRow.appendChild(h("span",{style:{width:"160px",fontSize:"13px",color:"var(--text2)",fontWeight:"600"}},"Date:"));
  dateRow.appendChild(h("span",{style:{flex:1,padding:"8px 12px",background:"var(--bg3)",borderRadius:"6px",color:"var(--text)",fontSize:"14px",border:"1px solid var(--border)",fontFamily:"var(--mono)"}},fD(sh.createdAt)));
  infoCard.appendChild(dateRow);

  infoCard.appendChild(lockField("Van/Truck Number:","vehicleNumber","e.g. Van 1, Truck 3"));
  infoCard.appendChild(lockField("Arrival:","arrival","e.g. 08:30"));
  infoCard.appendChild(lockField("Departure:","departure","e.g. 14:00"));
  infoCard.appendChild(lockField("Licence Plate:","plate","e.g. KG-123-AA"));
  infoCard.appendChild(lockField("ASN:","asnText","Enter ASN number"));
  infoCard.appendChild(lockField("Responsible Person:","responsible","Enter name"));
  el.appendChild(infoCard);

  // ── Section 2: Summary by Package & Product Type ──
  const sumCard=h("div",{className:"card",style:{marginBottom:"16px"}});
  sumCard.appendChild(h("h3",{style:{fontSize:"14px",fontWeight:"700",color:"var(--amber)",marginBottom:"12px",textTransform:"uppercase",letterSpacing:"1px"}},"Packaging Summary"));

  const pkgTypes=Object.keys(byPkg).sort();
  pkgTypes.forEach(pkg=>{
    const icon=pkg==="Carton"?"📦":pkg==="Returnable"?"♻️":"📋";
    sumCard.appendChild(h("h4",{style:{fontSize:"14px",fontWeight:"700",color:pkg==="Carton"?"var(--blue)":"var(--green)",marginTop:"12px",marginBottom:"8px"}},icon+" "+pkg));

    const tbl=h("div",{className:"tbl"});
    tbl.appendChild(h("div",{className:"tbl-h"},
      h("span",{style:{flex:2}},"Product Type"),
      h("span",{style:{flex:1}},"Boxes"),
      h("span",{style:{flex:1}},"Labels"),
      h("span",{style:{flex:1}},"Total Qty")
    ));
    let pkgTotalBoxes=0,pkgTotalLabels=0,pkgTotalQty=0;
    byPkg[pkg].forEach((s,i)=>{
      pkgTotalBoxes+=s.boxes;pkgTotalLabels+=s.labels;pkgTotalQty+=s.qty;
      tbl.appendChild(h("div",{className:"tbl-r"},
        h("span",{style:{flex:2,fontWeight:"600",color:"var(--text4)"}},s.prod),
        h("span",{style:{flex:1,color:"var(--text2)",textAlign:"center"}},String(s.boxes)),
        h("span",{style:{flex:1,color:"var(--text2)",textAlign:"center"}},String(s.labels)),
        h("span",{style:{flex:1,fontWeight:"700",color:"var(--amber)",textAlign:"center"}},String(s.qty))
      ));
    });
    // Subtotal
    tbl.appendChild(h("div",{className:"tbl-r",style:{background:"var(--bg3)"}},
      h("span",{style:{flex:2,fontWeight:"700",color:"var(--text)"}},"Subtotal"),
      h("span",{style:{flex:1,fontWeight:"700",color:"var(--text)",textAlign:"center"}},String(pkgTotalBoxes)),
      h("span",{style:{flex:1,fontWeight:"700",color:"var(--text)",textAlign:"center"}},String(pkgTotalLabels)),
      h("span",{style:{flex:1,fontWeight:"700",color:"var(--amber)",textAlign:"center"}},String(pkgTotalQty))
    ));
    sumCard.appendChild(tbl);
  });

  // Grand total
  const mc2=countMCBoxes(sh.boxes);
  
  const totals=[
    ["Total Boxes",String(sh.boxes.length),"var(--blue)"],
    ["Total Labels",String(totalLabels),"var(--green)"],
    ["Total Quantity",String(totalQty),"var(--amber)"]
  ];
  if(mc2.greenBoxes||mc2.blueBoxes){
    totals.push(["🟩 Green Box",mc2.greenBoxes+" box / "+mc2.greenPcs+"pcs","#00B050"]);
    totals.push(["🟦 Blue Box",mc2.blueBoxes+" box / "+mc2.bluePcs+"pcs","#3B82F6"]);
  }
  sumCard.appendChild(h("div",{style:{marginTop:"16px",paddingTop:"12px",borderTop:"2px solid var(--amber)",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:"16px"}},...totals.map(([l,v,c])=>h("div",{style:{textAlign:"center",flex:1,minWidth:"100px"}},
    h("div",{style:{fontSize:"28px",fontWeight:"700",color:c,fontFamily:"var(--mono)"}},v),
    h("div",{style:{fontSize:"12px",color:"var(--text3)",marginTop:"2px"}},l)
  ))));
  el.appendChild(sumCard);

  // ── Urgent Alert ──
  if(STATE.urgentPNsAll.length>0){
    const urgentInShip=[];
    sh.boxes.forEach((b,bi)=>b.items.forEach(it=>{
      if(isEverUrgentPN(it.pn)){
        const uInfo=getUrgentInfo(it.pn);
        urgentInShip.push({pn:it.pn,desc:getDesc(it),qty:it.qty,sn:it.sn,box:bi+1,reqQty:uInfo?uInfo.qty:0});
      }
    }));
    if(urgentInShip.length>0){
      const urgCard=h("div",{className:"card",style:{marginBottom:"16px",borderTop:"3px solid #F59E0B",background:"rgba(245,158,11,.05)"}});
      urgCard.appendChild(h("h3",{style:{fontSize:"14px",fontWeight:"700",color:"#F59E0B",marginBottom:"12px"}},"🚨 URGENT PARTS IN THIS SHIPMENT — "+urgentInShip.length+" found"));
      const utbl=h("div",{className:"tbl"});
      utbl.appendChild(h("div",{className:"tbl-h"},
        h("span",{style:{flex:2}},"Part Number"),h("span",{style:{flex:1.5}},"Description"),
        h("span",{style:{flex:.5,textAlign:"center"}},"Qty"),h("span",{style:{flex:1}},"Serial"),
        h("span",{style:{flex:.5,textAlign:"center"}},"Box")
      ));
      urgentInShip.forEach(u=>{
        utbl.appendChild(h("div",{className:"tbl-r",style:{borderLeft:"3px solid #F59E0B"}},
          h("span",{style:{flex:2,fontFamily:"var(--mono)",color:"#F59E0B",fontWeight:"700",fontSize:"12px"}},"🚨 "+u.pn),
          h("span",{style:{flex:1.5,fontSize:"12px"}},u.desc),
          h("span",{style:{flex:.5,textAlign:"center",fontWeight:"700"}},String(u.qty)),
          h("span",{style:{flex:1,fontFamily:"var(--mono)",fontSize:"11px"}},u.sn),
          h("span",{style:{flex:.5,textAlign:"center"}},"Box "+u.box)
        ));
      });
      urgCard.appendChild(utbl);
      el.appendChild(urgCard);
    }
  }

  // ── Section 3: Box Detail ──
  const detCard=h("div",{className:"card",style:{marginBottom:"16px"}});
  detCard.appendChild(h("h3",{style:{fontSize:"14px",fontWeight:"700",color:"var(--amber)",marginBottom:"12px",textTransform:"uppercase",letterSpacing:"1px"}},"Box Detail"));
  [...sh.boxes].reverse().forEach((b,ri)=>{
    const bi=sh.boxes.length-1-ri;
    const bxExp=b.expectedLabels||0;
    const bxCur=b.items.length;
    const bxMatch=bxExp>0&&bxCur===bxExp;
    const bxOver=bxExp>0&&bxCur>bxExp;
    const bxLimInfo=getBoxLimitInfo(b);
    const bxLim=getBoxLimit(b.prod,b.pkg);
    const bxFull=(bxLim.maxLabels<9999&&bxCur>=bxLim.maxLabels)||(bxLim.maxQty&&b.items.reduce((s,it)=>s+(parseInt(it.qty)||0),0)>=bxLim.maxQty);
    const lblInfo=bxLimInfo?bxLimInfo:bxExp>0?(bxCur+"/"+bxExp+(bxMatch?" ✓":bxOver?" +"+(bxCur-bxExp):"")):(bxCur+" labels");
    const lblCol=bxFull?"var(--red)":bxMatch?"var(--green)":bxOver?"var(--amber)":"var(--text)";
    const boxHdr=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:ri>0?"16px":"0",marginBottom:"8px"}},
      h("h4",{style:{fontSize:"14px",fontWeight:"600",color:"var(--text)",margin:0}},"Box "+(bi+1)+" — "+b.pkg+" · "+b.prod+" ",h("span",{style:{color:lblCol,fontWeight:"700"}},"("+lblInfo+")")),
      h("div",{style:{display:"flex",gap:"6px"}},
        h("button",{style:{background:"none",border:"1px solid var(--amber)",borderRadius:"6px",cursor:"pointer",color:"var(--amber)",fontSize:"12px",padding:"3px 8px",opacity:".7"},onclick:e=>{
          e.stopPropagation();showEditBoxModal(b,"ships");
        }},"✏️"),
        sh.boxes.length>1?h("button",{style:{background:"none",border:"1px solid var(--red)",borderRadius:"6px",cursor:"pointer",color:"var(--red)",fontSize:"12px",padding:"3px 8px",opacity:".7"},onclick:e=>{
          e.stopPropagation();
          sh.boxes.splice(bi,1);
          sh.boxes.forEach((bx,i)=>bx.id=i+1);
          save("ships",STATE.ships);beep("done");showToast("Box deleted, renumbered","success");render();
        }},"🗑️"):null
      )
    );
    detCard.appendChild(boxHdr);
    if(b.items.length){
      const tbl=h("div",{className:"tbl"});
      tbl.appendChild(h("div",{className:"tbl-h"},
        h("span",{style:{flex:1.8}},"Part Number"),h("span",{style:{flex:2}},"Description"),
        h("span",{style:{flex:.5,textAlign:"center"}},"Qty"),h("span",{style:{flex:1.1}},"Serial"),h("span",{style:{flex:.7}},"Comm"),h("span",{style:{flex:.8}},"Prod"),h("span",{style:{flex:1}},"Time"),h("span",{style:{flex:.6,textAlign:"center"}},"Status"),h("span",{style:{flex:.3}},"")
      ));
      [...b.items].reverse().forEach((it,ri)=>{
        const origIdx=b.items.length-1-ri;
        tbl.appendChild(renderItemRow(it,origIdx,b,"ships"));
      });
      detCard.appendChild(tbl);
    }
    // Add items button for this box
    const scannerOpen=STATE.histOpenScanner===bi;
    const addItemBtn=h("button",{className:"btn-small",style:{marginTop:"6px",marginBottom:"8px",fontSize:"11px",background:scannerOpen?"rgba(0,176,80,.15)":"",borderColor:scannerOpen?"var(--green)":""},onclick:function(){
      STATE.histOpenScanner=scannerOpen?-1:bi;render();
    }},scannerOpen?"✕ Close scanner":"+ Add items");
    detCard.appendChild(addItemBtn);

    if(scannerOpen){
      const scanDiv=h("div",{id:"box-scanner-"+bi,style:{marginTop:"4px",marginBottom:"8px",padding:"12px",background:"var(--bg)",borderRadius:"8px",border:"1px dashed var(--green)"}});
      const bExp=b.expectedLabels||0;
      const bCur=b.items.length;
      const scanInfo=bExp>0?"Scan into Box "+(bi+1)+" — "+bCur+"/"+bExp+" labels":"Scan into Box "+(bi+1)+" — continuous scanning";
      scanDiv.appendChild(h("p",{style:{color:"var(--green)",fontSize:"12px",fontWeight:"600",marginBottom:"8px"}},scanInfo));
      const inp=h("input",{className:"scan-input",style:{fontSize:"16px",borderColor:"var(--green)"},placeholder:"Scan QR or Part Number...",autofocus:true,
        onkeydown:function(e2){
          if(e2.key!=="Enter")return;
          let v=e2.target.value.trim();if(!v)return;
          // Collect all serials in this shipment for duplicate check
          const allSN=sh.boxes.flatMap(bx=>bx.items.map(it=>it.sn));
          // QR auto-detect
          if(v.includes("||")){
            const segs=v.split("||").filter(x=>x);let pn="",qty=0,sn="";
            segs.forEach(seg=>{const s=seg.trim();
              if(s.startsWith("S")&&/^\d/.test(s.substring(1)))sn=s.substring(1).trim();
              else if(s.startsWith("P"))pn=s.substring(1).trim();
              else if(s.startsWith("Q")&&/^\d/.test(s.substring(1)))qty=parseInt(s.substring(1));
            });
            if(pn&&qty&&sn){
              // Duplicate serial check
              if(allSN.includes(sn)){beep("err");showToast("⚠️ DUPLICATE! Serial "+sn+" already in this shipment","error");e2.target.value="";return;}
              const part=STATE.parts.find(p=>p.partNumber.toUpperCase()===pn.toUpperCase());
              const limErr=checkBoxLimit(b,qty,pn);
              if(limErr){beep("err");showToast(limErr,"error");e2.target.value="";return;}
              const newItem={pn:pn.toUpperCase(),desc:part?part.description:"",qty,sn,ts:now(),status:"OK",failure:"",action:"",corrective:""};
              const addIt=()=>{b.items.push(newItem);save("ships",STATE.ships);_lastLocalChange=Date.now();fbPushFullData();beep("done");showToast("✓ QR: "+pn+" (×"+qty+")","success");render();};
              if(isUrgentPN(pn)){beep("err");showUrgentModal(newItem,addIt,()=>{
                STATE.urgentReserved.push({...newItem,reservedAt:now(),fromVehicle:sh.vehicleNumber||"Closed"});
                deductUrgent(newItem.pn,newItem.qty);
                save("urgentReserved",STATE.urgentReserved);beep("done");showToast("🚨 Reserved: "+pn,"info");render();
              });}else{addIt();}
              e2.target.value="";return;
            }
          }
          // 3-step barcode
          const phase=inp.dataset.phase||"pn";
          if(phase==="pn"){
            let extracted=extractPN(v);
            if(extracted===v.toUpperCase().trim()&&v.toUpperCase().startsWith("P")&&v.length>1){
              extracted=extractPN(v.substring(1).trim());
            }
            const part=STATE.parts.find(p=>p.partNumber.toUpperCase()===extracted.toUpperCase());
            if(!part&&STATE.parts.length){beep("err");showToast("❌ "+extracted+" not in DB!","error");e2.target.value="";return;}
            inp.dataset.curPn=extracted.toUpperCase();inp.dataset.curDesc=part?part.description:"";
            inp.dataset.phase="qty";inp.placeholder="Scan Quantity...";beep("ok");
          }else if(phase==="qty"){
            if(v.toUpperCase().startsWith("Q")&&v.length>1) v=v.substring(1).trim();
            const q=parseInt(v);if(isNaN(q)||q<=0){beep("err");showToast("Invalid qty!","error");e2.target.value="";return;}
            inp.dataset.curQty=String(q);inp.dataset.phase="sn";inp.placeholder="Scan Serial...";beep("ok");
          }else if(phase==="sn"){
            if(v.toUpperCase().startsWith("S")&&v.length>1&&/^\d/.test(v.substring(1))) v=v.substring(1).trim();
            // Duplicate serial check
            if(allSN.includes(v)){beep("err");showToast("⚠️ DUPLICATE! Serial "+v+" already in this shipment","error");inp.dataset.phase="pn";inp.dataset.curPn="";inp.dataset.curQty="";inp.dataset.curDesc="";inp.placeholder="Scan QR or Part Number...";e2.target.value="";return;}
            const limErr=checkBoxLimit(b,parseInt(inp.dataset.curQty),inp.dataset.curPn);
            if(limErr){beep("err");showToast(limErr,"error");inp.dataset.phase="pn";inp.dataset.curPn="";inp.dataset.curQty="";inp.dataset.curDesc="";inp.placeholder="Scan QR or Part Number...";e2.target.value="";return;}
            const newItem2={pn:inp.dataset.curPn,desc:inp.dataset.curDesc||"",qty:parseInt(inp.dataset.curQty),sn:v,ts:now(),status:"OK",failure:"",action:"",corrective:""};
            const resetInp=()=>{inp.dataset.phase="pn";inp.dataset.curPn="";inp.dataset.curQty="";inp.dataset.curDesc="";inp.placeholder="Scan QR or Part Number...";};
            const addIt2=()=>{b.items.push(newItem2);save("ships",STATE.ships);_lastLocalChange=Date.now();fbPushFullData();beep("done");showToast("✓ "+newItem2.pn,"success");resetInp();render();};
            if(isUrgentPN(newItem2.pn)){beep("err");showUrgentModal(newItem2,addIt2,()=>{
              STATE.urgentReserved.push({...newItem2,reservedAt:now(),fromVehicle:sh.vehicleNumber||"Closed"});
              deductUrgent(newItem2.pn,newItem2.qty);
              save("urgentReserved",STATE.urgentReserved);beep("done");showToast("🚨 Reserved: "+newItem2.pn,"info");resetInp();render();
            });}else{addIt2();}
            return;
          }
          e2.target.value="";
        }
      });
      inp.dataset.phase="pn";
      scanDiv.appendChild(inp);
      detCard.appendChild(scanDiv);
      setTimeout(()=>inp.focus(),100);
    }
    detCard.appendChild(addItemBtn);
  });
  el.appendChild(detCard);

  // ── Action buttons ──
  const actBtns=h("div",{style:{display:"flex",gap:"10px",flexWrap:"wrap",marginTop:"16px"}});

      ["Main Carrier","Armrest","Beltline","FOST"].forEach(x=>{
        prg.appendChild(h("button",{className:"tog"+(newProd===x?" active":""),onclick:()=>{newProd=x;rebuildProd();rebuildShortcuts();}},x));

// DN COMPARE
// ═══════════════════════════════════════════
function renderDNCompare(el){
  el.appendChild(h("h2",{className:"sec-title"},"📋 DN Compare"));
  el.appendChild(h("p",{style:{color:"var(--text2)",fontSize:"13px",marginBottom:"12px"}},"Select date & vehicle, then upload Delivery Note PDF to compare serial numbers."));

  // Alert preview buttons — always visible
  const prevRow=h("div",{style:{display:"flex",gap:"8px",marginBottom:"16px",flexWrap:"wrap"}});
  prevRow.appendChild(h("button",{className:"btn-small",style:{background:"rgba(0,176,80,.1)",color:"var(--green)",borderColor:"var(--green)",fontSize:"11px"},onclick:()=>dnAlert(true)},"▶ Preview OK"));
  prevRow.appendChild(h("button",{className:"btn-small",style:{background:"rgba(255,68,68,.1)",color:"var(--red)",borderColor:"var(--red)",fontSize:"11px"},onclick:()=>dnAlert(false)},"▶ Preview FAIL"));
  el.appendChild(prevRow);

  // Collect all days and vehicles
  const allDates={};
  STATE.ships.forEach((sh,i)=>{
    const d=(sh.createdAt||"").slice(0,10);
    if(!d)return;
    if(!allDates[d]) allDates[d]=[];
    const vn=sh.vehicleNumber||sh.asnText||(sh.asns||[]).join("/")||"Shipment "+(allDates[d].length+1);
    const labels=sh.boxes.reduce((a,b)=>a+b.items.length,0);
    allDates[d].push({name:vn,ship:sh,labels,idx:i});
  });
  // Add active shipment under today
  const today=new Date().toISOString().slice(0,10);
  if(STATE.active){
    if(!allDates[today]) allDates[today]=[];
    const aLabels=STATE.active.boxes.reduce((a,b)=>a+b.items.length,0);
    allDates[today].push({name:"Active Shipment",ship:STATE.active,labels:aLabels,idx:-1});
  }
  const sortedDates=Object.keys(allDates).sort().reverse();

  // Vehicle picker
  if(!STATE.dnResults){
    // Step 1: Pick date
    el.appendChild(h("h3",{className:"sec-title",style:{marginBottom:"10px"}},"1. Select Date"));

    if(sortedDates.length===0){
      el.appendChild(h("p",{style:{color:"var(--text3)",padding:"16px",background:"var(--bg2)",borderRadius:"8px"}},"No shipments found. Close a shipment first."));
      return;
    }

    const dGrid=h("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"16px"}});
    sortedDates.forEach(d=>{
      const isToday=d===today;
      const isSel=STATE.dnSelDate===d;
      const vCount=allDates[d].length;
      const lCount=allDates[d].reduce((s,v)=>s+v.labels,0);
      dGrid.appendChild(h("div",{style:{padding:"8px 14px",background:isSel?"rgba(35,240,199,.15)":"var(--bg3)",borderRadius:"8px",cursor:"pointer",border:isSel?"2px solid var(--green)":"1px solid var(--border)",minWidth:"100px"},
        onclick:()=>{STATE.dnSelDate=d;STATE.dnSelVehicle=null;render();}
      },
        h("div",{style:{fontWeight:"700",color:isSel?"var(--green)":"var(--text)",fontSize:"13px"}},fD(d+"T00:00:00")+(isToday?" (today)":"")),
        h("div",{style:{color:"var(--text3)",fontSize:"11px",marginTop:"2px"}},vCount+" vehicles · "+lCount+" labels")
      ));
    });
    el.appendChild(dGrid);

    // Step 2: Pick vehicle (only if date selected)
    if(STATE.dnSelDate&&allDates[STATE.dnSelDate]){
      const dateVehicles=allDates[STATE.dnSelDate];
      el.appendChild(h("h3",{className:"sec-title",style:{marginBottom:"10px"}},"2. Select Vehicle"));

      const vGrid=h("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"20px"}});
      dateVehicles.forEach((v,i)=>{
        const isSelected=STATE.dnSelVehicle===i;
        vGrid.appendChild(h("div",{style:{padding:"10px 16px",background:isSelected?"rgba(35,240,199,.15)":"var(--bg3)",borderRadius:"8px",cursor:"pointer",border:isSelected?"2px solid var(--green)":"1px solid var(--border)",minWidth:"120px"},
          onclick:()=>{STATE.dnSelVehicle=i;render();}
        },
          h("div",{style:{fontWeight:"700",color:isSelected?"var(--green)":"var(--text)",fontSize:"14px"}},v.name),
          h("div",{style:{color:"var(--text3)",fontSize:"11px",marginTop:"4px"}},v.labels+" labels")
        ));
      });
      // ALL option
      const allSel=STATE.dnSelVehicle==="all";
      vGrid.appendChild(h("div",{style:{padding:"10px 16px",background:allSel?"rgba(245,158,11,.15)":"var(--bg3)",borderRadius:"8px",cursor:"pointer",border:allSel?"2px solid var(--amber)":"1px solid var(--border)",minWidth:"120px"},
        onclick:()=>{STATE.dnSelVehicle="all";render();}
      },
        h("div",{style:{fontWeight:"700",color:allSel?"var(--amber)":"var(--text)",fontSize:"14px"}},"ALL ("+fD(STATE.dnSelDate+"T00:00:00")+")"),
        h("div",{style:{color:"var(--text3)",fontSize:"11px",marginTop:"4px"}},dateVehicles.reduce((s,v)=>s+v.labels,0)+" labels total")
      ));
      el.appendChild(vGrid);

      // Step 3: Upload DN PDF
      if(STATE.dnSelVehicle!==null){
        el.appendChild(h("h3",{className:"sec-title",style:{marginBottom:"10px"}},"3. Upload DN PDF"));

        const fileInp=document.createElement("input");
        fileInp.type="file";
        fileInp.accept=".pdf";
        fileInp.style.display="none";
        fileInp.addEventListener("change",function(e){
          const file=e.target.files[0];if(!file)return;
          let selShips=[];
          let selName="";
          if(STATE.dnSelVehicle==="all"){
            selShips=dateVehicles.map(v=>v.ship);
            selName="All ("+fD(STATE.dnSelDate+"T00:00:00")+", "+dateVehicles.length+" vehicles)";
          }else{
            const v=dateVehicles[STATE.dnSelVehicle];
            selShips=[v.ship];
            selName=v.name;
          }
          parseDNPdf(file,selShips,selName);
        });

        const upArea=h("div",{style:{padding:"24px",background:"var(--bg2)",borderRadius:"10px",border:"2px dashed var(--green)",textAlign:"center",marginBottom:"20px",cursor:"pointer"},
          onclick:()=>{fileInp.click();}
        });
        upArea.appendChild(fileInp);
        upArea.appendChild(h("span",{style:{fontSize:"32px"}},"📄"));
        upArea.appendChild(h("p",{style:{color:"var(--text)",fontWeight:"600",marginTop:"8px"}},"Click to upload Delivery Note PDF"));
        const selLabel=STATE.dnSelVehicle==="all"?"ALL vehicles on "+fD(STATE.dnSelDate+"T00:00:00"):dateVehicles[STATE.dnSelVehicle].name;
        upArea.appendChild(h("p",{style:{color:"var(--green)",fontSize:"12px"}},"Comparing against: "+selLabel));
        el.appendChild(upArea);
      }
    }
  }else{
    const r=STATE.dnResults;
    // Summary cards
    const sg=h("div",{className:"dash-grid"});
    [[r.matched.length,"Matched (OK)","var(--green)"],[r.onDNnotScanned.length,"On DN, not scanned","var(--red)"],[r.scannedNotOnDN.length,"Scanned, not on DN","var(--amber)"],[r.dnSerials.length,"DN Total Serials","var(--blue)"],[r.scanSerials.length,"Scan Total Serials","var(--purple)"]].forEach(([v,l,c])=>{
      sg.appendChild(h("div",{className:"dash-card",style:{borderTop:"3px solid "+c}},h("span",{className:"val"},String(v)),h("span",{className:"lbl"},l)));
    });
    el.appendChild(sg);

    // DN info
    el.appendChild(h("div",{style:{padding:"12px 16px",background:"var(--bg2)",borderRadius:"8px",marginBottom:"16px",fontSize:"12px",color:"var(--text2)"}},
      h("b",{style:{color:"var(--text)"}},"Delivery Note: "),r.dnId+" | ",
      h("b",{style:{color:"var(--text)"}},"Ship Date: "),r.shipDate+" | ",
      h("b",{style:{color:"var(--text)"}},"Vehicle: "),r.vehicleName+" | ",
      h("b",{style:{color:"var(--text)"}},"Part Numbers: "),r.dnPNs.length
    ));

    // Status
    const allOK=r.onDNnotScanned.length===0&&r.scannedNotOnDN.length===0;
    el.appendChild(h("div",{style:{padding:"12px 16px",background:allOK?"rgba(0,176,80,.1)":"rgba(255,68,68,.1)",borderRadius:"8px",marginBottom:"12px",border:allOK?"1px solid var(--green)":"1px solid var(--red)"}},
      h("span",{style:{fontWeight:"700",fontSize:"16px",color:allOK?"var(--green)":"var(--red)"}},allOK?"✓ ALL SERIALS MATCH":"⚠ DISCREPANCIES FOUND")
    ));
    
    // Auto-trigger flash+sound on first render of results
    if(!r._alertShown){r._alertShown=true;setTimeout(()=>dnAlert(allOK),300);}

    // Export buttons
    const expRow=h("div",{style:{display:"flex",gap:"8px",marginBottom:"20px"}});
    expRow.appendChild(h("button",{className:"btn-small",onclick:()=>exportDNCSV(r)},"📥 Export CSV"));
    expRow.appendChild(h("button",{className:"btn-small",style:{background:"rgba(0,155,141,.1)",color:"#23F0C7",borderColor:"#23F0C7"},onclick:()=>exportDNPPTX(r)},"📊 Export PPTX"));
    expRow.appendChild(h("button",{className:"btn-small",onclick:()=>{STATE.dnResults=null;STATE.dnSelVehicle=null;STATE.dnSelDate=null;render();}},"🔄 New Compare"));
    el.appendChild(expRow);

    // Matched table
    if(r.matched.length){
      el.appendChild(h("h3",{className:"sec-title",style:{color:"var(--green)"}},"✓ Matched — "+r.matched.length+" serials"));
      const tbl=h("div",{className:"tbl"});
      tbl.appendChild(h("div",{className:"tbl-h"},h("span",{style:{flex:2}},"Part Number"),h("span",{style:{flex:2}},"Serial"),h("span",{style:{flex:1}},"DN Qty"),h("span",{style:{flex:1}},"Status")));
      r.matched.forEach(m=>{
        tbl.appendChild(h("div",{className:"tbl-r"},
          h("span",{style:{flex:2,fontFamily:"var(--mono)",color:"var(--amber)",fontWeight:"600",fontSize:"12px"}},m.pn),
          h("span",{style:{flex:2,fontFamily:"var(--mono)",fontSize:"12px"}},m.sn),
          h("span",{style:{flex:1}},String(m.qty)),
          h("span",{style:{flex:1,color:"var(--green)",fontWeight:"700"}},"OK")
        ));
      });
      el.appendChild(tbl);
    }

    // On DN not scanned
    if(r.onDNnotScanned.length){
      el.appendChild(h("h3",{className:"sec-title",style:{color:"var(--red)",marginTop:"20px"}},"✕ On DN but NOT scanned — "+r.onDNnotScanned.length));
      const tbl2=h("div",{className:"tbl"});
      tbl2.appendChild(h("div",{className:"tbl-h"},h("span",{style:{flex:2}},"Part Number"),h("span",{style:{flex:2}},"Serial"),h("span",{style:{flex:1}},"DN Qty"),h("span",{style:{flex:1}},"Status")));
      r.onDNnotScanned.forEach(m=>{
        tbl2.appendChild(h("div",{className:"tbl-r",style:{borderLeft:"3px solid var(--red)"}},
          h("span",{style:{flex:2,fontFamily:"var(--mono)",color:"var(--amber)",fontWeight:"600",fontSize:"12px"}},m.pn),
          h("span",{style:{flex:2,fontFamily:"var(--mono)",fontSize:"12px"}},m.sn),
          h("span",{style:{flex:1}},String(m.qty)),
          h("span",{style:{flex:1,color:"var(--red)",fontWeight:"700"}},"MISSING")
        ));
      });
      el.appendChild(tbl2);
    }

    // Scanned not on DN
    if(r.scannedNotOnDN.length){
      el.appendChild(h("h3",{className:"sec-title",style:{color:"var(--amber)",marginTop:"20px"}},"⚠ Scanned but NOT on DN — "+r.scannedNotOnDN.length));
      const tbl3=h("div",{className:"tbl"});
      tbl3.appendChild(h("div",{className:"tbl-h"},h("span",{style:{flex:2}},"Part Number"),h("span",{style:{flex:2}},"Serial"),h("span",{style:{flex:1}},"Scan Qty"),h("span",{style:{flex:1}},"Status")));
      r.scannedNotOnDN.forEach(m=>{
        tbl3.appendChild(h("div",{className:"tbl-r",style:{borderLeft:"3px solid var(--amber)"}},
          h("span",{style:{flex:2,fontFamily:"var(--mono)",color:"var(--amber)",fontWeight:"600",fontSize:"12px"}},m.pn),
          h("span",{style:{flex:2,fontFamily:"var(--mono)",fontSize:"12px"}},m.sn),
          h("span",{style:{flex:1}},String(m.qty)),
          h("span",{style:{flex:1,color:"var(--amber)",fontWeight:"700"}},"EXTRA")
        ));
      });
      el.appendChild(tbl3);
    }
  }

  // DN Compare History
  if(STATE.dnHistory.length>0){
    el.appendChild(h("div",{style:{borderTop:"1px solid var(--border)",marginTop:"24px",paddingTop:"16px"}}));
    el.appendChild(h("h3",{className:"sec-title"},"📁 Compare History ("+STATE.dnHistory.length+")"));

    const histTbl=h("div",{className:"tbl"});
    histTbl.appendChild(h("div",{className:"tbl-h"},
      h("span",{style:{flex:1.2}},"Date"),
      h("span",{style:{flex:1}},"DN ID"),
      h("span",{style:{flex:1.2}},"Vehicle"),
      h("span",{style:{flex:.6,textAlign:"center"}},"DN"),
      h("span",{style:{flex:.6,textAlign:"center"}},"Scan"),
      h("span",{style:{flex:.6,textAlign:"center"}},"Match"),
      h("span",{style:{flex:.5,textAlign:"center"}},"Miss"),
      h("span",{style:{flex:.5,textAlign:"center"}},"Extra"),
      h("span",{style:{flex:.6,textAlign:"center"}},"Status"),
      h("span",{style:{flex:.8,textAlign:"center"}},"Actions")
    ));

    STATE.dnHistory.forEach((entry,idx)=>{
      const allOK=entry.allOK;
      histTbl.appendChild(h("div",{className:"tbl-r",style:{borderLeft:allOK?"3px solid var(--green)":"3px solid var(--red)"}},
        h("span",{style:{flex:1.2,fontSize:"11px"}},fDT(entry.ts)),
        h("span",{style:{flex:1,fontFamily:"var(--mono)",fontSize:"11px",color:"var(--amber)"}},entry.dnId),
        h("span",{style:{flex:1.2,fontSize:"11px",fontWeight:"600"}},entry.vehicleName),
        h("span",{style:{flex:.6,textAlign:"center",fontSize:"11px"}},String(entry.dnCount)),
        h("span",{style:{flex:.6,textAlign:"center",fontSize:"11px"}},String(entry.scanCount)),
        h("span",{style:{flex:.6,textAlign:"center",fontSize:"11px",color:"var(--green)",fontWeight:"700"}},String(entry.matchedCount)),
        h("span",{style:{flex:.5,textAlign:"center",fontSize:"11px",color:entry.missingCount?"var(--red)":"var(--green)",fontWeight:"700"}},String(entry.missingCount)),
        h("span",{style:{flex:.5,textAlign:"center",fontSize:"11px",color:entry.extraCount?"var(--amber)":"var(--green)",fontWeight:"700"}},String(entry.extraCount)),
        h("span",{style:{flex:.6,textAlign:"center"}},h("span",{style:{padding:"2px 8px",borderRadius:"4px",fontWeight:"700",fontSize:"10px",
          background:allOK?"#065F46":"#7F1D1D",color:allOK?"#A7F3D0":"#FCA5A5"}},allOK?"OK":"NOK")),
        h("span",{style:{flex:.8,textAlign:"center",display:"flex",gap:"4px",justifyContent:"center"}},
          h("button",{style:{background:"none",border:"1px solid var(--red)",borderRadius:"4px",color:"var(--red)",cursor:"pointer",fontSize:"10px",padding:"2px 6px",opacity:".6"},
            onclick:()=>{STATE.dnHistory.splice(idx,1);save("dnHistory",STATE.dnHistory);showToast("Deleted","info");render();}
          },"🗑")
        )
      ));
    });
    el.appendChild(histTbl);

    // Clear all button
    el.appendChild(h("div",{style:{marginTop:"8px",textAlign:"right"}},
      h("button",{className:"btn-small",style:{opacity:".6",fontSize:"11px"},onclick:()=>{
        if(confirm("Clear all DN Compare history?")){STATE.dnHistory=[];save("dnHistory",[]);showToast("History cleared","info");render();}
      }},"🗑 Clear All History")
    ));
  }
}
// ═══════════════════════════════════════════
// URGENT PARTS
// ═══════════════════════════════════════════
function renderUrgent(el){
  el.appendChild(h("h2",{className:"sec-title"},"🚨 Urgent Parts"));
  el.appendChild(h("p",{style:{color:"var(--text2)",fontSize:"13px",marginBottom:"16px"}},"Upload urgent part list (.xlsx) — when these PNs are scanned, you'll be prompted to continue or reserve for urgent vehicle."));

  // Upload
  const fileInp=document.createElement("input");
  fileInp.type="file";fileInp.accept=".xlsx,.xls";fileInp.style.display="none";
  fileInp.addEventListener("change",function(e){
    const file=e.target.files[0];if(!file)return;parseUrgentXlsx(file);
  });

  const upArea=h("div",{style:{padding:"20px",background:"var(--bg2)",borderRadius:"10px",border:"2px dashed var(--red)",textAlign:"center",marginBottom:"20px",cursor:"pointer"},
    onclick:()=>{fileInp.click();}
  });
  upArea.appendChild(fileInp);
  upArea.appendChild(h("span",{style:{fontSize:"28px"}},"📋"));
  upArea.appendChild(h("p",{style:{color:"var(--text)",fontWeight:"600",marginTop:"6px"}},"Upload Urgent Parts Excel"));
  upArea.appendChild(h("p",{style:{color:"var(--text3)",fontSize:"12px"}},"Columns: Part Number + QTY"));
  el.appendChild(upArea);

  // Active urgent list
  if(STATE.urgentParts.length>0){
    // Scan all shipments + active for urgent PNs
    const urgScanMap={};
    STATE.urgentParts.forEach(u=>{urgScanMap[u.pn.toUpperCase()]={requested:u.qty,items:[],reserved:[]};});
    // Reserved items
    STATE.urgentReserved.forEach(r=>{
      const key=r.pn.toUpperCase();
      if(urgScanMap[key]) urgScanMap[key].reserved.push(r);
    });
    // Match ONLY TODAY's shipments against urgent list
    const urgToday=new Date().toISOString().slice(0,10);
    STATE.ships.forEach(sh=>{
      const shipDate=(sh.closedAt||sh.createdAt||"").slice(0,10);
      if(shipDate!==urgToday) return;
      const vn=sh.vehicleNumber||sh.asnText||(sh.asns||[]).join("/")||"—";
      (sh.boxes||[]).forEach((b,bi)=>(b.items||[]).forEach(it=>{
        const key=(it.pn||"").toUpperCase();

    scanArea.appendChild(h("p",{style:{color:"var(--text3)",fontSize:"10px",marginTop:"6px"}},"QR = uses label qty (×6, ×3...). Barcode = 1 pc. Duplicates blocked. 🟢 green = found, 🔴 red = not on list."));
    el.appendChild(scanArea);

    el.appendChild(h("p",{style:{color:"var(--text3)",fontSize:"11px",marginBottom:"8px"}},"Only Van / Taxi / Kombi vehicles are tracked. Truck shipments are excluded."));
    const tbl=h("div",{className:"tbl"});
    tbl.appendChild(h("div",{className:"tbl-h"},
      h("span",{style:{flex:2}},"Part Number"),h("span",{style:{flex:.6,textAlign:"center"}},"Original"),h("span",{style:{flex:.6,textAlign:"center"}},"Remaining"),

    ));
    STATE.urgentParts.forEach(u=>{
      const data=urgScanMap[u.pn.toUpperCase()];

      tbl.appendChild(h("div",{className:"tbl-r",style:{borderLeft:complete?"3px solid var(--green)":shipped?"3px solid var(--blue)":(inShipQty+resQty)?"3px solid var(--amber)":"3px solid var(--red)"}},

          background:statusBg,color:statusColor}},statusText))

    el.appendChild(tbl);

    const btnRow=h("div",{style:{marginTop:"10px",display:"flex",gap:"8px",justifyContent:"flex-end"}});

  // Reserved items
  if(STATE.urgentReserved.length>0){

async function parseUrgentXlsx(file){
  if(typeof XLSX==="undefined"){showToast("SheetJS still loading — wait and try again","error");return;}
  try{
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:"array"});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const data=XLSX.utils.sheet_to_json(ws,{defval:""});
    console.log("Urgent Excel rows:",data.length);
    console.log("First row keys:",data[0]?Object.keys(data[0]):[]);
    console.log("First 3 rows:",data.slice(0,3));

    const parts=[];
    data.forEach(row=>{
      let pn="";
      for(const key of Object.keys(row)){
        if(key.toLowerCase().includes("part")){pn=String(row[key]).trim();break;}
      }
      if(!pn) pn=String(row["Part number"]||row["Part Number"]||row["PN"]||row["part_number"]||"").trim();
      
      let qty=0;
      for(const key of Object.keys(row)){
        if(key.toLowerCase().includes("qty")||key.toLowerCase().includes("quantity")){qty=parseInt(row[key])||0;break;}
      }

      console.log("Row PN:",pn,"Qty:",qty);
      if(pn&&pn.length>3) parts.push({pn:pn.toUpperCase(),qty,origQty:qty});
    });

    STATE.urgentParts=parts;
    STATE.urgentUploadDate=new Date().toISOString().slice(0,10);
    save("urgentParts",parts);
    save("urgentUploadDate",STATE.urgentUploadDate);
    // Track all urgent PNs ever loaded
    parts.forEach(p=>{
      if(!STATE.urgentPNsAll.some(x=>x.toUpperCase()===p.pn.toUpperCase())) STATE.urgentPNsAll.push(p.pn.toUpperCase());
    });
    save("urgentPNsAll",STATE.urgentPNsAll);
    beep("done");showToast("🚨 Urgent list loaded: "+parts.length+" part numbers","success");
    render();
  }catch(err){
    console.error(err);beep("err");showToast("Error: "+err.message,"error");
  }
}

function exportUrgentCSV(){
  const rows=[["URGENT PARTS — RESERVED"],["Generated",fDT(now())],["Total Reserved",STATE.urgentReserved.length],[],
    ["Part Number","Description","Qty","Serial","From Vehicle","Reserved At"]];
  STATE.urgentReserved.forEach(r=>rows.push([r.pn,r.desc,r.qty,r.sn,r.fromVehicle||"",fDT(r.reservedAt)]));
  const csv=rows.map(r2=>r2.map(c=>`"${c}"`).join(",")).join("\n");
  const blob=new Blob(["\ufeff"+csv],{type:"text/csv"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="Urgent_Reserved_"+fD(now()).replace(/\//g,"-")+".csv";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  showToast("Urgent CSV exported","success");
}
