function renderProdCheck(el){
  el.appendChild(h("h2",{className:"sec-title"},"🔍 Production Check for Urgent Parts"));
  el.appendChild(h("p",{style:{color:"var(--text2)",fontSize:"13px",marginBottom:"16px"}},"Scan labels on production line — urgent parts will be flagged immediately. "+(STATE.urgentParts.length?STATE.urgentParts.length+" urgent PNs loaded.":"⚠️ No urgent list loaded — go to 🚨 Urgent tab first.")));

  // Scanner
  const area=h("div",{className:"scan-area"});
  const inp=h("input",{className:"scan-input",style:{fontSize:"18px",borderColor:STATE.urgentParts.length?"var(--amber)":"var(--border)"},placeholder:"Scan QR or barcode...",autofocus:true,
    onkeydown:function(e){
      if(e.key!=="Enter")return;
      let v=e.target.value.trim();if(!v)return;
      e.target.value="";

      let pn="",qty=0,sn="";
      // QR
      if(v.includes("||")){
        v.split("||").filter(x=>x).forEach(seg=>{const s=seg.trim();
          if(s.startsWith("S")&&/^\d/.test(s.substring(1)))sn=s.substring(1).trim();
          else if(s.startsWith("P"))pn=s.substring(1).trim();
          else if(s.startsWith("Q")&&/^\d/.test(s.substring(1)))qty=parseInt(s.substring(1));
        });
      }else{
        // Try as PN — extract from long barcodes
        pn=extractPN(v);
      }

      if(!pn){beep("err");showToast("Could not read part number","error");return;}
      pn=pn.toUpperCase();
      // Default qty to 1 if not from QR
      if(!qty||qty<=0) qty=1;
      const part=STATE.parts.find(p=>p.partNumber.toUpperCase()===pn);
      const desc=part?part.description:"";
      const isUrg=isUrgentPN(pn);
      const uInfo=isUrg?getUrgentInfo(pn):null;

      if(isUrg){
        const origQty=uInfo?(uInfo.origQty||uInfo.qty):0;
        // Sum ALL previously found qty for this PN in prod check log
        const alreadyFound=STATE.prodCheckLog.filter(e=>e.pn===pn).reduce((s,e)=>s+(parseInt(e.qty)||0),0);
        const totalFound=alreadyFound+qty;
        const remaining=Math.max(0,origQty-totalFound);
        const entry={pn,desc,qty,sn:sn||"—",ts:now(),urgent:true,remaining,totalFound};
        STATE.prodCheckLog.unshift(entry);
        if(STATE.prodCheckLog.length>200) STATE.prodCheckLog=STATE.prodCheckLog.slice(0,200);
        beep("err");
        if(remaining>0){
          showToast("🚨 URGENT: "+pn+" — found "+qty+" pcs ("+totalFound+"/"+origQty+") — "+remaining+" still needed","error");
        }else{
          showToast("✅ URGENT COMPLETE: "+pn+" — all "+origQty+" pcs found!","success");
        }
      }else{
        beep("ok");
        showToast("✓ Not needed","success");
      }
      render();
      setTimeout(()=>{const i=document.querySelector(".scan-input");if(i)i.focus();},100);
    }
  });
  area.appendChild(inp);
  area.appendChild(h("p",{className:"scan-hint"},"Scan QR or Part Number — only urgent parts are logged"));
  el.appendChild(area);

  // Stats — only urgent
  const urgFound=STATE.prodCheckLog.length;
  if(urgFound>0){
    // Count unique PNs found and total remaining
    const foundPNs=new Set(STATE.prodCheckLog.map(e=>e.pn));
    const totalUrgent=STATE.urgentParts.length;
    // Calculate total still needed and completed
    const foundByPN={};
    STATE.prodCheckLog.forEach(e=>{foundByPN[e.pn]=(foundByPN[e.pn]||0)+(parseInt(e.qty)||0);});
    let totalRemaining=0,completedPNs=0;
    STATE.urgentParts.forEach(u=>{
      const found=foundByPN[u.pn.toUpperCase()]||0;
      const rem=Math.max(0,(u.origQty||u.qty)-found);
      totalRemaining+=rem;
      if(rem<=0) completedPNs++;
    });
    const totalFoundPcs=Object.values(foundByPN).reduce((s,v)=>s+v,0);

    const sg=h("div",{className:"dash-grid",style:{marginTop:"16px"}});
    sg.appendChild(h("div",{className:"dash-card",style:{borderTop:"3px solid var(--red)"}},h("span",{className:"val"},String(urgFound)),h("span",{className:"lbl"},"Scans")));
    sg.appendChild(h("div",{className:"dash-card",style:{borderTop:"3px solid var(--green)"}},h("span",{className:"val"},String(totalFoundPcs)),h("span",{className:"lbl"},"Pcs Found")));
    sg.appendChild(h("div",{className:"dash-card",style:{borderTop:"3px solid var(--amber)"}},h("span",{className:"val"},completedPNs+"/"+totalUrgent),h("span",{className:"lbl"},"PNs Complete")));
    sg.appendChild(h("div",{className:"dash-card",style:{borderTop:"3px solid var(--blue)"}},h("span",{className:"val"},String(totalRemaining)),h("span",{className:"lbl"},"Still Needed")));
    el.appendChild(sg);
  }

  // Log — only urgent items
  if(STATE.prodCheckLog.length>0){
    el.appendChild(h("h3",{className:"sec-title",style:{marginTop:"16px",color:"var(--red)"}},"🚨 Urgent Found — "+STATE.prodCheckLog.length+" scans"));
    const tbl=h("div",{className:"tbl"});
    tbl.appendChild(h("div",{className:"tbl-h"},
      h("span",{style:{flex:2}},"Part Number"),
      h("span",{style:{flex:2}},"Description"),h("span",{style:{flex:.5,textAlign:"center"}},"Qty"),
      h("span",{style:{flex:1}},"Serial"),h("span",{style:{flex:.8,textAlign:"center"}},"Found"),h("span",{style:{flex:.8,textAlign:"center"}},"Remaining"),h("span",{style:{flex:1}},"Time")
    ));
    STATE.prodCheckLog.forEach(e=>{
      const uInfo2=getUrgentInfo(e.pn);
      const origQ=uInfo2?(uInfo2.origQty||uInfo2.qty):0;
      const complete=e.remaining<=0;
      tbl.appendChild(h("div",{className:"tbl-r",style:{borderLeft:complete?"3px solid var(--green)":"3px solid var(--red)"}},
        h("span",{style:{flex:2,fontFamily:"var(--mono)",color:"#F59E0B",fontWeight:"600",fontSize:"12px"}},(complete?"✅ ":"🚨 ")+e.pn),
        h("span",{style:{flex:2,fontSize:"12px"}},e.desc),
        h("span",{style:{flex:.5,textAlign:"center",fontWeight:"700"}},String(e.qty)),
        h("span",{style:{flex:1,fontFamily:"var(--mono)",fontSize:"11px"}},e.sn),
        h("span",{style:{flex:.8,textAlign:"center",fontWeight:"700",color:"var(--green)"}},String(e.totalFound||e.qty)+"/"+(origQ||"?")),
        h("span",{style:{flex:.8,textAlign:"center",fontWeight:"700",color:complete?"var(--green)":"var(--red)"}},complete?"DONE":String(e.remaining)+" left"),
        h("span",{style:{flex:1,fontSize:"11px",color:"var(--text3)"}},fDT(e.ts))
      ));
    });
    el.appendChild(tbl);

    el.appendChild(h("div",{style:{marginTop:"10px",textAlign:"right"}},
      h("button",{className:"btn-small",style:{opacity:".6"},onclick:()=>{STATE.prodCheckLog=[];showToast("Log cleared","info");render();}},"🗑 Clear Log")
    ));
  }
}

// ═══════════════════════════════════════════
// VDA CHECK
// ═══════════════════════════════════════════
function renderVDACheck(el){
  el.appendChild(h("h2",{className:"sec-title"},"✅ VDA Label Check"));

  const ses=STATE.vdaSession;

  // Box counter bar with New Box button
  const vdaLimit=STATE.vdaPkg==="Carton"?6:9;
  const todayStr=new Date().toISOString().slice(0,10);
  const todayChecks=STATE.vdaHistory.filter(v=>(v.finishedAt||"").slice(0,10)===todayStr);
  const boxRemaining=Math.max(0,vdaLimit-STATE.vdaCurBoxPcs);
  const boxBar=h("div",{style:{display:"flex",gap:"10px",alignItems:"center",marginBottom:"12px",padding:"10px 16px",background:"var(--bg2)",borderRadius:"8px",border:"1px solid var(--border)",flexWrap:"wrap"}});
  boxBar.appendChild(h("span",{style:{fontSize:"20px"}},"📦"));
  boxBar.appendChild(h("span",{style:{fontWeight:"700",fontSize:"16px",color:"var(--green)"}},"Box "+(STATE.vdaBoxCount+1)));
  boxBar.appendChild(h("span",{style:{padding:"3px 10px",borderRadius:"4px",fontSize:"12px",fontWeight:"700",
    background:STATE.vdaPkg==="Carton"?"rgba(243,156,18,.1)":"rgba(39,174,96,.1)",
    color:STATE.vdaPkg==="Carton"?"#F39C12":"#27AE60",
    border:"1px solid "+(STATE.vdaPkg==="Carton"?"#F39C12":"#27AE60")}},
    STATE.vdaCurBoxPcs+"/"+vdaLimit+" pcs · "+STATE.vdaCurBoxLabels+" labels"+(boxRemaining>0?" · "+boxRemaining+" remaining":"")));
  // Progress
  const pctBox=Math.min(100,Math.round(STATE.vdaCurBoxPcs/vdaLimit*100));
  boxBar.appendChild(h("div",{style:{width:"60px",height:"6px",background:"var(--bg3)",borderRadius:"3px",overflow:"hidden"}},
    h("div",{style:{width:pctBox+"%",height:"100%",background:pctBox>=100?"var(--red)":"var(--green)",transition:"width .3s"}})));
  if(STATE.vdaCurBoxPcs>=vdaLimit) boxBar.appendChild(h("span",{style:{color:"var(--red)",fontSize:"11px",fontWeight:"700"}},"FULL!"));
  boxBar.appendChild(h("span",{style:{color:"var(--text3)",fontSize:"11px",marginLeft:"auto"}},"Today: "+todayChecks.length+" VDA"));
  // New Box button
  boxBar.appendChild(h("button",{style:{padding:"5px 12px",background:"rgba(35,240,199,.1)",border:"1px solid var(--green)",borderRadius:"6px",color:"var(--green)",cursor:"pointer",fontSize:"11px",fontWeight:"700"},
    onclick:()=>{
      if(ses){showToast("Finish current check first","error");return;}
      if(STATE.vdaCurBoxPcs===0&&STATE.vdaCurBoxLabels===0&&STATE.vdaBoxCount>0){showToast("Box "+(STATE.vdaBoxCount+1)+" already empty","info");return;}
      STATE.vdaBoxCount++;STATE.vdaCurBoxLabels=0;STATE.vdaCurBoxPcs=0;
      save("vdaBoxCount",STATE.vdaBoxCount);save("vdaCurBoxLabels",0);save("vdaCurBoxPcs",0);
      beep("done");showToast("📦 New Box "+(STATE.vdaBoxCount+1)+" started","success");render();
    }},"📦 New Box"));
  // Edit box number
  boxBar.appendChild(h("button",{style:{background:"none",border:"1px solid var(--border)",borderRadius:"4px",color:"var(--amber)",cursor:"pointer",fontSize:"12px",padding:"2px 6px"},
    onclick:()=>{
      const newNum=parseInt(prompt("Set box number:",STATE.vdaBoxCount+1));
      if(newNum&&newNum>0){STATE.vdaBoxCount=newNum-1;save("vdaBoxCount",STATE.vdaBoxCount);showToast("Box set to "+newNum,"info");render();}
    }},"✏️"));
  // Reset
  boxBar.appendChild(h("button",{style:{background:"none",border:"1px solid var(--border)",borderRadius:"4px",color:"var(--text3)",cursor:"pointer",fontSize:"10px",padding:"2px 6px"},
    onclick:()=>{STATE.vdaBoxCount=0;STATE.vdaCurBoxLabels=0;STATE.vdaCurBoxPcs=0;save("vdaBoxCount",0);save("vdaCurBoxLabels",0);save("vdaCurBoxPcs",0);showToast("Reset","info");render();}},"🔄"));
  // Cancel current check
  if(ses){
    boxBar.appendChild(h("button",{style:{padding:"5px 12px",background:"rgba(255,68,68,.1)",border:"1px solid var(--red)",borderRadius:"6px",color:"var(--red)",cursor:"pointer",fontSize:"11px",fontWeight:"700"},
      onclick:()=>{
        if(confirm("Cancel current VDA check for Box "+(ses.boxNum)+"?")){STATE.vdaSession=null;showToast("Check cancelled","info");render();}
      }},"✕ Cancel Check"));
  }
  el.appendChild(boxBar);

  // Operator field
  const opBar=h("div",{style:{display:"flex",gap:"8px",alignItems:"center",marginBottom:"12px"}});
  opBar.appendChild(h("span",{style:{fontSize:"13px",color:"var(--text2)",fontWeight:"600"}},"👤 Operator:"));
  const opInp=h("input",{style:{flex:1,padding:"6px 10px",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:"6px",color:"var(--text)",fontSize:"14px",fontFamily:"var(--font)",maxWidth:"250px"},
    placeholder:"Enter operator name...",value:STATE.vdaOperator,
    oninput:function(e){STATE.vdaOperator=e.target.value.trim();save("vdaOperator",STATE.vdaOperator);}
  });
  opBar.appendChild(opInp);
  if(STATE.vdaOperator) opBar.appendChild(h("span",{style:{color:"var(--green)",fontSize:"12px",fontWeight:"600"}},"✓ "+STATE.vdaOperator));
  el.appendChild(opBar);

  // Package type selector (only when no session active)
  if(!ses){
    const pkgRow=h("div",{style:{display:"flex",gap:"8px",alignItems:"center",marginBottom:"12px",flexWrap:"wrap"}});
    pkgRow.appendChild(h("span",{style:{fontSize:"13px",color:"var(--text2)",fontWeight:"600"}},"📦 Box Type:"));
    [{label:"🔩 MC Returnable",pkg:"Returnable",limit:"max 9 pcs"},{label:"📦 MC Carton",pkg:"Carton",limit:"max 6 pcs"}].forEach(opt=>{
      const isActive=STATE.vdaPkg===opt.pkg;
      pkgRow.appendChild(h("div",{style:{padding:"8px 14px",borderRadius:"6px",cursor:"pointer",border:isActive?"2px solid var(--green)":"1px solid var(--border)",background:isActive?"rgba(35,240,199,.1)":"var(--bg3)"},
        onclick:()=>{STATE.vdaPkg=opt.pkg;render();}
      },
        h("div",{style:{fontWeight:"700",color:isActive?"var(--green)":"var(--text)",fontSize:"13px"}},opt.label),
        h("div",{style:{color:"var(--text3)",fontSize:"10px"}},opt.limit)
      ));
    });
    el.appendChild(pkgRow);
  }

  if(!ses){
    // No session — start Phase 1
    const vdaLimitPcs=STATE.vdaPkg==="Carton"?6:9;
    el.appendChild(h("p",{style:{color:"var(--text2)",fontSize:"13px",marginBottom:"12px"}},"Phase 1: Scan VDA labels for Box "+(STATE.vdaBoxCount+1)+" — "+STATE.vdaPkg+" (max "+vdaLimitPcs+" pcs)"));
    const area=h("div",{className:"scan-area",style:{borderColor:"var(--blue)"}});
    area.appendChild(h("div",{style:{textAlign:"center",marginBottom:"12px"}},
      h("span",{style:{fontSize:"36px"}},"📋"),
      h("p",{style:{color:"var(--blue)",fontWeight:"700",fontSize:"14px",marginTop:"6px"}},"Scan VDA Label QR Code")
    ));
    const inp=h("input",{className:"scan-input",style:{fontSize:"18px",borderColor:"var(--blue)"},placeholder:"Scan VDA label QR code...",autofocus:true,
      onkeydown:function(e){
        if(e.key!=="Enter")return;
        let v=e.target.value.trim();if(!v)return;
        e.target.value="";
        let pn="",qty=0,sn="";
        if(v.includes("||")){
          v.split("||").filter(x=>x).forEach(seg=>{const s=seg.trim();
            if(s.startsWith("S")&&/^\d/.test(s.substring(1)))sn=s.substring(1).trim();
            else if(s.startsWith("P"))pn=s.substring(1).trim();
            else if(s.startsWith("Q")&&/^\d/.test(s.substring(1)))qty=parseInt(s.substring(1));
          });
        }else{
          pn=extractPN(v);
          qty=parseInt(prompt("Qty for "+pn+":","5"))||0;
        }
        console.log("VDA LABEL SCAN: raw=",v,"PN=",pn,"Qty=",qty,"SN=",sn);
        if(!pn||!qty){beep("err");showToast("Could not read PN or Qty","error");return;}
        if(qty>9){beep("err");showToast("⛔ VDA qty "+qty+" too high (max 9)","error");return;}
        pn=pn.toUpperCase();
        // Duplicate VDA serial check across all history
        if(sn){
          const dupHist=STATE.vdaHistory.some(v2=>(v2.vdaLabels||[]).some(lb=>lb.sn===sn));
          if(dupHist){beep("err");showToast("⚠️ DUPLICATE VDA! Serial "+sn+" already used","error");return;}
        }
        const part=STATE.parts.find(p=>p.partNumber.toUpperCase()===pn);
        const desc=part?part.description:"";
        const vw=checkVW(pn,desc);
        STATE.vdaSession={
          phase:"labels",
          labels:[{pn,qty,sn:sn||"",desc,vw:vw||""}],
          parts:[],
          boxNum:STATE.vdaBoxCount+1,
          pkg:STATE.vdaPkg,
          operator:STATE.vdaOperator,
          startedAt:now(),
          alerts:vw?["⚠️ "+vw+" Main Carrier: "+pn]:[]
        };
        if(vw) showToast("⚠️ "+vw+" MC: "+pn,"error");
        beep("done");showToast("VDA: "+pn+" ×"+qty+" added","success");
        render();
        setTimeout(()=>{const i=document.querySelector(".scan-input");if(i)i.focus();},100);
      }
    });
    area.appendChild(inp);
    el.appendChild(area);

  }else if(ses.phase==="labels"){
    // Phase 1: Scanning VDA labels
    const vdaLimitPcs=STATE.vdaPkg==="Carton"?6:9;
    const sesPcs=ses.labels.reduce((s,lb)=>s+lb.qty,0);
    const boxRem=vdaLimitPcs-sesPcs;
    const boxFull=boxRem<=0;

    el.appendChild(h("p",{style:{color:"var(--blue)",fontWeight:"700",fontSize:"14px",marginBottom:"8px"}},"Phase 1: VDA Labels — "+sesPcs+"/"+vdaLimitPcs+" pcs"+(boxFull?" ✓ FULL":"  ("+boxRem+" remaining)")));
    const lblTbl=h("div",{className:"tbl"});
    lblTbl.appendChild(h("div",{className:"tbl-h",style:{fontSize:"9px"}},
      h("span",{style:{flex:.3,textAlign:"center"}},"#"),
      h("span",{style:{flex:2}},"VDA Part Number"),
      h("span",{style:{flex:1}},"Description"),
      h("span",{style:{flex:.5,textAlign:"center"}},"Qty"),
      h("span",{style:{flex:.8}},"Serial"),
      h("span",{style:{flex:.3}},"")
    ));
    ses.labels.forEach((lb,i)=>{
      const vwBadge=lb.vw?h("span",{style:{color:"#F59E0B",fontSize:"10px",marginLeft:"4px"}},"⚠️"+lb.vw):"";
      lblTbl.appendChild(h("div",{className:"tbl-r",style:{borderLeft:lb.vw?"3px solid #F59E0B":"3px solid var(--green)"}},
        h("span",{style:{flex:.3,textAlign:"center",fontWeight:"700",color:"var(--text3)"}},String(i+1)),
        h("span",{style:{flex:2,fontFamily:"var(--mono)",color:"var(--amber)",fontWeight:"600",fontSize:"12px"}},lb.pn,vwBadge),
        h("span",{style:{flex:1,fontSize:"11px",color:"var(--text2)"}},lb.desc),
        h("span",{style:{flex:.5,textAlign:"center",fontWeight:"700",color:"var(--green)"}},String(lb.qty)),
        h("span",{style:{flex:.8,fontFamily:"var(--mono)",fontSize:"10px"}},lb.sn||"—"),
        h("span",{style:{flex:.3,textAlign:"center"}},
          h("button",{style:{background:"none",border:"none",cursor:"pointer",color:"var(--amber)",fontSize:"11px",opacity:".6",marginRight:"4px"},onclick:(e3)=>{
            e3.stopPropagation();
            const newQty=parseInt(prompt("Edit qty for "+lb.pn+":",lb.qty));
            if(newQty&&newQty>0&&newQty<=9){lb.qty=newQty;showToast("Qty updated to "+newQty,"info");render();}
            else if(newQty) showToast("Qty must be 1-9","error");
          }},"✏️"),
          h("button",{style:{background:"none",border:"none",cursor:"pointer",color:"var(--red)",fontSize:"11px",opacity:".5"},onclick:()=>{
            if(confirm("Remove VDA "+lb.pn+" ×"+lb.qty+"?")){
              ses.labels.splice(i,1);
              if(!ses.labels.length){STATE.vdaSession=null;}
              showToast("Removed","info");render();
            }
          }},"✕"))
      ));
    });
    el.appendChild(lblTbl);

    if(boxFull){
      ses.phase="parts";
      el.appendChild(h("div",{style:{textAlign:"center",padding:"12px",background:"rgba(39,174,96,.08)",borderRadius:"8px",border:"1px dashed var(--green)",marginTop:"12px"}},
        h("p",{style:{color:"var(--green)",fontWeight:"700"}},"✓ Box full — "+sesPcs+" pcs expected"),
        h("p",{style:{color:"var(--text3)",fontSize:"12px",marginTop:"4px"}},"Switching to part scanning...")
      ));
      setTimeout(()=>render(),500);
    }else{
      const area2=h("div",{className:"scan-area",style:{borderColor:"var(--blue)",marginTop:"12px"}});
      area2.appendChild(h("p",{style:{color:"var(--blue)",fontWeight:"600",fontSize:"12px",textAlign:"center",marginBottom:"6px"}},"Scan next VDA label — or scan part barcode to start verification"));
      const inp2=h("input",{className:"scan-input",style:{fontSize:"18px",borderColor:"var(--blue)"},placeholder:"VDA label QR or part barcode...",autofocus:true,
        onkeydown:function(e){
          if(e.key!=="Enter")return;
          let v=e.target.value.trim();if(!v)return;
          e.target.value="";

          if(v.includes("||")){
            // VDA label QR
            let pn="",qty=0,sn="";
            v.split("||").filter(x=>x).forEach(seg=>{const s=seg.trim();
              if(s.startsWith("S")&&/^\d/.test(s.substring(1)))sn=s.substring(1).trim();
              else if(s.startsWith("P"))pn=s.substring(1).trim();
              else if(s.startsWith("Q")&&/^\d/.test(s.substring(1)))qty=parseInt(s.substring(1));
            });
            console.log("VDA LABEL SCAN #"+(ses.labels.length+1)+": PN=",pn,"Qty=",qty,"SN=",sn);
            if(!pn||!qty){beep("err");showToast("Bad QR","error");return;}
            if(qty>9){beep("err");showToast("⛔ Qty "+qty+" too high (max 9)","error");return;}
            pn=pn.toUpperCase();
            // Duplicate VDA serial check
            if(sn){
              const dupHist=STATE.vdaHistory.some(v2=>(v2.vdaLabels||[]).some(lb=>lb.sn===sn));
              const dupSes=ses.labels.some(lb=>lb.sn===sn);
              if(dupHist||dupSes){beep("err");showToast("⚠️ DUPLICATE VDA! Serial "+sn+" already used","error");return;}
            }
            const curPcs=ses.labels.reduce((s2,lb)=>s2+lb.qty,0);
            const bRem=vdaLimitPcs-curPcs;
            if(qty>bRem){beep("err");showToast("⛔ VDA qty "+qty+" > remaining "+bRem+" pcs!","error");return;}
            const part=STATE.parts.find(p=>p.partNumber.toUpperCase()===pn);
            const desc=part?part.description:"";
            const vw=checkVW(pn,desc);
            ses.labels.push({pn,qty,sn:sn||"",desc,vw:vw||""});
            if(vw){ses.alerts.push("⚠️ "+vw+" MC: "+pn);showToast("⚠️ "+vw+" MC: "+pn,"error");}
            const newPcs=ses.labels.reduce((s2,lb)=>s2+lb.qty,0);
            beep("done");showToast("VDA: "+pn+" ×"+qty+" ("+newPcs+"/"+vdaLimitPcs+" pcs)","success");
            if(newPcs>=vdaLimitPcs) ses.phase="parts";
            render();
            setTimeout(()=>{const i=document.querySelector(".scan-input");if(i)i.focus();},100);
          }else{
            // Barcode = part → switch to Phase 2
            ses.phase="parts";
            ses._firstPart=v;
            render();
          }
        }
      });
      area2.appendChild(inp2);
      el.appendChild(area2);

      el.appendChild(h("div",{style:{marginTop:"8px",display:"flex",gap:"8px"}},
        h("button",{className:"btn-small",style:{background:"rgba(39,174,96,.1)",color:"var(--green)",borderColor:"var(--green)"},onclick:()=>{ses.phase="parts";render();}},"▶ Start scanning parts ("+sesPcs+" expected)"),
        h("button",{className:"btn-small",style:{opacity:".6"},onclick:()=>{
          if(confirm("Cancel VDA check?")){STATE.vdaSession=null;render();}
        }},"✕ Cancel")
      ));
    }

  }else{
    // Phase 2: Scanning parts
    const totalExp=ses.labels.reduce((s,lb)=>s+lb.qty,0);
    const totalScanned=ses.parts.length;
    const remaining=totalExp-totalScanned;
    const okCount=ses.parts.filter(p=>p.match).length;
    const nokCount=ses.parts.filter(p=>!p.match).length;
    const alertCount=(ses.alerts||[]).length;

    // KPI bar
    const kpi=h("div",{style:{display:"flex",gap:"0",marginBottom:"12px",borderRadius:"8px",overflow:"hidden",border:"1px solid var(--border)"}});
    [{v:totalScanned+"/"+totalExp,l:"scanned",c:remaining<=0?"var(--green)":"var(--amber)"},{v:String(okCount),l:"OK",c:"var(--green)"},{v:String(nokCount),l:"NOK",c:nokCount?"var(--red)":"var(--text3)"},{v:String(alertCount),l:"⚠️",c:alertCount?"#F59E0B":"var(--text3)"}].forEach(k=>{
      kpi.appendChild(h("div",{style:{flex:1,padding:"8px",background:"var(--bg2)",textAlign:"center",borderRight:"1px solid var(--border)"}},
        h("span",{style:{fontSize:"18px",fontWeight:"800",color:k.c}},k.v),
        h("span",{style:{display:"block",fontSize:"9px",color:"var(--text3)"}},k.l)));
    });
    const pct=totalExp?Math.round(totalScanned/totalExp*100):0;
    kpi.appendChild(h("div",{style:{flex:1.2,padding:"8px",background:"var(--bg2)",textAlign:"center",position:"relative"}},
      h("div",{style:{position:"absolute",bottom:0,left:0,height:"3px",width:pct+"%",background:nokCount?"var(--red)":"var(--green)"}}),
      h("span",{style:{fontSize:"14px",fontWeight:"800",color:remaining>0?"var(--amber)":"var(--green)"}},remaining>0?remaining+" left":"✓ DONE"),
      h("span",{style:{display:"block",fontSize:"9px",color:"var(--text3)"}},pct+"%")));
    el.appendChild(kpi);

    // Show VDA labels being verified
    el.appendChild(h("p",{style:{color:"var(--text3)",fontSize:"11px",marginBottom:"8px"}},"VDA Labels: "+ses.labels.map((lb,i)=>(i+1)+". "+lb.pn+" ×"+lb.qty).join(" | ")));

    // Active checks badges
    const badges=h("div",{style:{display:"flex",gap:"6px",marginBottom:"12px",flexWrap:"wrap"}});
    badges.appendChild(h("span",{style:{padding:"3px 8px",borderRadius:"4px",fontSize:"10px",fontWeight:"600",background:"rgba(245,158,11,.1)",color:"#F59E0B",border:"1px solid #F59E0B"}},"⚠️ V/W MC check"));
    badges.appendChild(h("span",{style:{padding:"3px 8px",borderRadius:"4px",fontSize:"10px",fontWeight:"600",background:"rgba(255,68,68,.1)",color:"#FF4444",border:"1px solid #FF4444"}},"📅 Date < 19.05.26"));
    badges.appendChild(h("span",{style:{padding:"3px 8px",borderRadius:"4px",fontSize:"10px",fontWeight:"600",background:"rgba(59,130,246,.1)",color:"#3B82F6",border:"1px solid #3B82F6"}},"🔄 Duplicate check"));
    el.appendChild(badges);

    if(remaining>0){
      // Process first part if auto-switched from Phase 1
      if(ses._firstPart){
        const fp=ses._firstPart;delete ses._firstPart;
        setTimeout(()=>{
          const inp3=document.querySelector(".scan-input");
          if(inp3){inp3.value=fp;inp3.dispatchEvent(new KeyboardEvent("keydown",{key:"Enter"}));}
        },200);
      }

      const area3=h("div",{className:"scan-area",style:{borderColor:"var(--green)"}});
      area3.appendChild(h("p",{style:{color:"var(--green)",fontWeight:"700",fontSize:"14px",textAlign:"center",marginBottom:"8px"}},"Phase 2: Scan part "+(totalScanned+1)+" of "+totalExp));
      const inp3=h("input",{className:"scan-input",style:{fontSize:"18px",borderColor:"var(--green)"},placeholder:"Scan part barcode or QR...",autofocus:true,
        onkeydown:function(e){
          if(e.key!=="Enter")return;
          let v=e.target.value.trim();if(!v)return;
          e.target.value="";

          let pn="",partUID="",scanProdDate="",scanProdTime="";
          const bcInfo=extractBarcodeInfo(v);
          scanProdDate=bcInfo.prodDate;scanProdTime=bcInfo.prodTime;

          if(v.includes("||")){
            v.split("||").filter(x=>x).forEach(seg=>{const s=seg.trim();
              if(s.startsWith("S")&&/^\d/.test(s.substring(1)))partUID=s.substring(1).trim();
              else if(s.startsWith("P"))pn=s.substring(1).trim();
            });
          }
          if(!pn) pn=bcInfo.pn;
          if(!partUID){
            const um=v.toUpperCase().match(/^(.+?)(?=MY?\d)/);
            if(um) partUID=um[1].trim();
            if(!partUID) partUID=v.trim();
          }
          if(!pn){beep("err");showToast("Could not read PN","error");return;}
          pn=pn.toUpperCase();

          // Duplicate check
          if(partUID&&ses.parts.some(p=>p.uid===partUID)){
            beep("err");showToast("⚠️ DUPLICATE! Already scanned (ID: "+partUID.substring(0,20)+")","error");return;
          }

          // Match against VDA labels — find first label with matching PN that still has room
          let matchLabelIdx=-1;
          for(let li=0;li<ses.labels.length;li++){
            const lb=ses.labels[li];
            if(lb.pn===pn){
              const matchedCount=ses.parts.filter(p=>p.match&&p.matchLabelIdx===li).length;
              if(matchedCount<lb.qty){matchLabelIdx=li;break;}
            }
          }
          const anyMatch=ses.labels.some(lb=>lb.pn===pn);
          
          // Serial from MATCHED VDA label, not always first
          const matchedLabel=matchLabelIdx>=0?ses.labels[matchLabelIdx]:null;
          const sn=matchedLabel?matchedLabel.sn:(ses.labels[0]?ses.labels[0].sn:"—");
          const part2=STATE.parts.find(p=>p.partNumber.toUpperCase()===pn);
          const desc2=part2?part2.description:"";
          const scanEntry={pn,sn,uid:partUID,ts:now(),match:anyMatch,matchPN:pn,matchLabelIdx,alerts:[],prodDate:scanProdDate,prodTime:scanProdTime};

          // V/W check
          const vw2=checkVW(pn,desc2);
          if(vw2){scanEntry.alerts.push("⚠️ "+vw2+" MC");ses.alerts.push("⚠️ "+vw2+" MC: "+pn+" (part "+(totalScanned+1)+")");}

          // Comm date check
          if(sn&&sn!=="—"){
            const oldD=checkOldCommDate(sn);
            if(oldD){scanEntry.alerts.push("📅 Old: "+oldD);ses.alerts.push("📅 Old date: "+oldD+" on "+pn);}
          }

          ses.parts.push(scanEntry);

          if(anyMatch){
            const lblNum=matchLabelIdx>=0?(matchLabelIdx+1):"?";
            beep(scanEntry.alerts.length?"err":"done");
            if(!scanEntry.alerts.length) showToast("✓ OK — "+pn+" → VDA #"+lblNum+" ("+(totalScanned+1)+"/"+totalExp+")","success");
            else showToast("✓ "+pn+" → VDA #"+lblNum+" ("+(totalScanned+1)+"/"+totalExp+") — alerts!","error");
          }else{
            beep("err");showToast("✕ MISMATCH! "+pn+" not in VDA labels","error");
          }

          // Check if complete
          if(ses.parts.length>=totalExp){
            const result={

  const byDay={};
  STATE.vdaHistory.forEach(v=>{
    const d=(v.finishedAt||"").slice(0,10);
    if(!d) return;
    if(!byDay[d]) byDay[d]=[];
    byDay[d].push(v);
  });
  const days=Object.keys(byDay).sort().reverse();

  mod.appendChild(h("p",{style:{color:"var(--text2)",fontSize:"13px",marginBottom:"12px"}},"Select date range to export"));

  // Today
  const today=new Date().toISOString().slice(0,10);
  if(byDay[today]){
    mod.appendChild(h("div",{style:{padding:"10px 16px",background:"var(--bg3)",borderRadius:"8px",cursor:"pointer",border:"1px solid var(--green)",marginBottom:"8px"},
      onclick:()=>{ov.remove();generateVDAExcel(byDay[today],"Today_"+fD(today+"T00:00:00").replace(/\//g,"-"));}
    },
      h("div",{style:{fontWeight:"700",color:"var(--green)"}},"📅 Today ("+fD(today+"T00:00:00")+")"),
      h("div",{style:{color:"var(--text3)",fontSize:"11px"}},byDay[today].length+" checks")
    ));
  }

  // By day
  const dayGrid=h("div",{style:{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"12px"}});
  days.forEach(d=>{
    if(d===today) return;
    dayGrid.appendChild(h("div",{style:{padding:"6px 12px",background:"var(--bg3)",borderRadius:"6px",cursor:"pointer",border:"1px solid var(--border)",fontSize:"12px",textAlign:"center",minWidth:"80px"},
      onclick:()=>{ov.remove();generateVDAExcel(byDay[d],fD(d+"T00:00:00").replace(/\//g,"-"));},
      onmouseenter:function(){this.style.borderColor="#F59E0B";},
      onmouseleave:function(){this.style.borderColor="var(--border)";}
    },
      h("div",{style:{fontWeight:"700",color:"var(--text)"}},fD(d+"T00:00:00")),
      h("div",{style:{color:"var(--text3)",fontSize:"10px"}},byDay[d].length+" checks")
    ));
  });
  mod.appendChild(dayGrid);

  // All
  mod.appendChild(h("div",{style:{padding:"10px 16px",background:"var(--bg3)",borderRadius:"8px",cursor:"pointer",border:"1px solid var(--amber)",marginBottom:"16px"},
    onclick:()=>{ov.remove();generateVDAExcel(STATE.vdaHistory,"All_"+fD(now()).replace(/\//g,"-"));}
  },
    h("div",{style:{fontWeight:"700",color:"var(--amber)"}},"ALL ("+STATE.vdaHistory.length+" checks)"))
  );

  mod.appendChild(h("button",{className:"btn-secondary",onclick:()=>ov.remove()},"Cancel"));
  ov.appendChild(mod);document.body.appendChild(ov);
}

function generateVDAExcel(checks,suffix){
  const totalChecks=checks.length;
  const totalOK=checks.filter(v=>v.status==="OK").length;
  const totalNOK=checks.filter(v=>v.status==="NOK").length;
  const totalAlerts=checks.reduce((s,v)=>s+(v.alerts||[]).length,0);
  const totalParts=checks.reduce((s,v)=>s+v.scanned.length,0);
  const totalCart=checks.filter(v=>v.pkg==="Carton").length;
  const totalRet=checks.filter(v=>v.pkg!=="Carton").length;
  const okRate=checks.length?Math.round(totalOK/checks.length*100):100;

  const css=`<style>
    body{font-family:Calibri;font-size:10pt;margin:0}
    table{border-collapse:collapse;width:100%}
    td,th{padding:6px 10px;border:1px solid #BDC3C7;font-size:10pt;mso-number-format:'\\@'}
    th{font-weight:bold;font-size:9pt;text-align:center}
    .hdr{background:#002045;color:#23F0C7;border-color:#07445C}
    .hdr-red{background:#C0392B;color:white}
    .l{text-align:left}.c{text-align:center}.r{text-align:right}.b{font-weight:bold}
    .grn{color:#27AE60}.red{color:#E74C3C}.amb{color:#F39C12}.teal{color:#009B8D}.blu{color:#2980B9}.gry{color:#95A5A6}
    .rok{background:#FFFFFF}.rnok{background:#FDEDEC}.rwarn{background:#FEF9E7}.ralt{background:#F8F9FA}
    .rtot{background:#002045;color:white;font-weight:bold}
    .kpi{font-size:18pt;font-weight:bold;padding:14px 24px;text-align:center;border:2px solid #BDC3C7}
    .kpi-lbl{font-size:8pt;font-weight:normal;color:#7F8C8D}
    .sect{font-size:13pt;font-weight:bold;color:#002045;padding:14px 6px 6px;border:none;border-bottom:3px solid #23F0C7}
    .title{font-size:16pt;font-weight:bold;color:#002045;padding:8px 6px;border:none}
    .sub{font-size:9pt;color:#7F8C8D;padding:3px 6px;border:none}
    .spacer{border:none;padding:8px}
  </style>`;

  let html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="utf-8">
<!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets>
<x:ExcelWorksheet><x:Name>VDA Check Report</x:Name><x:WorksheetOptions><x:FreezePanes/><x:FrozenNoSplit/><x:SplitHorizontal>8</x:SplitHorizontal><x:TopRowBottomPane>8</x:TopRowBottomPane></x:WorksheetOptions></x:ExcelWorksheet>
</x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]-->
${css}</head><body>`;

  // ═══ SHEET 1: SUMMARY ═══
  html+=`<table>`;
  // Title block
  html+=`<tr><td class="title" colspan="12">VDA LABEL CHECK REPORT</td></tr>`;
  html+=`<tr><td class="sub" colspan="12">T.A.S. FORCE &nbsp;|&nbsp; YFAI Serbia &nbsp;|&nbsp; Outbound Quality Gate</td></tr>`;
  html+=`<tr><td class="sub" colspan="12">Report: ${suffix} &nbsp;|&nbsp; Generated: ${fDT(now())}</td></tr>`;
  html+=`<tr><td class="spacer" colspan="12"></td></tr>`;

  // KPI row
  html+=`<tr>
    <td class="kpi" colspan="2" style="border-top:4px solid #3B82F6">${totalChecks}<br><span class="kpi-lbl">Boxes Checked</span></td>
    <td class="kpi" colspan="1" style="border-top:4px solid #F39C12">${totalCart}<br><span class="kpi-lbl">Carton</span></td>
    <td class="kpi" colspan="1" style="border-top:4px solid #27AE60">${totalRet}<br><span class="kpi-lbl">Returnable</span></td>
    <td class="kpi" colspan="2" style="border-top:4px solid #27AE60">${totalOK}<br><span class="kpi-lbl">OK</span></td>
    <td class="kpi" colspan="2" style="border-top:4px solid #E74C3C">${totalNOK}<br><span class="kpi-lbl">NOK</span></td>
    <td class="kpi" colspan="2" style="border-top:4px solid #F39C12">${totalAlerts}<br><span class="kpi-lbl">Alerts</span></td>
    <td class="kpi" colspan="2" style="border-top:4px solid ${okRate>=95?'#27AE60':'#E74C3C'}">${okRate}%<br><span class="kpi-lbl">OK Rate</span></td>
  </tr>`;
  html+=`<tr><td class="spacer" colspan="12"></td></tr>`;

  // Box Summary
  html+=`<tr><td class="sect" colspan="12">BOX SUMMARY</td></tr>`;
  html+=`<tr><th class="hdr">BOX #</th><th class="hdr">PKG TYPE</th><th class="hdr l">VDA PART NUMBER</th><th class="hdr l">DESCRIPTION</th><th class="hdr">QTY</th><th class="hdr">OK</th><th class="hdr">NOK</th><th class="hdr">ALERTS</th><th class="hdr l">OPERATOR</th><th class="hdr">DATE</th><th class="hdr">TIME</th><th class="hdr">RESULT</th></tr>`;
  checks.forEach((v,i)=>{
    const hasA=(v.alerts||[]).length>0;
    const rc=v.status==="OK"?"rok":"rnok";
    const pkgTxt=v.pkg==="Carton"?"Carton":"Returnable";
    html+=`<tr class="${i%2===0?rc:rc}">
      <td class="c b">${v.boxNum||"—"}</td>
      <td class="c b" style="color:${v.pkg==="Carton"?"#F39C12":"#27AE60"}">${pkgTxt}</td>
      <td class="l teal b">${v.vdaPN}</td>
      <td class="l">${v.vdaDesc||""}</td>
      <td class="c b">${v.vdaQty}</td>
      <td class="c grn b">${v.okCount}</td>
      <td class="c ${v.nokCount?'red b':'gry'}">${v.nokCount}</td>
      <td class="c ${hasA?'amb b':'gry'}">${(v.alerts||[]).length}</td>
      <td class="l b">${v.operator||"—"}</td>
      <td class="c">${fD(v.finishedAt)}</td>
      <td class="c gry">${fT(v.finishedAt)}</td>
      <td class="c b ${v.status==='OK'?'grn':'red'}">${v.status}${hasA?" ⚠":""}</td></tr>`;
  });
  // Total
  html+=`<tr class="rtot">
    <td class="c b" style="color:#23F0C7">TOTAL</td><td class="c">${totalCart}C / ${totalRet}R</td>
    <td class="l" style="color:#23F0C7" colspan="2">${totalChecks} boxes checked</td>
    <td class="c b" style="color:white">${totalParts}</td>
    <td class="c grn b">${totalOK}</td><td class="c ${totalNOK?'red b':'gry'}">${totalNOK}</td>
    <td class="c ${totalAlerts?'amb b':'gry'}">${totalAlerts}</td>
    <td colspan="3"></td><td class="c b" style="color:${okRate>=95?'#23F0C7':'#E74C3C'}">${okRate}%</td></tr>`;

  html+=`<tr><td class="spacer" colspan="12"></td></tr>`;

  // Part Detail — same sheet
  html+=`<tr><td class="sect" colspan="14">PART DETAIL</td></tr>`;
  html+=`<tr><th class="hdr">BOX</th><th class="hdr">PKG</th><th class="hdr c">#</th><th class="hdr l">SCANNED PN</th><th class="hdr">VDA SERIAL</th><th class="hdr">COMM DATE</th><th class="hdr">PROD DATE</th><th class="hdr">PROD TIME</th><th class="hdr">SCAN DATE</th><th class="hdr">SCAN TIME</th><th class="hdr l">OPERATOR</th><th class="hdr">MATCH</th><th class="hdr l">ALERTS</th></tr>`;
  let partRow=0;
  checks.forEach(v=>{
    const pkgS=v.pkg==="Carton"?"Cart":"Ret";
    let cnt=0;
    (v.scanned||[]).forEach((s,si)=>{
      cnt++;
      const sn=s.sn||"";
      const cd=sn?STATE.commDates[sn]||"":"";
      const oldD=sn&&sn!=="—"?checkOldCommDate(sn):null;
      const hasA2=s.alerts&&s.alerts.length>0;
      const notes=[];
      if(!s.match) notes.push("MISMATCH");
      if(hasA2) notes.push(...s.alerts);
      if(oldD) notes.push("Old date: "+cd);
      const rc=!s.match?"rnok":notes.length?"rwarn":partRow%2===1?"ralt":"";
      html+=`<tr class="${rc}">
        <td class="c b">${v.boxNum||"—"}</td>
        <td class="c" style="color:${v.pkg==="Carton"?"#F39C12":"#27AE60"}">${pkgS}</td>
        <td class="c">${cnt}/${v.vdaQty}</td>
        <td class="l b ${s.match?'grn':'red'}">${s.pn}</td>
        <td class="c">${s.sn||"—"}</td>
        <td class="c ${oldD?'red b':cd?'amb':''}">${cd||"—"}</td>
        <td class="c blu b">${s.prodDate||"—"}</td>
        <td class="c blu">${s.prodTime||"—"}</td>
        <td class="c">${fD(s.ts)}</td>
        <td class="c gry">${fT(s.ts)}</td>
        <td class="l">${v.operator||"—"}</td>
        <td class="c b ${s.match?'grn':'red'}">${s.match?"OK":"NOK"}</td>
        <td class="l amb" style="font-size:8pt">${notes.join("; ")||""}</td></tr>`;
      partRow++;
    });
  });
  html+=`</table>`;

  // Footer
  html+=`<table><tr><td class="sub" colspan="14">T.A.S. FORCE &nbsp;|&nbsp; YFAI Serbia &nbsp;|&nbsp; VDA Quality Gate &nbsp;|&nbsp; ${fDT(now())}</td></tr></table>`;
  html+=`</body></html>`;

  const blob=new Blob(["\ufeff"+html],{type:"application/vnd.ms-excel;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="VDA_Check_"+suffix+".xls";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  showToast("VDA Report: "+checks.length+" boxes, "+totalParts+" parts","success");
}

      {text:"SCANNED PN",options:{...iHdr,align:"left"}},{text:"SERIAL",options:iHdr},
      {text:"COMM DATE",options:iHdr},{text:"TYPE",options:iHdr},{text:"DESCRIPTION",options:{...iHdr,align:"left"}}
    ]];

    issues.slice(0,25).forEach((is,i)=>{
      const bg=i%2===0?BG2:"00152E";
      const co={fill:{color:bg},fontSize:7,fontFace:"Calibri",valign:"middle"};
      iRows.push([
        {text:String(is.box||"—"),options:{...co,align:"center",bold:true,color:TEXT2}},
        {text:is.vdaPN,options:{...co,align:"left",bold:true,color:TEAL}},
        {text:is.pn,options:{...co,align:"left",bold:true,color:CRED}},
        {text:is.sn||"",options:{...co,align:"center",fontSize:6,color:TEXT2}},
        {text:is.cd||"",options:{...co,align:"center",color:"F59E0B"}},
        {text:is.type,options:{...co,align:"center",bold:true,color:is.type==="MISMATCH"?CRED:"F59E0B"}},
        {text:is.detail||("Expected "+is.vdaPN+" got "+is.pn),options:{...co,align:"left",color:TEXT2}}
      ]);
    });

    s2.addTable(iRows,{x:0.2,y:0.55,w:9.6,colW:[0.4,1.4,1.4,1,0.9,0.7,3.2],rowH:0.2,border:{pt:0.3,color:MGRAY}});
  }

  // Footer on all slides
  pres.slides.forEach(sl=>{
    sl.addText("T.A.S. FORCE  |  YFAI Serbia  |  VDA Quality Check",{x:0.3,y:5.3,w:9.4,h:0.2,fontSize:7,fontFace:"Calibri",color:TEXT3,align:"left"});
  });

  pres.writeFile({fileName:"VDA_Report_"+fD(now()).replace(/\//g,"-")+".pptx"}).then(()=>{
    showToast("VDA PPTX Report generated!","success");beep("done");
  });
}

function renderCommDate(el){
  el.appendChild(h("h2",{className:"sec-title"},"📅 Commission Date Database"));
  const count=Object.keys(STATE.commDates).length;
  el.appendChild(h("p",{style:{color:"var(--text2)",fontSize:"13px",marginBottom:"16px"}},"Upload QAD pick list (.xlsx) to link serial numbers with commission dates. Currently "+count+" serials in database."));

  // Upload
  const fileInp=document.createElement("input");
  fileInp.type="file";
  fileInp.accept=".xlsx,.xls";
  fileInp.style.display="none";
  fileInp.addEventListener("change",function(e){
    const file=e.target.files[0];if(!file)return;
    parseCommDateXlsx(file);
  });

  const upArea=h("div",{style:{padding:"24px",background:"var(--bg2)",borderRadius:"10px",border:"2px dashed var(--amber)",textAlign:"center",marginBottom:"20px",cursor:"pointer"},
    onclick:()=>{fileInp.click();}
  });
  upArea.appendChild(fileInp);
  upArea.appendChild(h("span",{style:{fontSize:"32px"}},"📊"));
  upArea.appendChild(h("p",{style:{color:"var(--text)",fontWeight:"600",marginTop:"8px"}},"Click to upload Commission Date Excel"));
  upArea.appendChild(h("p",{style:{color:"var(--text3)",fontSize:"12px"}},"Columns needed: Serial ID + Comm Date — data merges with existing"));
  el.appendChild(upArea);

  // Stats
  if(count>0){
    // Group by date
    const byDate={};
    Object.entries(STATE.commDates).forEach(([sn,d])=>{
      if(!byDate[d]) byDate[d]={date:d,count:0};
      byDate[d].count++;
    });
    const dateSorted=Object.values(byDate).sort((a,b)=>b.date.localeCompare(a.date));

// Parse Commission Date Excel
async function parseCommDateXlsx(file){
  if(typeof XLSX==="undefined"){showToast("SheetJS still loading — wait a few seconds and try again","error");return;}
  showToast("Parsing Excel...","info");

  try{
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:"array",cellDates:true});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const data=XLSX.utils.sheet_to_json(ws,{defval:""});

    let added=0,updated=0;
    data.forEach(row=>{
      // Find Serial ID column — try multiple names
      let snRaw=row["Serial ID"]||row["serial_id"]||row["Serial"]||row["SerialID"]||"";
      const sn=String(Math.floor(Number(snRaw))||snRaw).trim();
      if(!sn||sn.length<6||!/^\d+$/.test(sn)) return;

      // Find Comm Date column
      let cd=row["Comm Date"]||row["comm_date"]||row["CommDate"]||row["Comm_Date"]||"";
      if(cd instanceof Date){
        cd=cd.toLocaleDateString("en-GB",{day:"2-digit",month:"2-digit",year:"numeric"});
      }else if(typeof cd==="string"&&cd.trim()){
        cd=cd.trim();
      }else if(typeof cd==="number"){
        // Excel serial date
        const d=new Date((cd-25569)*86400*1000);
        cd=d.toLocaleDateString("en-GB",{day:"2-digit",month:"2-digit",year:"numeric"});
      }else{
        return;
      }

      if(STATE.commDates[sn]){updated++;}else{added++;}
      STATE.commDates[sn]=cd;
    });

    save("commDates",STATE.commDates);
    console.log("Comm dates sample:",Object.entries(STATE.commDates).slice(0,3));
    console.log("Total comm dates:",Object.keys(STATE.commDates).length);
    beep("done");
    showToast("Comm dates: "+added+" added, "+updated+" updated (total: "+Object.keys(STATE.commDates).length+")","success");
    render();
  }catch(err){
    console.error(err);beep("err");
    showToast("Error parsing Excel: "+err.message,"error");
  }
}

async function parseDNPdf(file,selShips,selName){
  if(typeof pdfjsLib==="undefined"){showToast("PDF.js not loaded — need internet","error");return;}
  pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  showToast("Parsing DN...","info");

  try{
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    let allText="";
    for(let i=1;i<=pdf.numPages;i++){
      const page=await pdf.getPage(i);
      const tc=await page.getTextContent();
      allText+=tc.items.map(it=>it.str).join(" ")+"\n";
    }

    // Extract DN ID and Ship Date
    const dnIdMatch=allText.match(/S\d{8}/);
    const dnId=dnIdMatch?dnIdMatch[0]:"Unknown";
    const dateMatch=allText.match(/(\d{2}\/\d{2}\/\d{4})/);
    const shipDate=dateMatch?dateMatch[1]:"Unknown";

    // Extract serial numbers grouped by part number
    const dnItems=[];
    let currentPN="";
    // Clean text: normalize whitespace, remove non-printable chars
    const cleanText=allText.replace(/[^\x20-\x7E\n]/g," ").replace(/\s+/g," ");
    console.log("DN raw text (first 2000 chars):",cleanText.substring(0,2000));
    
    // Strategy: find all part numbers and serial numbers by regex on full text
    const tokens=cleanText.split(/\s+/).map(t=>t.trim()).filter(t=>t.length>0);
    console.log("Total tokens:",tokens.length);
    
    for(let i=0;i<tokens.length;i++){
      const w=tokens[i];
      // Detect part number: M or MY followed by digits, dash, alphanumeric
      if(/^MY?\d{5,8}-[A-Za-z0-9]+$/.test(w)){
        currentPN=w;
        console.log("Found PN:",w);
      }
      // Detect serial number: 9-digit number
      if(/^\d{9}$/.test(w)&&currentPN){
        let qty=0;
        if(i+1<tokens.length){
          const qStr=tokens[i+1];
          const q=parseFloat(qStr.replace(",","."));
          if(!isNaN(q)&&q<1000)qty=Math.round(q);
        }
        dnItems.push({pn:currentPN,sn:w,qty:qty||0});
      }
    }
    console.log("DN items found:",dnItems.length,dnItems.slice(0,3));

    // Get scan serials from selected ships
    const scanItems=[];
    selShips.forEach(sh=>{
      sh.boxes.forEach(b=>{
        b.items.forEach(it=>{
          scanItems.push({pn:it.pn,sn:it.sn,qty:parseInt(it.qty)||0});
        });
      });
    });
    console.log("Scan items found:",scanItems.length,scanItems.slice(0,3));

    // Compare
    const dnSNs=new Set(dnItems.map(d=>d.sn));
    const scanSNs=new Set(scanItems.map(s=>s.sn));
    console.log("DN SNs (first 5):",[...dnSNs].slice(0,5));
    console.log("Scan SNs (first 5):",[...scanSNs].slice(0,5));
    const matched=dnItems.filter(d=>scanSNs.has(d.sn));
    const onDNnotScanned=dnItems.filter(d=>!scanSNs.has(d.sn));
    const scannedNotOnDN=scanItems.filter(s=>!dnSNs.has(s.sn));
    console.log("Matched:",matched.length,"Missing:",onDNnotScanned.length,"Extra:",scannedNotOnDN.length);

    STATE.dnResults={
      dnId,shipDate,vehicleName:selName,
      dnPNs:[...new Set(dnItems.map(d=>d.pn))],
      dnSerials:dnItems,
      scanSerials:scanItems,
      scanDate:fD(new Date().toISOString()),
      matched,onDNnotScanned,scannedNotOnDN
    };

    // Save to history — summary only (no fullData to save storage)
    const histEntry={
      id:uid(),ts:now(),dnId,shipDate,vehicleName:selName,
      dnCount:dnItems.length,scanCount:scanItems.length,
      matchedCount:matched.length,
      missingCount:onDNnotScanned.length,
      extraCount:scannedNotOnDN.length,
      allOK:onDNnotScanned.length===0&&scannedNotOnDN.length===0
    };
    STATE.dnHistory.unshift(histEntry);
    if(STATE.dnHistory.length>20) STATE.dnHistory=STATE.dnHistory.slice(0,20);
    save("dnHistory",STATE.dnHistory);

    beep("done");showToast("DN parsed: "+dnItems.length+" serials, "+matched.length+" matched","success");
    render();
  }catch(err){
    console.error(err);beep("err");showToast("Error parsing PDF: "+err.message,"error");
  }
}

// Export DN Compare CSV
function exportDNCSV(r){
  const rows=[
    ["DN COMPARE REPORT"],
    ["DN ID",r.dnId],["Ship Date",r.shipDate],["Compared Against",r.scanDate],
    ["DN Serials",r.dnSerials.length],["Scan Serials",r.scanSerials.length],
    ["Matched",r.matched.length],["On DN Not Scanned",r.onDNnotScanned.length],["Scanned Not On DN",r.scannedNotOnDN.length],
    [],["MATCHED"],["Part Number","Serial","DN Qty","Status"],
  ];
  r.matched.forEach(m=>rows.push([m.pn,m.sn,m.qty,"OK"]));
  if(r.onDNnotScanned.length){
    rows.push([],["ON DN BUT NOT SCANNED"],["Part Number","Serial","DN Qty","Status"]);
    r.onDNnotScanned.forEach(m=>rows.push([m.pn,m.sn,m.qty,"MISSING"]));
  }
  if(r.scannedNotOnDN.length){
    rows.push([],["SCANNED BUT NOT ON DN"],["Part Number","Serial","Scan Qty","Status"]);
    r.scannedNotOnDN.forEach(m=>rows.push([m.pn,m.sn,m.qty,"EXTRA"]));
  }
  const csv=rows.map(r2=>r2.map(c=>`"${c}"`).join(",")).join("\n");
  const blob=new Blob(["\ufeff"+csv],{type:"text/csv"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="DN_Compare_"+r.dnId+".csv";document.body.appendChild(a);a.click();document.body.removeChild(a);
  showToast("CSV exported","success");
}

}
